# Controlled vocabulary: lifecycle stages.

lifecycle:
  - id: experimental
    label: Experimental — one author, no review, no production use.
  - id: beta
    label: Beta — at least one external review; documented gaps.
  - id: stable
    label: Stable — used in production; semver-stable manifest.
  - id: deprecated
    label: Deprecated — superseded by another artifact; kept for citation.
      Must declare `superseded_by` and `deprecated_on`.
