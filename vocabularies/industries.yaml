  - id: creative
    label: Creative & entertainment
    sub:
      - id: creative.image
        label: Image generation
      - id: creative.video
        label: Video generation
      - id: creative.audio
        label: Audio / music generation
      - id: creative.writing
        label: Creative writing
      - id: creative.game
        label: Game design
  - id: personal_productivity
    label: Personal productivity & assistants
  - id: ai
    label: AI / ML systems & tooling (a "vertical" only in the sense that AI itself is a domain — eg LLM red teaming, model evals, RAG infrastructure).
  - id: cross_industry
    label: Cross-industry (not tied to one domain)
