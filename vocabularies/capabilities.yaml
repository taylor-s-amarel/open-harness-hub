# Controlled vocabulary: capabilities.
#
# What the artifact DOES, in user-facing terms. An artifact may declare
# multiple capabilities.

capabilities:
  - id: classification
    label: Classification — tag inputs into labels.
  - id: extraction
    label: Extraction — pull typed fields from unstructured input.
  - id: retrieval
    label: Retrieval — find relevant context (RAG, search).
  - id: summarization
    label: Summarization — produce a shorter form of input content.
  - id: generation
    label: Generation — produce new content (text, image, audio, video).
  - id: translation
    label: Translation — convert between languages or formats.
  - id: reasoning
    label: Reasoning — multi-step inference / planning.
  - id: planning
    label: Planning — produce an action plan.
  - id: evaluation
    label: Evaluation — score an artifact against a rubric.
  - id: anonymization
    label: Anonymization / redaction — strip PII / secrets.
  - id: routing
    label: Routing — dispatch input to the right downstream artifact.
  - id: verification
    label: Verification — check claims against evidence.
  - id: tool_use
    label: Tool use — function-calling external systems.
  - id: dialogue
    label: Dialogue — multi-turn conversation.
  - id: memory
    label: Memory — long-term recall across sessions.
  - id: safety_gating
    label: Safety gating — block / sanitize unsafe inputs or outputs.
  - id: format_conversion
    label: Format conversion — coerce one structured shape into another.
  - id: research
    label: Research — gather + synthesize information about an entity.
  - id: agent_loop
    label: Agent loop — plan + act + reflect cycles.
  - id: image_synthesis
    label: Image synthesis — generate or edit images.
  - id: audio_synthesis
    label: Audio synthesis — TTS, music, sound effects.
  - id: video_synthesis
    label: Video synthesis — text-to-video, video editing.
  - id: code_synthesis
    label: Code synthesis — generate or refactor code.
  - id: embedding
    label: Embedding — produce vector representations.
