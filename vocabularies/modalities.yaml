# Controlled vocabulary: modalities of input and output.

modalities:
  - id: text
    label: Text — written natural language.
  - id: image
    label: Image — still raster or vector graphics.
  - id: audio
    label: Audio — speech, music, sound effects.
  - id: video
    label: Video — moving images, with or without audio.
  - id: code
    label: Code — programming languages.
  - id: structured
    label: Structured — JSON, YAML, Pydantic, dataclasses.
  - id: tabular
    label: Tabular — rows and columns (CSV, Parquet, SQL).
  - id: spatial
    label: Spatial — geo, point clouds, 3D meshes.
  - id: timeseries
    label: Time series — ordered numeric / event streams.
  - id: multimodal
    label: Multimodal — multiple modalities in one artifact.
