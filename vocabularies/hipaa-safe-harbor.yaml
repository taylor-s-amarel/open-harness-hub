# HIPAA Safe Harbor — 18 identifier categories.
#
# Source: 45 CFR §164.514(b)(2). Reference these by `hsh:NN` from
# `data_protection.hipaa_safe_harbor_categories` on healthcare
# artifacts.

hipaa_safe_harbor_identifiers:
  - id: hsh:01
    label: Names
  - id: hsh:02
    label: Geographic subdivisions smaller than a state (street, city, county, ZIP < 20k pop)
  - id: hsh:03
    label: All elements of dates (except year) for ages ≤ 89
  - id: hsh:04
    label: Telephone numbers
  - id: hsh:05
    label: Vehicle identifiers and serial numbers, including license plate numbers
  - id: hsh:06
    label: Fax numbers
  - id: hsh:07
    label: Device identifiers and serial numbers
  - id: hsh:08
    label: Email addresses
  - id: hsh:09
    label: URLs
  - id: hsh:10
    label: Social security numbers
  - id: hsh:11
    label: IP addresses
  - id: hsh:12
    label: Medical record numbers
  - id: hsh:13
    label: Biometric identifiers
  - id: hsh:14
    label: Health-plan beneficiary numbers
  - id: hsh:15
    label: Full-face photographs and comparable images
  - id: hsh:16
    label: Account numbers
  - id: hsh:17
    label: Other unique identifying numbers, characteristics, or codes
  - id: hsh:18
    label: Certificate or license numbers
