site_name: Open Harness Hub
site_description: Host-agnostic catalog of harnesses, knowledge objects, logic & rule packs, tools, pipelines, and benchmarks. 383 manifests across 24 industry-grading verticals.
site_url: https://taylor-s-amarel.github.io/open-harness-hub/
repo_url: https://github.com/taylor-s-amarel/open-harness-hub
repo_name: taylor-s-amarel/open-harness-hub
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - tags

nav:
  - Home: index.md

  - Get started:
    - Run a pipeline locally: howto/run-pipeline.md
    - Assemble a pipeline from a task: howto/llm-assemble-pipeline-from-task.md
    - Add an artifact: howto/add-artifact.md
    - Deploy the hub: howto/deploy.md
    - Integrate a hackathon submission: contributing/integrating-hackathon-submissions.md

  - Use cases:
    - Index: use-cases/index.md
    - More ideas (30+): use-cases/more-ideas.md
    - Personal LLM companion: use-cases/personal-llm-companion.md
    - Illicit content + platform moderation: use-cases/illicit-content-detection.md
    - Document to knowledge graph: use-cases/document-to-knowledge-graph.md
    - Local-first research wiki: use-cases/local-first-research-wiki.md
    - Q&A on documents: use-cases/qa-on-documents.md
    - Deep research: use-cases/deep-research.md
    - Code review with security: use-cases/code-review.md
    - Customer support: use-cases/customer-support.md
    - Clinical decision support: use-cases/clinical-decision-support.md
    - AML screening: use-cases/aml-screening.md
    - Image generation: use-cases/image-gen.md
    - LLM red-teaming: use-cases/llm-red-team.md
    - ESG supply-chain DD: use-cases/esg-supply-chain-due-diligence.md
    - Refugee bureaucracy translation: use-cases/refugee-bureaucracy-translation.md

  - Catalog:
    - Index: catalog/index.md
    - Browse (interactive): catalog/browser.html
    - By capability: library/by-capability.md

  - Reference:
    - Harness Hub spec: spec/HARNESS_HUB_SPEC.md
    - Vocabularies: reference/vocabularies.md
    - Schemas: reference/schemas.md
    - Overview: concepts/overview.md
    - Taxonomy: concepts/taxonomy.md
    - Layers & primitives: concepts/layers.md
    - Pre/post-API processes: concepts/pre-post-api.md
    - Multimodal pipelines: concepts/multimodal.md
    - Database representations: concepts/databases.md
    - Industry-agnostic pattern: architecture/industry-agnostic-pattern.md
    - Peer registries: comparison/peer-registries.md
    - Mine Kaggle for harnesses: howto/mine-kaggle-harnesses.md
    - Playground & sample runs: concepts/playground.md
    - Standards landscape: research/standards-landscape.md
    - Claude Code skills overlap: research/claude-code-skills.md
    - GitHub hosting plan: research/github-hosting.md
    - Antigravity 2.0 ingest plan: research/antigravity-ingest.md
    - Real mining findings: research/real-mining-findings.md
    - Kernel mining findings (34): research/kernel-mining-findings.md
    - Kaggle mining 96-kernel report: research/kaggle-mining-96-kernels-report.md

  - About:
    - Project: about/project.md
    - License: about/license.md
    - Svityk Bill_info AI integration: outreach/svityk-bill-info-integration.md
