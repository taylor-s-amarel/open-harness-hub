id: "pipeline/haccp-ccp-gate"
type: pipeline
version: "0.1.0"
name: "HACCP CCP monitoring gate"
description: "Apply Codex HACCP CCP gate — critical limit exceeded = HOLD product."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry: ["food", "compliance"]
capability: ["safety_gating", "evaluation"]
modality: ["text"]
lifecycle: "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["haccp", "ccp", "go-nogo"]
created: "2026-05-21"
updated: "2026-05-21"
attribution:
  source_url: "https://www.fao.org/fao-who-codexalimentarius/sh-proxy/en/?lnk=1&url=https%253A%252F%252Fworkspace.fao.org%252Fsites%252Fcodex%252FStandards%252FCXC%2B1-1969%252FCXC_001e.pdf"
  source_kind: "other"
  author: "Codex Alimentarius CXC 1-1969 Rev 2020 + 21 CFR 117 (composite)"
  license: "CC-BY-4.0"
task: "Apply HACCP CCP monitoring gate at production batch release."
pipeline_kind: "review"
inputs:
  - name: "ccp_packet"
    type: "string|object"
outputs:
  - name: "verdict"
    type: "string"
  - name: "items"
    type: "object[]"
  - name: "nogo_triggers"
    type: "string[]"
defaults:
  knowledge_packs: ["knowledge-pack/technician-checklists"]
steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.ccp_packet" }
  - id: "checklist_gate"
    kind: "processor"
    ref: "processor/checklist-evaluator"
    inputs:
      candidate: "$.steps.structured_to_prose.output.prose"
      checklist_id: "haccp-ccp"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "haccp-ccp-gate"
      applied_layers: ["structured_to_prose", "checklist_evaluator"]
success_criteria:
  - kind: deterministic
    target: "$.steps.checklist_gate.output.verdict"
    op: "=="
    value: "go"
    severity: "critical"
    label: "HACCP CCP gate must return GO before product release"
