id: "pipeline/climate-disclosure-review"
type: pipeline
version: "0.1.0"
name: "Climate disclosure review (TCFD + ISSB IFRS S2 + ESRS E1)"
description: |
  Grade a corporate climate disclosure against the rubric.
  Sixth vertical proving the architecture's industry-agnosticism.
  Same 6-step chain: prose → PII redact → GREP → RAG → judge → audit.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["climate", "esg", "finance", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["climate", "tcfd", "issb", "esrs", "cdp"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://www.fsb-tcfd.org/recommendations/"
  source_kind: "other"
  author:      "TCFD + ISSB IFRS S2 + ESRS E1 + CDP (composite)"
  license:     "CC-BY-4.0"

task: |
  Given a corporate climate disclosure (10-K climate section, CDP
  response, sustainability report excerpt), grade against the
  rubric + cite TCFD recommendation / ISSB paragraph / ESRS
  standard for each finding.
pipeline_kind: "grading"

inputs:
  - name: "disclosure"
    type: "string|object"
  - name: "company_sector"
    type: "string"
  - name: "fiscal_year"
    type: "string"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "remediation"
    type: "object[]"

defaults:
  persona: "persona/climate-risk-analyst"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-climate-disclosure-gaps"
  knowledge_packs:
    - "knowledge-pack/climate-disclosure-frameworks"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.disclosure"

  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"

  - id: "grep_climate_gaps"
    kind: "rule_pack"
    ref: "rule-pack/grep-climate-disclosure-gaps"
    inputs:
      text: "$.steps.redact_pii.output.text"

  - id: "rag_against_frameworks"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_climate_gaps.output.fired"
      corpus: "knowledge-pack/climate-disclosure-frameworks"
      top_k: 6

  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/climate-disclosure-quality-v1"

  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "climate-disclosure-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/climate-disclosure-quality-v1"
    threshold: 0.6
