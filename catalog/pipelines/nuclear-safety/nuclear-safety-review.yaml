id: "pipeline/nuclear-safety-review"
type: pipeline
version: "0.1.0"
name: "Nuclear safety review (NRC 10 CFR + IAEA + INPO)"
description: "Vertical 27 — nuclear-plant compliance: LCO/LER, scram, physical security, SNM accounting."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["nuclear", "nuclear.power", "nuclear.security", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["nuclear", "nrc", "iaea", "inpo"]
created: "2026-05-21"
updated: "2026-05-21"

attribution:
  source_url: "https://www.nrc.gov/reading-rm/doc-collections/cfr/"
  source_kind: "other"
  author: "NRC 10 CFR + IAEA INFCIRC/153 + INFCIRC/225 + INPO AP-913 (composite)"
  license: "CC-BY-4.0"

task: "Review nuclear plant compliance packet (LCO + LER + scram analysis + physical security + SNM inventory)."
pipeline_kind: "review"

inputs:
  - name: "nuclear_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "critical_findings_count"
    type: "integer"

defaults:
  persona: "persona/nuclear-safety-inspector"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-nuclear-safety-flags"
  knowledge_packs:
    - "knowledge-pack/nuclear-nrc-iaea-frameworks"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.nuclear_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-nuclear-safety-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_nrc"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/nuclear-nrc-iaea-frameworks", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/nuclear-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "nuclear-safety-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/nuclear-quality-v1"
    threshold: 0.6
