id: "pipeline/telco-compliance-review"
type: pipeline
version: "0.1.0"
name: "Telco compliance review (FCC + CPNI + CALEA + STIR/SHAKEN)"
description: "Vertical 25 — telecom-carrier compliance: CPNI breach, NORS outages, STIR/SHAKEN, CALEA, E911."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["telecommunications", "telecommunications.fcc", "telecommunications.cpni", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["telco", "fcc", "cpni", "calea"]
created: "2026-05-21"
updated: "2026-05-21"

attribution:
  source_url: "https://www.fcc.gov/general/cpni-faqs"
  source_kind: "other"
  author: "FCC 47 CFR + 47 USC §222 + CALEA + TRAI (composite)"
  license: "CC-BY-4.0"

task: "Review telecom carrier compliance packet (CPNI handling + NORS outages + STIR/SHAKEN + CALEA + E911)."
pipeline_kind: "review"

inputs:
  - name: "telco_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "critical_findings_count"
    type: "integer"

defaults:
  persona: "persona/telco-compliance-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-telco-compliance-flags"
  knowledge_packs:
    - "knowledge-pack/telco-fcc-cpni-frameworks"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.telco_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-telco-compliance-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_fcc"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/telco-fcc-cpni-frameworks", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/telco-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "telco-compliance-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/telco-quality-v1"
    threshold: 0.6
