id: "pipeline/transfer-pricing-review"
type: pipeline
version: "0.1.0"
name: "Transfer pricing review (OECD TPG / BEPS / §482 / Pillar Two)"
description: "Vertical 21."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["tax", "tax.transfer_pricing", "finance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["tax", "transfer-pricing"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url: "https://www.oecd.org/tax/transfer-pricing/"
  source_kind: "other"
  author: "OECD TPG 2022 + BEPS + Pillar Two + US §482 (composite)"
  license: "CC-BY-4.0"

task: "Review intercompany transactions for arm's-length compliance + Pillar Two ETR exposure."
pipeline_kind: "review"

inputs:
  - name: "tp_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "pillar_two_topup_estimated"
    type: "number"

defaults:
  persona: "persona/transfer-pricing-counsel"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-transfer-pricing-flags"
  knowledge_packs:
    - "knowledge-pack/oecd-tp-and-beps"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.tp_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-transfer-pricing-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_oecd"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/oecd-tp-and-beps", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/transfer-pricing-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "transfer-pricing-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/transfer-pricing-quality-v1"
    threshold: 0.6
