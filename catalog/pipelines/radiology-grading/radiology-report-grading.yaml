id: "pipeline/radiology-report-grading"
type: pipeline
version: "0.1.0"
name: "Radiology report grading (RADS-aware, Fleischner-aware)"
description: |
  Grade a radiology report against `rubric/radiology-report-quality-
  v1`. The pipeline reuses the SAME primitives as the ESG grading
  pipeline:
   1. `processor/structured-to-prose` — flatten any structured input
   2. `processor/redact-pii-text` + `rule-pack/phi-hipaa-en` —
      strip PHI
   3. `rule-pack/grep-radiology-report-red-flags` — incidental
      findings + missing-RADS + Fleischner non-compliance heuristics
   4. RAG against `knowledge-pack/radiology-acrac-fleischner`
   5. `processor/llm-judge` against the rubric
   6. `processor/audit-trace-emitter` for record-keeping

  Demonstrates the architecture's cross-vertical reusability: the
  exact same harness/GREP/RAG/judge chain that grades ESG supplier
  disclosures also grades radiology reports — only the rubric,
  knowledge pack, and rule pack change.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["healthcare", "healthcare.radiology"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.grading"
tags: ["radiology", "rads", "fleischner", "hipaa", "grading"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://www.acr.org/Clinical-Resources/ACR-Appropriateness-Criteria"
  source_kind: "other"
  author:      "ACR Appropriateness Criteria + Fleischner Society + ACR RADS (composite)"
  license:     "CC-BY-4.0"

task: |
  Given a radiology report (string OR structured dict), grade it
  against the radiology-report-quality rubric. Output: per-dimension
  score + findings (missing-RADS, missing-followup, etc.) + citations
  to the relevant ACR / Fleischner / RADS guideline.
pipeline_kind: "grading"

inputs:
  - name: "report"
    type: "string|object"
  - name: "modality"
    type: "string"
  - name: "body_part"
    type: "string"
  - name: "patient_risk_class"
    type: "string"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "missing_rads"
    type: "object[]"
  - name: "missing_followups"
    type: "object[]"
  - name: "trace"
    type: "object[]"

defaults:
  persona: "persona/radiologist-cite-first"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/phi-hipaa-en"
    - "rule-pack/grep-radiology-report-red-flags"
  knowledge_packs:
    - "knowledge-pack/radiology-acrac-fleischner"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.report"

  - id: "redact_phi"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"

  - id: "grep_phi"
    kind: "rule_pack"
    ref: "rule-pack/phi-hipaa-en"
    inputs:
      text: "$.steps.redact_phi.output.text"

  - id: "grep_radiology_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-radiology-report-red-flags"
    inputs:
      text: "$.steps.redact_phi.output.text"

  - id: "rag_against_acrac"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_radiology_red_flags.output.fired"
      corpus: "knowledge-pack/radiology-acrac-fleischner"
      top_k: 6

  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_phi.output.text"
      rubric_ref: "rubric/radiology-report-quality-v1"

  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "radiology-report-grading"
      applied_layers: ["persona", "phi_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/radiology-report-quality-v1"
    threshold: 0.7
