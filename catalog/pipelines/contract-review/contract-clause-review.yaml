id: "pipeline/contract-clause-review"
type: pipeline
version: "0.1.0"
name: "Commercial contract clause review (cite-first redlining)"
description: |
  Review a commercial contract against `rubric/contract-review-quality-
  v1`. Reuses the SAME primitives as the ESG + radiology grading
  pipelines: structured-to-prose → PII redact → GREP → RAG → judge →
  audit. Only persona / rule pack / knowledge pack / rubric change.

  Third proof point of the architecture's industry-agnosticism:
  ESG (CSDDD) + Healthcare (RADS/Fleischner) + Legal (contract
  clauses) all share the same chain.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["legal", "legal.contract", "legal.compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["legal", "contract", "redline", "playbook", "grading"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://www.acc.com/resource-library"
  source_kind: "other"
  author:      "ACC Contract Playbook patterns + composite commercial contract clause library"
  license:     "CC-BY-4.0"

task: |
  Given a commercial contract (NDA / MSA / SOW / DPA / vendor /
  employment), surface red-flag clauses, propose redlines, cite the
  playbook entry that grounds each finding, score against the
  rubric.
pipeline_kind: "review"

inputs:
  - name: "contract_text"
    type: "string|object"
  - name: "contract_type"
    type: "string"
  - name: "jurisdiction"
    type: "string"
  - name: "lead_company_playbook_ref"
    type: "artifact_id"
outputs:
  - name: "grade"
    type: "number"
  - name: "red_flags"
    type: "object[]"
  - name: "missing_clauses"
    type: "object[]"
  - name: "proposed_redlines"
    type: "object[]"
  - name: "trace"
    type: "object[]"

defaults:
  persona: "persona/contract-reviewer-cite-first"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/privacy-pii-text-en"
    - "rule-pack/grep-contract-red-flags"
  knowledge_packs:
    - "knowledge-pack/contract-law-clauses"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.contract_text"

  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"

  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-contract-red-flags"
    inputs:
      text: "$.steps.redact_pii.output.text"

  - id: "rag_against_clause_library"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_red_flags.output.fired"
      corpus: "knowledge-pack/contract-law-clauses"
      top_k: 6

  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/contract-review-quality-v1"

  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "contract-clause-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/contract-review-quality-v1"
    threshold: 0.7
