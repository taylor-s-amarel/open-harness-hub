id: "pipeline/hr-hiring-compliance-review"
type: pipeline
version: "0.1.0"
name: "HR hiring compliance review (EEOC / Title VII / ADA / ADEA)"
description: "Twelfth vertical."
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["hr", "hr.hiring", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["hr", "eeoc", "hiring-bias", "title-vii", "ada"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://www.eeoc.gov/"
  source_kind: "other"
  author:      "EEOC enforcement guidance + 29 CFR (composite)"
  license:     "CC-BY-4.0"

task: "Review a job posting / screening process for protected-class bias + disparate impact."
pipeline_kind: "review"

inputs:
  - name: "posting"
    type: "string|object"
  - name: "applicant_pool_stats"
    type: "object"
outputs:
  - name: "grade"
    type: "number"
  - name: "indicators"
    type: "object[]"
  - name: "proposed_replacements"
    type: "object[]"

defaults:
  persona: "persona/eeoc-hiring-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-hr-hiring-bias-flags"
  knowledge_packs:
    - "knowledge-pack/eeoc-hiring-statutes"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.posting"
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"
  - id: "grep_bias_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-hr-hiring-bias-flags"
    inputs:
      text: "$.steps.redact_pii.output.text"
  - id: "rag_against_statutes"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_bias_flags.output.fired"
      corpus: "knowledge-pack/eeoc-hiring-statutes"
      top_k: 5
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/hr-hiring-compliance-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "hr-hiring-compliance-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/hr-hiring-compliance-v1"
    threshold: 0.6
