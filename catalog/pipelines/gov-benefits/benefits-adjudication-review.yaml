id: "pipeline/benefits-adjudication-review"
type: pipeline
version: "0.1.0"
name: "Government benefits adjudication review (SNAP / Medicaid / UI / SSI)"
description: |
  Tenth vertical. Same 6-step chain — persona / GREP / KB / rubric
  swap for benefits-eligibility adjudication.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["government", "government.benefits", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["government", "benefits", "snap", "medicaid", "ssi"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://www.fns.usda.gov/snap/policy"
  source_kind: "other"
  author:      "USDA FNS + CMS + SSA + DOL (composite)"
  license:     "CC-BY-4.0"

task: "Review a benefits application + supporting docs; determine eligibility + benefit amount + missing-docs + appeal-rights."
pipeline_kind: "review"

inputs:
  - name: "application_packet"
    type: "string|object"
  - name: "program"
    type: "string"
outputs:
  - name: "grade"
    type: "number"
  - name: "indicators"
    type: "object[]"
  - name: "disposition"
    type: "string"
  - name: "appeal_rights"
    type: "object"

defaults:
  persona: "persona/benefits-adjudicator"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-benefits-eligibility-flags"
  knowledge_packs:
    - "knowledge-pack/gov-benefits-rules"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.application_packet"
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"
  - id: "grep_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-benefits-eligibility-flags"
    inputs:
      text: "$.steps.redact_pii.output.text"
  - id: "rag_against_rules"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_flags.output.fired"
      corpus: "knowledge-pack/gov-benefits-rules"
      top_k: 6
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/benefits-adjudication-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "benefits-adjudication-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/benefits-adjudication-quality-v1"
    threshold: 0.6
