id: "pipeline/trade-compliance-review"
type: pipeline
version: "0.1.0"
name: "Trade compliance review (HTS / EAR / ITAR / OFAC)"
description: "Thirteenth vertical."
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["trade", "trade.eccn", "trade.itar", "trade.sanctions", "compliance"]
capability: ["evaluation", "extraction", "verification", "classification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["trade", "ear", "itar", "ofac", "export-control"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://www.bis.doc.gov/"
  source_kind: "other"
  author:      "BIS-EAR + DDTC-ITAR + OFAC (composite)"
  license:     "CC-BY-4.0"

task: "Review an export transaction for HTS / ECCN / ITAR classification + destination + end-user + end-use compliance."
pipeline_kind: "review"

inputs:
  - name: "transaction_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "indicators"
    type: "object[]"
  - name: "classification"
    type: "object"
  - name: "license_path"
    type: "string"

defaults:
  persona: "persona/trade-compliance-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-trade-compliance-flags"
  knowledge_packs:
    - "knowledge-pack/trade-export-control-frameworks"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.transaction_packet"
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-trade-compliance-flags"
    inputs:
      text: "$.steps.redact_pii.output.text"
  - id: "rag_against_frameworks"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_red_flags.output.fired"
      corpus: "knowledge-pack/trade-export-control-frameworks"
      top_k: 6
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/trade-compliance-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "trade-compliance-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/trade-compliance-quality-v1"
    threshold: 0.7
