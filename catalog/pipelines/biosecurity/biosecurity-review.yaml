id: "pipeline/biosecurity-review"
type: pipeline
version: "0.1.0"
name: "Biosecurity / select agent review (42 CFR 73 + BMBL 6e + DURC/P3CO)"
description: "Vertical 32 — registered select-agent entity + BSL-3/4 lab compliance + DURC."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["biosecurity", "biosecurity.select_agent", "biosecurity.bsl", "biosecurity.durc", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["biosecurity", "select-agent"]
created: "2026-05-21"
updated: "2026-05-21"
attribution:
  source_url: "https://www.selectagents.gov/"
  source_kind: "other"
  author: "HHS/CDC + APHIS + BMBL 6e + WHO LBM4 + DURC + P3CO (composite)"
  license: "CC-BY-4.0"
task: "Review select-agent registered entity compliance packet."
pipeline_kind: "review"
inputs:
  - name: "biosec_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "critical_findings_count"
    type: "integer"
defaults:
  persona: "persona/biosecurity-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs: ["rule-pack/grep-biosecurity-flags"]
  knowledge_packs: ["knowledge-pack/biosecurity-frameworks"]
steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.biosec_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-biosecurity-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_cdc"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/biosecurity-frameworks", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/biosecurity-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "biosecurity-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]
success_criteria:
  - rubric: "rubric/biosecurity-quality-v1"
    threshold: 0.6
