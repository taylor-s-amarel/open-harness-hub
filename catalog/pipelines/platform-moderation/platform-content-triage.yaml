id: "pipeline/platform-content-triage"
type: pipeline
version: "0.1.0"
name: "Platform content triage (Trust + Safety)"
description: "Review user-generated content against a documented platform policy. Detects illicit + harmful patterns, routes CSAM suspicion to the human queue + NCMEC referral packet without model classification, generates DSA Art 17 statement of reasons for every restriction."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry: ["compliance", "media", "privacy"]
capability: ["safety_gating", "classification", "evaluation"]
modality: ["text"]
lifecycle: "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["trust-and-safety", "moderation", "dsa", "csam-safe"]
created: "2026-05-22"
updated: "2026-05-22"

attribution:
  source_url: "https://digital-strategy.ec.europa.eu/en/policies/digital-services-act-package"
  source_kind: "other"
  author: "EU DSA + UK OSA + COPPA + NCMEC + GIFCT (composite)"
  license: "CC-BY-4.0"

task: "Triage a piece of user-generated content into allow / restrict / remove / escalate."
pipeline_kind: "review"

inputs:
  - name: "content_packet"
    type: "string|object"

outputs:
  - name: "decision"
    type: "string"
  - name: "severity"
    type: "integer"
  - name: "statement_of_reasons"
    type: "object"
  - name: "ncmec_referral_packet"
    type: "object"

defaults:
  persona: "persona/trust-and-safety-reviewer"
  model_adapter: "adapter/ollama-default"
  rule_packs: ["rule-pack/grep-platform-moderation-flags"]
  knowledge_packs: ["knowledge-pack/platform-content-policy-frameworks"]

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.content_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_triage"
    kind: "rule_pack"
    ref: "rule-pack/grep-platform-moderation-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_policy"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_triage.output.fired", corpus: "knowledge-pack/platform-content-policy-frameworks", top_k: 6 }
  - id: "judge"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/platform-moderation-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "platform-content-triage"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/platform-moderation-quality-v1"
    threshold: 0.7
