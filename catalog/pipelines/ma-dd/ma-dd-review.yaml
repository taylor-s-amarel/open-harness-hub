id: "pipeline/ma-dd-review"
type: pipeline
version: "0.1.0"
name: "M&A due-diligence review (6-stream)"
description: "Fifteenth vertical."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["m_and_a", "m_and_a.due_diligence", "legal", "finance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["m&a", "due-diligence"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url: "https://www.aicpa-cima.com/"
  source_kind: "other"
  author: "Composite M&A DD frameworks"
  license: "CC-BY-4.0"

task: "Review M&A target DD packet across 6 streams + propose disposition."
pipeline_kind: "review"

inputs:
  - name: "target_dd_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "purchase_price_adjustment"
    type: "number"
  - name: "escrow_holdback"
    type: "number"

defaults:
  persona: "persona/ma-dd-counsel"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-ma-dd-red-flags"
  knowledge_packs:
    - "knowledge-pack/ma-dd-frameworks"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.target_dd_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-ma-dd-red-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_frameworks"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/ma-dd-frameworks", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/ma-dd-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "ma-dd-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/ma-dd-quality-v1"
    threshold: 0.6
