id: "pipeline/aviation-safety-review"
type: pipeline
version: "0.1.0"
name: "Aviation safety incident review"
description: "Sixteenth vertical."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["aviation", "aviation.safety"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["aviation"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url: "https://www.ntsb.gov/"
  source_kind: "other"
  author: "NTSB + FAA + ICAO + HFACS (composite)"
  license: "CC-BY-4.0"

task: "Classify causation per HFACS + cite NTSB taxonomy + propose corrective actions."
pipeline_kind: "review"

inputs:
  - name: "incident_report"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "factors"
    type: "object[]"
  - name: "corrective_actions"
    type: "object[]"

defaults:
  persona: "persona/aviation-safety-investigator"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-aviation-safety-flags"
  knowledge_packs:
    - "knowledge-pack/aviation-safety-frameworks"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.incident_report" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-aviation-safety-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_frameworks"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/aviation-safety-frameworks", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/aviation-safety-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "aviation-safety-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/aviation-safety-quality-v1"
    threshold: 0.6
