id: "pipeline/dfars-cmmc-compliance-review"
type: pipeline
version: "0.1.0"
name: "DoD DFARS / CMMC compliance review"
description: "Vertical 22 — defense acquisition compliance."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["defense", "defense.dfars", "defense.cmmc", "defense.counterfeit_parts", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["defense", "dfars", "cmmc"]
created: "2026-05-21"
updated: "2026-05-21"

attribution:
  source_url: "https://www.acq.osd.mil/cmmc/"
  source_kind: "other"
  author: "DoD DFARS + CMMC + NIST SP 800-171 + SAE AS5553 (composite)"
  license: "CC-BY-4.0"

task: "Review defense supplier packet for DFARS / CMMC / Section 889 / counterfeit-parts compliance."
pipeline_kind: "review"

inputs:
  - name: "contract_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "cmmc_level_required"
    type: "string"

defaults:
  persona: "persona/defense-acquisition-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-defense-dfars-flags"
  knowledge_packs:
    - "knowledge-pack/defense-dfars-frameworks"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.contract_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-defense-dfars-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_dfars"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/defense-dfars-frameworks", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/defense-dfars-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "dfars-cmmc-compliance-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/defense-dfars-quality-v1"
    threshold: 0.6
