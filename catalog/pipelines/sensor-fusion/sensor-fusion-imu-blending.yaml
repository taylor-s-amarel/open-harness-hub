id: "pipeline/sensor-fusion-imu-blending"
type: pipeline
version: "0.1.0"
name: "Multi-sensor fusion (IMU + thermal + ToF) with model blending"
description: |
  Multi-modal sensor-fusion pipeline for behavior / activity
  classification: IMU (inertial measurement unit — accelerometer +
  gyroscope), THM (thermal), ToF (time-of-flight depth). Train
  separate per-sensor branches (1D-CNN + LSTM), then blend predictions
  via weighted average / stacking. Standard for wearable / behavior-
  detection competitions.

  Verified by Open Harness Hub mining: hideyukizushi CMI25 IMU+THM/ToF
  TF BlendingModel (625 votes, CMI Detect Behavior with Sensor Data),
  sohier CMI 2025 Demo Submission (875 votes, same competition).
authors:
  - name: "Open Harness Hub contributors (port)"
license: "MIT"
industry:   ["healthcare", "ai", "manufacturing"]
capability: ["classification", "extraction"]
modality:   ["structured"]
lifecycle:  "stable"
trust_boundary: "local"
lifecycle_position: "api.training"
tags: ["sensor-fusion", "imu", "blending", "kaggle-verified"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://www.kaggle.com/code/hideyukizushi/cmi25-imu-thm-tof-tf-blendingmodel-lb-82"
  source_kind: "kaggle"
  author:      "hideyukizushi (625), sohier (875) — CMI Detect Behavior"
  license:     "Apache-2.0"

task: "Per-sensor branch training (IMU/THM/ToF) + weighted blending."
pipeline_kind: "training_and_serving"

inputs:
  - name: "multi_sensor_dataset"
    type: "artifact_id"
  - name: "sensors_in_scope"
    type: "string[]"
outputs:
  - name: "predictions"
    type: "number[]"
  - name: "blend_weights"
    type: "object"

defaults:
  persona: "persona/research-analyst"
  model_adapter: "adapter/ollama-default"

steps:
  - id: "guard"
    kind: "rule_pack"
    ref: "rule-pack/grep-prompt-injection-heuristics"
    inputs: { text: "$.inputs.sensors_in_scope" }
  - id: "train_branches"
    kind: "processor"
    ref: "processor/iterative-revise-loop"
    inputs:
      initial_prompt: "Per-sensor 1D-CNN + BiLSTM branch. Input shape (T, channels) per sensor. Concatenate or fuse via attention. Train per-branch first, then full ensemble."
      inner_harness_ref: "harness/text-safety-review"
      verifier_refs: []
      max_iterations: 1
      cost_ceiling_usd: 4.00
      convergence_policy: "all_pass"
  - id: "blend"
    kind: "processor"
    ref: "processor/multi-vector-fusion"
    inputs:
      ranked_lists: "$.steps.train_branches.output"
      method: "weighted_sum"
      k: 1
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "sensor-fusion-imu-blending"
      applied_layers: ["per_sensor_training", "blending"]

success_criteria: []
