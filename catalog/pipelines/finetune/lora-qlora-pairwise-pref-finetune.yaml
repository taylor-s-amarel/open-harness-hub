structural_shape:
  - "Load base Gemma-2-9b with BitsAndBytesConfig(load_in_4bit=True, bnb_4bit_compute_dtype=bfloat16)"
  - "Wrap with LoraConfig (r=16-64, target_modules: q,k,v,o + gate,up,down)"
  - "Tokenize training triples with chat-template"
  - "SFTTrainer with max_seq_length 2048-4096, gradient_checkpointing"
  - "Inference: same loaded model, score classifier head over A/B/tie"
  - "(optional) ensemble across k-fold seeds for calibrated probability"

when_to_use:
  - "Pairwise-preference competitions or production tasks"
  - "Limited GPU memory (4-bit fits Gemma-2-9b on a single 24 GB GPU)"
  - "Need calibrated probability over 3 classes"

when_not_to_use:
  - "Generation tasks (this trains a CLASSIFIER head, not a generator)"
  - "When you need the underlying preference reasoning (use DPO instead)"

variants:
  - "Same shape with Llama-3-8b / Qwen-2.5-7b instead of Gemma-2-9b"
  - "DPO instead of SFT for direct preference optimization"
  - "ORPO single-stage preference + SFT in one loss"

counter_patterns:
  - "Full-precision fine-tune (slower, more memory)"
  - "Frozen-model embedding + classifier (cheaper but lower ceiling)"

