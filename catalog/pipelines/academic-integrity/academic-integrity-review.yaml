id: "pipeline/academic-integrity-review"
type: pipeline
version: "0.1.0"
name: "Academic integrity review (plagiarism / AI / citation fabrication)"
description: |
  Ninth vertical. Same chain — only persona / GREP / KB / rubric
  change.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["education", "education.higher", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["education", "academic-integrity", "plagiarism", "ai-detection"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://academicintegrity.org/"
  source_kind: "other"
  author:      "Composite of higher-ed honor codes + APA/MLA citation rules"
  license:     "CC-BY-4.0"

task: "Review a student submission for plagiarism / AI / fabricated-citation indicators."
pipeline_kind: "review"

inputs:
  - name: "submission"
    type: "string|object"
  - name: "assignment_type"
    type: "string"
  - name: "institution_policy_ref"
    type: "artifact_id"
outputs:
  - name: "grade"
    type: "number"
  - name: "indicators"
    type: "object[]"
  - name: "recommended_sanction"
    type: "string"

defaults:
  persona: "persona/academic-integrity-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-academic-integrity-flags"
  knowledge_packs:
    - "knowledge-pack/academic-honor-codes"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.submission"
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"
  - id: "grep_integrity_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-academic-integrity-flags"
    inputs:
      text: "$.steps.redact_pii.output.text"
  - id: "rag_against_honor_codes"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_integrity_flags.output.fired"
      corpus: "knowledge-pack/academic-honor-codes"
      top_k: 5
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/academic-integrity-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "academic-integrity-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/academic-integrity-quality-v1"
    threshold: 0.6
