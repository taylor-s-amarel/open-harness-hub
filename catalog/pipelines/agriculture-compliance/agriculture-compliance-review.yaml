id: "pipeline/agriculture-compliance-review"
type: pipeline
version: "0.1.0"
name: "Agriculture compliance review (FSMA + USDA NOP + GlobalGAP)"
description: "Vertical 28 — farm + packing-house compliance: FSMA water, pesticide REI/PHI/MRL, organic, child labor."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["agriculture_compliance", "agriculture_compliance.fsma", "agriculture_compliance.organic", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["agriculture", "fsma", "organic", "globalgap"]
created: "2026-05-21"
updated: "2026-05-21"

attribution:
  source_url: "https://www.fda.gov/food/food-safety-modernization-act-fsma/fsma-final-rule-produce-safety"
  source_kind: "other"
  author: "FDA FSMA Produce Safety Rule + USDA NOP + GlobalGAP IFA v6 (composite)"
  license: "CC-BY-4.0"

task: "Review agriculture compliance packet (pesticide application + water quality + organic OSP + worker H+S)."
pipeline_kind: "review"

inputs:
  - name: "ag_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "critical_findings_count"
    type: "integer"

defaults:
  persona: "persona/agriculture-compliance-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-agriculture-compliance-flags"
  knowledge_packs:
    - "knowledge-pack/agriculture-compliance-frameworks"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.ag_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-agriculture-compliance-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_fsma"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/agriculture-compliance-frameworks", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/agriculture-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "agriculture-compliance-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/agriculture-quality-v1"
    threshold: 0.6
