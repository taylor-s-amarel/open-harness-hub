id: "pattern/chain-of-verification"
type: pattern
version: "0.1.0"
name: "Chain-of-Verification (CoVe)"
description: |
  Generate a draft response, decompose it into atomic verifiable
  claims, execute independent verification queries per claim, and
  emit a final response that drops or revises unverifiable claims.
  Reduces hallucination by independently re-checking each claim
  against retrieval (rather than self-reflecting against the same
  reasoning that produced the hallucination).
authors:
  - name: "Dhuliawala, Komeili, Xu, Raileanu, Li, Celikyilmaz, Weston (2023)"
license: "CC-BY-4.0"
industry:   ["ai", "cross_industry"]
capability: ["verification", "reasoning"]
modality:   ["text"]
lifecycle:  "stable"
trust_boundary: "mixed"
tags: ["verification", "self-verification", "rag", "hallucination-mitigation"]
created: "2026-05-20"
updated: "2026-05-20"

paper_url: "https://arxiv.org/abs/2309.11495"
paper_citation: "Dhuliawala et al. 2023, Chain-of-Verification Reduces Hallucination in Large Language Models"
reference_implementations:
  - { url: "https://github.com/microsoft/promptflow", language: "python", framework: "promptflow" }

structural_shape:
  - "draft = llm.respond(query)"
  - "claims = llm.decompose_to_claims(draft)"
  - "for each claim c:"
  - "  evidence = retrieve(query=c)"
  - "  verdict = llm.verify(c, evidence)  # independent of draft"
  - "  if verdict == 'unsupported': drop c OR revise"
  - "final = llm.compose(query, claims_that_passed)"

when_to_use:
  - "Factual-claim domains where hallucination is the dominant failure mode"
  - "Long-form responses with many independent claims"
  - "When retrieval is cheap and claim-by-claim verifiable"

when_not_to_use:
  - "Single-claim Q&A where draft already short"
  - "Creative tasks where 'verification' doesn't apply"
  - "When verification cost > generation cost AND quality bar already met"

variants:
  - "Self-CoVe (the original)"
  - "CoVe-with-tools (verifier calls real tools rather than retrieval)"
  - "CoVe-with-frontier-judge (verifier is a different stronger model)"

counter_patterns:
  - "pattern/self-refine (self-reflection in same model)"

implementing_pipelines:
  - "pipeline/verify-claim-against-corpus"

implementing_processors:
  - "processor/sub-question-decomposer"
  - "processor/document-grader"

tradeoffs:
  latency:    "Higher — N verifications per claim"
  cost:       "Higher — N×retrieval + N×verify-LLM calls"
  quality:    "Significantly lower hallucination in benchmarks (FActScore, FEVER)"
  complexity: "Medium — claim-decomposition reliability is the engineering challenge"
  explainability: "High — per-claim verdict is inspectable"
