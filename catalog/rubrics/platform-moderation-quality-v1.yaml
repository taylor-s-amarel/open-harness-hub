id: "rubric/platform-moderation-quality-v1"
type: rubric
version: "0.1.0"
name: "Platform moderation review quality v1"
description: "7-dim rubric for Trust + Safety triage quality."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry: ["compliance", "media", "privacy"]
capability: ["evaluation"]
modality: ["text", "structured"]
lifecycle: "experimental"
trust_boundary: "local"
created: "2026-05-22"
updated: "2026-05-22"

dimensions:
  - id: "csam_safe_routing"
    label: "CSAM suspicion routes to human queue + NCMEC referral without classifier analysis"
    weight: 0.25
    scale: "0..1"
    evidence_required: "no model-generated classification of suspected CSAM; ncmec_referral_packet present"
  - id: "policy_clause_cited"
    label: "Each decision cites the specific policy clause"
    weight: 0.20
    scale: "0..1"
    evidence_required: "policy_section_id present per decision"
  - id: "evidence_span_quoted"
    label: "Each decision quotes the triggering evidence span (up to 3)"
    weight: 0.15
    scale: "0..1"
    evidence_required: "evidence_spans array present per decision"
  - id: "severity_calibrated"
    label: "Severity 1-4 assigned + matches the documented severity-to-action map"
    weight: 0.10
    scale: "0..1"
    evidence_required: "severity_score + action assignments consistent with policy"
  - id: "human_escalation_on_ambiguity"
    label: "Ambiguous + policy-silent cases escalate to human review"
    weight: 0.10
    scale: "0..1"
    evidence_required: "human_queue_id populated when confidence < threshold"
  - id: "user_pii_redacted_in_audit"
    label: "User PII redacted from audit trace"
    weight: 0.10
    scale: "0..1"
    evidence_required: "pii_redact_pass present before audit emit; no raw PII in trace"
  - id: "dsa_article_17_statement"
    label: "Statement of reasons (DSA Art 17 shape) generated for every restriction"
    weight: 0.10
    scale: "0..1"
    evidence_required: "statement_of_reasons object: specific_content + decision + basis + automated_decision_flag + appeal_route"

scoring_method: "weighted_sum"
