id: "rubric/customs-quality-v1"
type: rubric
version: "0.1.0"
name: "Customs entry review quality v1"
description: "7-dim rubric for US CBP + UFLPA + USMCA + WCO review"
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["customs", "customs.entry", "customs.tariff", "customs.fta"]
capability: ["evaluation"]
modality:   ["text", "structured"]
lifecycle:  "experimental"
trust_boundary: "local"
created: "2026-05-21"
updated: "2026-05-21"

dimensions:
  - id: "forced_labor_uflpa_first"
    label: "UFLPA / WRO / counterfeit / AD-CVD evasion surfaced FIRST as critical"
    weight: 0.25
    scale: "0..1"
    evidence_required: "acute findings appear before other findings; severity=critical"
  - id: "regulation_citation"
    label: "Each finding cites 19 CFR / 19 USC / UFLPA section"
    weight: 0.20
    scale: "0..1"
    evidence_required: "regulatory_citation populated per finding (19 CFR Parts 142/149/152/174, 19 USC §1484/1592)"
  - id: "isf_10_plus_2_window"
    label: "ISF filed ≥ 24h pre-load + all 10 elements + transmit confirmation"
    weight: 0.15
    scale: "0..1"
    evidence_required: "isf_filing_timestamp + vessel_load_timestamp + isf_completeness=true"
  - id: "hts_classification_support"
    label: "HTS classification supported by GRI + CROSS rulings + product spec"
    weight: 0.10
    scale: "0..1"
    evidence_required: "gri_applied + ruling_citations + product_specification_attached"
  - id: "fta_origin_documentation"
    label: "USMCA / FTA preference claim w/ Certification of Origin + RVC calc"
    weight: 0.10
    scale: "0..1"
    evidence_required: "certificate_of_origin_attached + rvc_calculation_attached when claimed"
  - id: "reasonable_care_record"
    label: "Reasonable care file — rulings consulted + broker advice + product spec"
    weight: 0.10
    scale: "0..1"
    evidence_required: "reasonable_care_documentation_present=true"
  - id: "ctpat_aeo_status"
    label: "CTPAT / AEO membership current + minimum security criteria"
    weight: 0.10
    scale: "0..1"
    evidence_required: "ctpat_tier + last_validation_date within 4 years documented"

scoring_method: "weighted_sum"
