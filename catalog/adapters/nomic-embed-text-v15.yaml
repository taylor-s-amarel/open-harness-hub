tags: ["embedding", "nomic", "open-weights", "apache-2.0", "mteb", "ollama"]
created: "2026-05-22"
updated: "2026-05-22"

transport: "ollama"
capabilities: ["embedding"]
auth: "none"
cost_model: "self_hosted"
endpoint: "http://localhost:11434"
default_model: "nomic-embed-text"
