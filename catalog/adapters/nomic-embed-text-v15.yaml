id: "adapter/nomic-embed-text-v15"
type: adapter
version: "0.1.0"
name: "Nomic Embed Text v1.5 (open-weights embeddings)"
description: |
  Nomic AI nomic-embed-text-v1.5 — open-weights text embedding model, 768 dim,
