id: "adapter/ollama-default"
type: adapter
version: "0.1.0"
name: "Ollama (local default)"
description: |
  Default local-Ollama transport. Configured for `llama3.1:8b` at
  `http://localhost:11434`. Override by setting `OLLAMA_HOST` and
  `OLLAMA_MODEL` env vars at runtime.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["cross_industry"]
capability: ["generation", "dialogue", "tool_use"]
modality:   ["text"]
lifecycle:  "stable"
trust_boundary: "local"
tags: ["ollama", "local"]
created: "2026-05-19"
updated: "2026-05-19"

transport: "ollama"
capabilities: ["text_generation", "chat", "tool_use"]
auth: "none"
cost_model: "self_hosted"
endpoint: "http://localhost:11434"
default_model: "llama3.1:8b"
