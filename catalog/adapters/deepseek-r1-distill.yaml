id: "adapter/deepseek-r1-distill"
type: adapter
version: "0.1.0"
name: "DeepSeek R1 Distill (open-weights reasoning)"
description: |
  DeepSeek R1 distilled into Qwen/Llama bases (1.5B / 7B / 14B / 32B / 70B).
  Open-weights reasoning model with explicit `<think>...</think>` chain-of-
  thought. MIT-licensed weights. Runs via Ollama (`ollama:deepseek-r1:32b`),
  vLLM, llama.cpp. Code-interpreter friendly (used in AIMO-2 pipeline).
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["cross_industry"]
capability: ["generation", "dialogue", "code_execution"]
modality:   ["text"]
lifecycle:  "stable"
trust_boundary: "local"
tags: ["deepseek", "deepseek-r1", "reasoning", "open-weights", "mit", "ollama"]
created: "2026-05-22"
updated: "2026-05-22"

transport: "ollama"
capabilities: ["text_generation", "chat", "tool_use"]
auth: "none"
cost_model: "self_hosted"
endpoint: "http://localhost:11434"
default_model: "deepseek-r1:32b"
