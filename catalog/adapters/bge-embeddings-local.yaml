id: "adapter/bge-embeddings-local"
type: adapter
version: "0.1.0"
name: "BGE embeddings (local)"
description: |
  Local BGE (BAAI General Embeddings) via sentence-transformers. The
  small variant is 384-dim and runs on CPU; the large variant is
  1024-dim and benefits from GPU. Strong English + multilingual
  baselines; no API key needed.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["cross_industry", "ai"]
capability: ["embedding"]
modality:   ["text"]
lifecycle:  "stable"
trust_boundary: "local"
tags: ["bge", "embeddings", "local"]
created: "2026-05-19"
updated: "2026-05-19"

transport: "transformers"
capabilities: ["embedding"]
auth: "local_only"
cost_model: "self_hosted"
default_model: "BAAI/bge-small-en-v1.5"
