id: "adapter/anthropic-claude-opus"
type: adapter
version: "0.1.0"
name: "Anthropic Claude Opus (deep-reasoning frontier-class)"
description: |
  Anthropic Claude Opus 4.x — deeper reasoning + 1M-context variant
  for tasks where Sonnet is bottlenecked by reasoning depth (long
  legal briefs, deep-tier supplier chain traversal, complex multi-
  hop research). Slower + more expensive per token but dominates
  on reasoning benchmarks.

  Requires `ANTHROPIC_API_KEY`.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["ai", "cross_industry"]
capability: ["generation", "dialogue", "tool_use", "reasoning"]
modality:   ["text"]
lifecycle:  "stable"
trust_boundary: "external"
tags: ["anthropic", "claude", "opus", "frontier", "deep-reasoning", "1m-context"]
created: "2026-05-19"
updated: "2026-05-19"

transport:    "anthropic"
capabilities: ["text_generation", "chat", "tool_use", "long_context", "vision", "deep_reasoning"]
auth:         "api_key"
cost_model:   "paid"
endpoint:     "https://api.anthropic.com"
default_model: "claude-opus-4-7"
