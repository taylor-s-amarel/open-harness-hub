id: "adapter/google-gemini"
type: adapter
version: "0.1.0"
name: "Google Gemini (multimodal frontier)"
description: |
  Google Gemini frontier-class adapter — strongest of the three
  big-three frontier vendors on multimodal (vision + audio + video)
  tasks. Use when the pipeline needs to process images / video as
  primary inputs (radiology, satellite imagery for deforestation
  monitoring, audio grievance recordings).

  Requires `GOOGLE_API_KEY` (or workload-identity in GCP).
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["ai", "cross_industry"]
capability: ["generation", "dialogue", "tool_use", "reasoning"]
modality:   ["text", "image", "audio", "video"]
lifecycle:  "stable"
trust_boundary: "external"
tags: ["google", "gemini", "frontier", "multimodal"]
created: "2026-05-19"
updated: "2026-05-19"

transport:    "google_gemini"
capabilities: ["text_generation", "chat", "tool_use", "long_context", "vision", "audio", "video"]
auth:         "api_key"
cost_model:   "paid"
endpoint:     "https://generativelanguage.googleapis.com"
default_model: "gemini-3-pro"
