id: "processor/hybrid-bm25-vector-retrieve"
type: processor
version: "0.1.0"
name: "Hybrid BM25 + vector retrieve"
description: "Combine BM25 lexical scoring with vector cosine similarity (reciprocal rank fusion) for retrieval. Returns top-k chunks with merged ranking, preserving page anchors for citation."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["education", "research", "compliance"]
capability:  ["retrieval"]
modality:    ["text"]
lifecycle:   "stable"
trust_boundary: "local"
lifecycle_position: "api.retrieve"
created: "2026-05-21"
updated: "2026-05-21"

process_kind: "retrieve.hybrid_bm25_vector"
deterministic: true
side_effects: "none"

inputs:
  - name: "query"
    type: "string"
  - name: "embeddings"
    type: "object[]"
  - name: "top_k"
    type: "integer"
outputs:
  - name: "context"
    type: "object[]"
config:
  default_top_k: 8
  fusion: "reciprocal_rank"
tags: ["retrieval", "bm25", "vector", "hybrid", "rrf"]
