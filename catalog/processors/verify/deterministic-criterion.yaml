id: "processor/verify-deterministic-criterion"
type: processor
version: "0.1.0"
name: "Deterministic comparison success-criterion evaluator"
description: |
  Evaluates one `kind: deterministic` success criterion. Resolves a
  target value from the pipeline trace and applies a comparison
  operator (>, >=, <, <=, ==, !=, in, not_in, is_truthy, is_falsy)
  against an expected value.

  Use for: 'pipeline output count > 5', 'severity_counts.critical == 0',
  'rule-pack fire count < 3', etc.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["cross_industry"]
capability: ["verification", "evaluation"]
modality:   ["text", "structured"]
lifecycle:  "stable"
trust_boundary: "local"
lifecycle_position: "post_api.verify"
tags: ["success-criterion", "deterministic", "comparison"]
created: "2026-05-20"
updated: "2026-05-20"

process_kind: "verify.deterministic_criterion"
deterministic: true
side_effects: "none"

inputs:
  - name: "target_value"
    type: "any"
  - name: "op"
    type: "string"
  - name: "value"
    type: "any"
outputs:
  - name: "pass"
    type: "boolean"
  - name: "actual"
    type: "any"
  - name: "comparison"
    type: "string"
