id: "processor/escalate-human-review"
type: processor
version: "0.1.0"
name: "Escalate to human reviewer"
description: |
  Route an output (and its full trace + context) to a human reviewer
  queue. Used when a safety gate fires, a confidence threshold is not
  met, or a red-flag classifier triggers. Pluggable backend:
  generic task queue, Linear, Jira, Slack, or a custom webhook.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["cross_industry"]
capability: ["routing", "safety_gating"]
modality:   ["text", "structured"]
lifecycle:  "beta"
lifecycle_position: "post_api.audit"
trust_boundary: "external"
created: "2026-05-19"
updated: "2026-05-19"

process_kind: "escalate.human"
deterministic: false
idempotent: false
streaming: false
latency_budget_ms: 500

inputs:
  - name: "case_id"
    type: "string"
  - name: "reason"
    type: "string"
  - name: "severity"
    type: "enum[low, medium, high, critical]"
  - name: "payload"
    type: "object"
outputs:
  - name: "ticket_url"
    type: "string"
  - name: "queue"
    type: "string"

side_effects: "external_call"
on_error: "retry"
retry:
  max_attempts: 3
  backoff: "exponential"

implementations:
  - kind: "http"
    url:  "https://hub.example.local/escalate"
  - kind: "callable"
    path: "processors.escalate_human.run"
