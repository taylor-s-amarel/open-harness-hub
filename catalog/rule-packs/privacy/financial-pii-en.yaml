id: "rule-pack/financial-pii-en"
type: rule-pack
version: "0.1.0"
name: "Financial PII (English)"
description: |
  Detection patterns for common financial PII in English transaction
  narratives and KYC documents — account numbers, IBANs, SWIFT/BIC,
  card PANs (Luhn-likely), SSN/TIN. Designed to gate any pipeline
  that exports beyond the institution's own systems.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["finance"]
capability: ["anonymization", "safety_gating"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "stable"
tags: ["financial-pii", "privacy"]
created: "2026-05-19"
updated: "2026-05-19"

family: "privacy"
language: "en"
rules:
  - id: "iban"
    pattern: "[A-Z]{2}\\d{2}[A-Z0-9]{4,30}"
    severity: "high"
    category: "fin.account"
    notes: "IBAN."
  - id: "swift_bic"
    pattern: "\\b[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?\\b"
    severity: "medium"
    category: "fin.routing"
    notes: "SWIFT / BIC code."
  - id: "us_routing_aba"
    pattern: "\\b(?:0[0-9]|1[0-2]|2[1-9]|3[0-2])\\d{7}\\b"
    severity: "high"
    category: "fin.routing"
    notes: "US ABA routing number heuristic."
  - id: "card_pan_luhn_like"
    pattern: "\\b(?:\\d[ -]?){13,19}\\b"
    severity: "critical"
    category: "fin.card"
    notes: "Potential card PAN. Confirm with a Luhn check downstream."
  - id: "ssn_tin"
    pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    severity: "critical"
    category: "fin.tax_id"
    notes: "US SSN / TIN."
  - id: "ein"
    pattern: "\\b\\d{2}-\\d{7}\\b"
    severity: "high"
    category: "fin.tax_id"
    notes: "US EIN."
  - id: "account_no_explicit"
    pattern: "(?i)\\baccount (?:no\\.?|number)\\s*:?\\s*[A-Z0-9-]{6,}"
    severity: "high"
    category: "fin.account"
