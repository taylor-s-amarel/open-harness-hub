id: "rule-pack/phi-hipaa-en"
type: rule-pack
version: "0.1.0"
name: "PHI (HIPAA 18-identifier) — English text"
description: |
  Detection patterns for the 18 HIPAA "Safe Harbor" PHI identifiers in
  English text. Designed to feed `harness/redact-pii-text` and any
  downstream healthcare pipeline that needs a hard PHI gate before
  model or external calls.

  This is a baseline; covered entities should layer institution-specific
  rules on top.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["healthcare"]
capability: ["anonymization", "safety_gating"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "stable"
tags: ["phi", "hipaa", "privacy"]
created: "2026-05-19"
updated: "2026-05-19"

family: "privacy"
language: "en"
rules:
  - id: "mrn"
    pattern: "(?i)\\b(?:MRN|medical record (?:no\\.?|number))\\s*:?\\s*[A-Z0-9-]{4,}\\b"
    severity: "critical"
    category: "phi.id"
    notes: "Medical record number (HIPAA #8)."
  - id: "health_plan_beneficiary"
    pattern: "(?i)\\b(?:HPB|HICN|MBI)\\s*:?\\s*[A-Z0-9-]{6,}\\b"
    severity: "critical"
    category: "phi.id"
    notes: "Health-plan beneficiary number (HIPAA #9) / Medicare Beneficiary Identifier."
  - id: "device_id_serial"
    pattern: "(?i)\\b(?:device (?:id|serial)|implant (?:id|serial))\\s*:?\\s*[A-Z0-9-]{4,}\\b"
    severity: "high"
    category: "phi.id"
    notes: "Device identifiers and serial numbers (HIPAA #15)."
  - id: "biometric_marker"
    pattern: "(?i)\\b(?:fingerprint|voiceprint|retinal scan)\\s*:?"
    severity: "critical"
    category: "phi.biometric"
    notes: "Biometric identifiers (HIPAA #16)."
  - id: "full_face_photo_ref"
    pattern: "(?i)\\b(?:full[- ]face (?:photo|photograph))"
    severity: "high"
    category: "phi.biometric"
    notes: "Full-face photographs (HIPAA #17)."
  - id: "ssn"
    pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    severity: "critical"
    category: "phi.id"
    notes: "US SSN (HIPAA #7)."
  - id: "phone"
    pattern: "(?i)(?:\\+?1[- .]?)?\\(?\\d{3}\\)?[- .]?\\d{3}[- .]?\\d{4}"
    severity: "high"
    category: "phi.contact"
    notes: "US phone numbers (HIPAA #4)."
  - id: "email"
    pattern: "(?i)[a-z0-9._%+-]+@[a-z0-9.-]+\\.[a-z]{2,}"
    severity: "high"
    category: "phi.contact"
    notes: "Email address (HIPAA #5)."
  - id: "url"
    pattern: "(?i)https?://[^\\s]+"
    severity: "medium"
    category: "phi.contact"
    notes: "URLs (HIPAA #14)."
  - id: "ipv4"
    pattern: "\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b"
    severity: "medium"
    category: "phi.contact"
    notes: "IP address (HIPAA #13)."
  - id: "address_zip_us"
    pattern: "\\b\\d{5}(?:-\\d{4})?\\b"
    severity: "medium"
    category: "phi.address"
    notes: "US ZIP code (HIPAA #2). Generalize to first 3 digits if population > 20k under Safe Harbor."
  - id: "date_full"
    pattern: "\\b\\d{1,2}/\\d{1,2}/\\d{4}\\b"
    severity: "medium"
    category: "phi.date"
    notes: "Full date (HIPAA #3 — generalize to year for ages < 90)."
  - id: "age_over_89"
    pattern: "(?i)\\b(9[0-9]|1[0-9]{2})[- ]?(?:year|yr)s?[- ]old\\b"
    severity: "high"
    category: "phi.demographic"
    notes: "Ages > 89 are PHI under Safe Harbor (HIPAA #3)."
