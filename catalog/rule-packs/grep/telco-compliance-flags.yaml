id: "rule-pack/grep-telco-compliance-flags"
type: rule-pack
version: "0.1.0"
name: "Telco compliance red-flag detectors (FCC / CPNI / CALEA)"
description: "Detectors for telco regulatory gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["telecommunications", "telecommunications.fcc", "telecommunications.cpni"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["telco"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "cpni_breach_unreported_7d"
    pattern: "(?i)cpni\\s+breach[\\s\\S]{0,500}?(?:not\\s+(?:yet\\s+)?(?:reported|notified|filed)|unreported|past\\s+7\\s+(?:business\\s+)?days|delayed|customer\\s+notification\\s+not\\s+yet|ussf?\\s*\\+\\s*fbi\\s+not\\s+yet\\s+notified)"
    severity: "critical"
    category: "telco.cpni.breach_unreported"
  - id: "cpni_used_for_marketing_no_optin"
    pattern: "(?i)cpni\\s+(?:used|shared)\\s+for\\s+marketing(?!.{0,200}(?:opt[- ]?in|customer\\s+consent|prior\\s+consent))"
    severity: "critical"
    category: "telco.cpni.no_optin"
  - id: "stir_shaken_missing"
    pattern: "(?i)stir[-/ ]?shaken\\s+(?:not\\s+(?:implemented|attesting|signing)|missing|absent)|(?:has\\s+not\\s+implemented\\s+stir[-/ ]?shaken)|outbound\\s+calls\\s+unsigned"
    severity: "critical"
    category: "telco.fcc.stir_shaken_missing"
  - id: "nors_outage_unreported_120min"
    pattern: "(?i)(?:nors|network\\s+outage|initial\\s+outage\\s+report)\\s+(?:report\\s+)?(?:past\\s+120\\s*minutes|delayed|unreported|not\\s+filed\\s+within\\s+120\\s*minutes)|outage\\s+>\\s*900[- ]?k(?:[- ]?user)?[- ]?minutes(?!.{0,200}reported)"
    severity: "critical"
    category: "telco.fcc.nors_late"
  - id: "calea_lawful_intercept_not_ready"
    pattern: "(?i)calea\\s+(?:lawful[- ]?intercept\\s+(?:capability\\s+)?)?(?:not\\s+(?:ready|implemented|certified)|gap)|lawful[- ]?intercept\\s+(?:capability\\s+)?(?:missing|gap|not\\s+ready)"
    severity: "high"
    category: "telco.calea.not_ready"
  - id: "e911_reliability_gap"
    pattern: "(?i)e911\\s+(?:reliability|location[- ]?accuracy)\\s+(?:gap|below|fail)|enhanced\\s+911\\s+(?:noncompliance|outage)"
    severity: "critical"
    category: "telco.e911.reliability"
  - id: "data_retention_violation"
    pattern: "(?i)(?:cpni|billing|call[- ]?detail)\\s+records?\\s+(?:retained|kept)\\s+(?:beyond|past|over)\\s+(?:retention\\s+limit|18\\s+months|seven\\s+years)"
    severity: "high"
    category: "telco.data_retention"
  - id: "robocall_threshold_complaints"
    pattern: "(?i)robocall\\s+(?:complaints?|violations?)\\s+(?:exceed|over|above)\\s+(?:threshold|limit|\\d+)"
    severity: "high"
    category: "telco.robocall.complaints"
  - id: "tcpa_violation_indicator"
    pattern: "(?i)tcpa\\s+(?:violation|noncompliance|class[- ]?action)|automated[- ]?dial(?:er|ing).{0,80}without\\s+prior\\s+express\\s+consent"
    severity: "high"
    category: "telco.tcpa"
  - id: "spectrum_auction_compliance"
    pattern: "(?i)(?:spectrum|frequency)\\s+(?:license|allocation)\\s+(?:expired|past\\s+renewal|noncompliant)"
    severity: "medium"
    category: "telco.spectrum.license"
