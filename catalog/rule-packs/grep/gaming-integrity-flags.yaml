id: "rule-pack/grep-gaming-integrity-flags"
type: rule-pack
version: "0.1.0"
name: "Gaming integrity / AML / responsible-gambling flags"
description: "Detectors for gaming compliance gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["gaming", "gaming.aml", "gaming.responsible_gambling"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["gaming"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "self_excluded_player"
    pattern: "(?i)player\\s+(?:on\\s+)?(?:self[- ]?exclusion|exclusion)\\s+list|opted[- ]?out\\s+(?:via|under)\\s+(?:state|voluntary)\\s+(?:exclusion|self[- ]?exclusion)"
    severity: "critical"
    category: "gaming.self_exclusion.hit"
  - id: "ctr_aggregation_threshold"
    pattern: "(?i)(?:cash\\s+transaction|aggregated|aggregate)\\s+(?:total|amount)\\s+(?:over|>|above|exceeds?)\\s+(?:\\$|usd)?\\s*(?:10[,]?000|10k)"
    severity: "critical"
    category: "gaming.aml.ctr_threshold"
  - id: "structuring_indicator"
    pattern: "(?i)multiple\\s+(?:transactions?|cash\\s+(?:in|out))\\s+(?:just\\s+below|under)\\s+(?:\\$|usd)?\\s*(?:10[,]?000|10k|threshold)|structuring"
    severity: "critical"
    category: "gaming.aml.structuring"
  - id: "rapid_loss_velocity"
    pattern: "(?i)(?:loss(?:es)?|wagers?)\\s+(?:exceed|over|>)\\s+\\$?\\s*\\d{4,}\\s+(?:in|within|over)\\s+(?:1|2|3)\\s+hours?"
    severity: "high"
    category: "gaming.responsible_gambling.rapid_loss"
  - id: "deposit_limit_override"
    pattern: "(?i)deposit\\s+limit\\s+(?:override|bypassed|disabled|removed)"
    severity: "high"
    category: "gaming.responsible_gambling.limit_override"
  - id: "sar_threshold_unfilled"
    pattern: "(?i)(?:sar|suspicious\\s+activity\\s+report)\\s+(?:threshold\\s+)?(?:not\\s+(?:filed|submitted|filled)|past\\s+30\\s+days)"
    severity: "critical"
    category: "gaming.aml.sar_unfilled"
  - id: "source_of_funds_gap"
    pattern: "(?i)source[- ]?of[- ]?funds\\s+(?:not\\s+verified|missing|gap)\\s+(?:on|for)\\s+(?:high[- ]?value|vip|>\\s*\\$\\s*\\d{4,})\\s+(?:play|deposit|wager)"
    severity: "high"
    category: "gaming.aml.sof_gap"
  - id: "minor_age_verification_gap"
    pattern: "(?i)age\\s+verification\\s+(?:not\\s+(?:performed|completed)|skipped|gap)|under[- ]?age\\s+(?:player|access)"
    severity: "critical"
    category: "gaming.minor_protection"
  - id: "license_expiration"
    pattern: "(?i)(?:gaming\\s+)?license\\s+(?:expired|past\\s+(?:renewal|due)|expires?\\s+(?:in\\s+)?\\d{1,2}\\s+days?)"
    severity: "high"
    category: "gaming.licensing.expired"
  - id: "ssn_in_player_record"
    pattern: "(?<!\\d)\\d{3}-\\d{2}-\\d{4}(?!\\d)"
    severity: "high"
    category: "gaming.pii.ssn_unredacted"
  - id: "match_fixing_indicator"
    pattern: "(?i)(?:match[- ]?fixing|game[- ]?fixing|insider[- ]?information)\\s+(?:indicator|alert|report)"
    severity: "critical"
    category: "gaming.integrity.match_fixing"
  - id: "vip_host_red_flag"
    pattern: "(?i)vip\\s+(?:host|comp)\\s+(?:bypass|override)\\s+(?:limit|kyc|verification)"
    severity: "high"
    category: "gaming.aml.vip_override"
