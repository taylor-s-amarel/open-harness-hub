id: "rule-pack/grep-real-estate-dd-red-flags"
type: rule-pack
version: "0.1.0"
name: "Real estate DD red-flag detectors"
description: "GREP detectors for title/ESA/structural/zoning issues."
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["real_estate", "real_estate.due_diligence"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["real-estate", "due-diligence"]
created: "2026-05-20"
updated: "2026-05-20"

family: "grep"
rules:
  - id: "open_permit"
    pattern: "(?i)(?:open|expired|unresolved)\\s+(?:building\\s+)?permit"
    severity: "critical"
    category: "real_estate.title.open_permit"
  - id: "unrecorded_transfer"
    pattern: "(?i)unrecorded\\s+(?:transfer|deed|conveyance|mortgage)"
    severity: "critical"
    category: "real_estate.title.unrecorded"
  - id: "mechanics_lien"
    pattern: "(?i)mechanic[''']?s?\\s+lien|materialmen[''']?s\\s+lien|construction\\s+lien"
    severity: "high"
    category: "real_estate.title.mechanics_lien"
  - id: "environmental_rec"
    pattern: "(?i)(?<!no\\s)(?<!no\\sknown\\s)(?<!no\\sidentified\\s)\\b(?:recognized\\s+environmental\\s+condition|REC)\\s+(?:identified|present|detected|noted|found|reported|documented)|controlled\\s+environmental\\s+condition|former\\s+(?:dry\\s+cleaner|gas\\s+station|industrial\\s+use)"
    severity: "critical"
    category: "real_estate.environmental.rec"
  - id: "vapor_intrusion"
    pattern: "(?i)vapor\\s+intrusion(?:\\s+(?:concern|pathway))?"
    severity: "high"
    category: "real_estate.environmental.vapor_intrusion"
  - id: "asbestos_lead_paint"
    pattern: "(?i)\\b(asbestos|lead[- ]?based\\s+paint|acm|lbp)\\s+(?:present|detected|suspect)"
    severity: "high"
    category: "real_estate.environmental.acm_lbp"
  - id: "underground_storage_tank"
    pattern: "(?i)\\bust\\b|underground\\s+storage\\s+tank|leaking\\s+ust"
    severity: "high"
    category: "real_estate.environmental.ust"
  - id: "unpermitted_alteration"
    pattern: "(?i)unpermitted\\s+(?:alteration|addition|conversion|change\\s+of\\s+use)"
    severity: "high"
    category: "real_estate.zoning.unpermitted_alteration"
  - id: "co_expired"
    pattern: "(?i)(?:certificate\\s+of\\s+occupancy|\\bco\\b)\\s+(?:expired|revoked|not\\s+issued)"
    severity: "critical"
    category: "real_estate.zoning.no_co"
  - id: "pending_litigation"
    pattern: "(?i)pending\\s+(?:litigation|lawsuit|action|condemnation|eminent\\s+domain)"
    severity: "high"
    category: "real_estate.title.pending_litigation"
  - id: "foundation_issue"
    pattern: "(?i)(?:foundation\\s+(?:settlement|crack|movement|failure)|structural\\s+integrity\\s+(?:concern|compromised))"
    severity: "high"
    category: "real_estate.structural.foundation"
  - id: "roof_eol"
    pattern: "(?i)roof\\s+(?:end[- ]?of[- ]?life|past\\s+useful\\s+life|active\\s+leaks?|deferred\\s+maintenance)"
    severity: "medium"
    category: "real_estate.structural.roof"
  - id: "ada_noncompliance"
    pattern: "(?i)ada\\s+(?:noncompliance|violations?|barriers?)|not\\s+ada[- ]?compliant"
    severity: "medium"
    category: "real_estate.accessibility.ada"
  - id: "zoning_variance_lapsed"
    pattern: "(?i)variance\\s+(?:lapsed|expired|conditions\\s+not\\s+met)|special\\s+(?:use\\s+)?permit\\s+expired"
    severity: "high"
    category: "real_estate.zoning.variance_lapsed"
  - id: "flood_zone_no_insurance"
    pattern: "(?i)flood\\s+zone\\s+[A-Z]\\d?(?!.{0,200}(?:flood\\s+insurance|nfip))"
    severity: "medium"
    category: "real_estate.environmental.flood_zone"
