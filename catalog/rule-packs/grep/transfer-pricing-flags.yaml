id: "rule-pack/grep-transfer-pricing-flags"
type: rule-pack
version: "0.1.0"
name: "Transfer-pricing red-flag detectors (OECD / §482 / BEPS)"
description: "Detectors for transfer-pricing risk."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["tax", "tax.transfer_pricing", "finance"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["tax", "transfer-pricing"]
created: "2026-05-20"
updated: "2026-05-20"

family: "grep"
rules:
  - id: "no_benchmarking_study"
    pattern: "(?i)(?:no|absent|missing)\\s+benchmarking\\s+(?:study|analysis)|comparables\\s+(?:not\\s+(?:identified|tested))|tnmm\\s+without\\s+(?:comparables|benchmark)"
    severity: "critical"
    category: "tax.tp.no_benchmarking"
  - id: "embedded_royalty_no_ip"
    pattern: "(?i)(?:embedded\\s+royalty|hidden\\s+royalty)\\s+(?:without|absent)\\s+(?:ip\\s+(?:analysis|economic\\s+ownership)|deemp(?:ed)?\\s+ownership)"
    severity: "high"
    category: "tax.tp.embedded_royalty"
  - id: "captive_insurance_no_risk"
    pattern: "(?i)captive\\s+insurance(?:\\s+(?:company|reinsurance))?(?!.{0,200}(?:risk\\s+transfer|risk\\s+distribution|risk\\s+diversification|underwriting\\s+activity))"
    severity: "high"
    category: "tax.tp.captive_no_risk"
  - id: "loss_making_lrd"
    pattern: "(?i)(?:limited[- ]?risk\\s+distributor|lrd)\\s+(?:loss[- ]?making|negative\\s+margin|below\\s+arm'?s[- ]?length\\s+range)"
    severity: "critical"
    category: "tax.tp.loss_making_lrd"
  - id: "cash_pool_below_arm_length"
    pattern: "(?i)cash[- ]?pool(?:ing)?\\s+(?:interest|rate)\\s+(?:below\\s+arm'?s[- ]?length|below\\s+market|zero|nil)"
    severity: "high"
    category: "tax.tp.cash_pool_interest"
  - id: "no_master_file"
    pattern: "(?i)(?:no|absent|missing)\\s+master\\s+file|master\\s+file\\s+(?:not\\s+(?:prepared|filed))"
    severity: "high"
    category: "tax.tp.no_master_file"
  - id: "no_local_file"
    pattern: "(?i)(?:no|absent|missing)\\s+local\\s+file|local\\s+file\\s+(?:not\\s+(?:prepared|filed))"
    severity: "high"
    category: "tax.tp.no_local_file"
  - id: "no_cbcr"
    pattern: "(?i)country[- ]?by[- ]?country\\s+report(?:ing)?\\s+(?:not\\s+(?:prepared|filed)|missing)|cbcr\\s+(?:filing\\s+)?(?:gap|missing)"
    severity: "high"
    category: "tax.tp.no_cbcr"
  - id: "hard_to_value_intangible"
    pattern: "(?i)(?:hard[- ]?to[- ]?value\\s+intangible|htvi)(?!.{0,300}(?:ex[- ]?post\\s+adjust|post[- ]?transaction\\s+price\\s+adjustment))"
    severity: "high"
    category: "tax.tp.htvi"
  - id: "cca_no_balancing_payment"
    pattern: "(?i)cost\\s+contribution\\s+arrangement\\s+(?:without\\s+balancing\\s+payment|imbalanced|no\\s+true[- ]?up)"
    severity: "medium"
    category: "tax.tp.cca_imbalanced"
  - id: "pillar_two_etr_below_15"
    pattern: "(?i)(?:effective\\s+tax\\s+rate|etr)\\s+(?:below|under)\\s+15\\s*%(?!.{0,200}(?:substance[- ]?based\\s+income\\s+exclusion|sbie|top[- ]?up\\s+tax\\s+computed))"
    severity: "critical"
    category: "tax.pillar_two.etr_below_15"
  - id: "permanent_establishment_risk"
    pattern: "(?i)(?:dependent\\s+agent|fixed\\s+place\\s+of\\s+business|home[- ]?office\\s+pe)\\s+(?:risk|exposure)(?!.{0,200}(?:exempt|article\\s+5\\(4\\)|excepted))"
    severity: "high"
    category: "tax.tp.pe_risk"
  - id: "fin_tx_no_credit_rating"
    pattern: "(?i)(?:intercompany|related[- ]?party)\\s+(?:loan|guarantee|credit\\s+facility)(?!.{0,200}(?:credit\\s+rating|implicit\\s+support|standalone))"
    severity: "medium"
    category: "tax.tp.fin_tx_no_rating"
