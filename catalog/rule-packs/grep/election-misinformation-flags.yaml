id: "rule-pack/grep-election-misinformation-flags"
type: rule-pack
version: "0.1.0"
name: "Election misinformation / disinformation / deepfake detectors"
description: "Heuristic GREP detectors for common election-misinformation patterns."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["election_integrity", "media", "media.factcheck"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["election-integrity"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "wrong_polling_place_claim"
    pattern: "(?i)(?:voting\\s+location|polling\\s+place|vote\\s+at)\\s+(?:changed|moved|relocated)\\s+to\\s+\\d+\\s+\\w+(?!.{0,200}(?:cite|source|official|verify))"
    severity: "critical"
    category: "election.wrong_polling_place"
  - id: "wrong_election_date_claim"
    pattern: "(?i)(?:election\\s+(?:date|day)|vote)\\s+(?:moved|postponed|changed)\\s+to\\s+(?:\\d{1,2}|[a-z]+)\\s+(?:[a-z]+|\\d{4})(?!.{0,200}(?:official|state\\s+source))"
    severity: "critical"
    category: "election.wrong_date"
  - id: "fake_ballot_instruction"
    pattern: "(?i)(?:to\\s+vote\\s+(?:for|against)|mark\\s+ballot)\\s+(?:democrat|republican|liberal|conservative|labour|tory)(?!.{0,200}(?:state\\s+law|official\\s+instructions|secretary\\s+of\\s+state))"
    severity: "high"
    category: "election.fake_ballot_instruction"
  - id: "voter_id_misinformation"
    pattern: "(?i)(?:must\\s+(?:have|bring)|required)\\s+(?:photo\\s+id|driver'?s?\\s+license|passport|social\\s+security)\\s+(?:to\\s+vote)(?!.{0,200}(?:state[- ]?specific|consult\\s+secretary))"
    severity: "high"
    category: "election.voter_id_misinformation"
  - id: "deepfake_artifact_keyword"
    pattern: "(?i)(?:lip[- ]?sync\\s+(?:off|mismatched)|c2pa\\s+(?:missing|absent|stripped)|content\\s+credentials\\s+removed|metadata\\s+(?:scrubbed|stripped))"
    severity: "high"
    category: "election.deepfake_artifact"
  - id: "coordinated_inauthentic_behavior"
    pattern: "(?i)(?:coordinated\\s+inauthentic\\s+behavior|botnet|sockpuppet\\s+network|astroturf)(?:\\s+(?:detected|identified))?"
    severity: "high"
    category: "election.cib"
  - id: "voter_intimidation_text"
    pattern: "(?i)(?:do\\s+not\\s+vote\\s+if|stay\\s+home|police\\s+will\\s+be|ice\\s+(?:agents?\\s+)?at\\s+(?:polls|polling))\\s+"
    severity: "critical"
    category: "election.voter_intimidation"
  - id: "fake_official_seal_claim"
    pattern: "(?i)(?:official\\s+(?:state|county)\\s+election|secretary\\s+of\\s+state\\s+notice)(?!.{0,400}(?:\\.gov|verified\\s+source|cite))"
    severity: "medium"
    category: "election.fake_authority"
  - id: "incorrect_eligibility_claim"
    pattern: "(?i)(?:cannot\\s+vote|ineligible)\\s+if\\s+(?:you\\s+(?:rent|are\\s+a\\s+felon|are\\s+unemployed|live\\s+with\\s+parents|have\\s+a\\s+student\\s+visa))"
    severity: "high"
    category: "election.fake_eligibility"
  - id: "voter_roll_pii_in_public"
    pattern: "(?<!\\d)\\d{3}-\\d{2}-\\d{4}(?!\\d)"
    severity: "critical"
    category: "election.voter_roll_pii_leak"
