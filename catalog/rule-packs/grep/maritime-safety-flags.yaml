id: "rule-pack/grep-maritime-safety-flags"
type: rule-pack
version: "0.1.0"
name: "Maritime safety red-flag detectors (SOLAS / MARPOL / ISM)"
description: "Detectors for vessel + crew + management deficiencies."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["maritime", "maritime.safety"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["maritime", "imo"]
created: "2026-05-20"
updated: "2026-05-20"

family: "grep"
rules:
  - id: "lifeboat_deficient"
    pattern: "(?i)(?:lifeboat|life[- ]?raft|davit)\\s+(?:inoperative|deficient|missing|past\\s+overhaul|exceed(?:s|ing)?\\s+(?:5|10)\\s+year\\s+overhaul)"
    severity: "critical"
    category: "maritime.lsa.lifeboat"
  - id: "epirb_battery_expired"
    pattern: "(?i)(?:epirb|emergency\\s+position[- ]?indicating\\s+radio\\s+beacon)\\s+(?:battery\\s+expired|inoperative|test\\s+failed)|sart\\s+(?:expired|deficient)"
    severity: "critical"
    category: "maritime.radio.epirb"
  - id: "ism_doc_smc_invalid"
    pattern: "(?i)(?:document\\s+of\\s+compliance|\\bdoc\\b|safety\\s+management\\s+certificate|\\bsmc\\b)\\s+(?:expired|invalid|suspended|withdrawn)"
    severity: "critical"
    category: "maritime.ism.doc_smc_invalid"
  - id: "no_dpa"
    pattern: "(?i)(?:no|absent|undesignated)\\s+(?:designated\\s+person\\s+ashore|dpa)|dpa\\s+(?:not\\s+(?:appointed|identified))"
    severity: "high"
    category: "maritime.ism.no_dpa"
  - id: "oil_record_book_gap"
    pattern: "(?i)(?:oil\\s+record\\s+book|\\borb\\b)\\s+(?:gap|missing\\s+entries|incomplete|backdated|inconsistent\\s+with\\s+tanks)"
    severity: "critical"
    category: "maritime.marpol.orb_gap"
  - id: "garbage_record_book_gap"
    pattern: "(?i)garbage\\s+record\\s+book\\s+(?:gap|missing|not\\s+maintained)|marpol\\s+annex\\s+v\\s+noncompliance"
    severity: "high"
    category: "maritime.marpol.garbage_book"
  - id: "ballast_water_treatment_gap"
    pattern: "(?i)ballast\\s+water\\s+(?:treatment|management)\\s+(?:bypass|inoperative|noncompliant)|bwm[- ]?convention\\s+(?:noncompliance|exception)"
    severity: "high"
    category: "maritime.marpol.bw_treatment"
  - id: "ecdis_outdated_chart"
    pattern: "(?i)(?:ecdis\\s+chart|enc)\\s+(?:outdated|past\\s+update|not\\s+current)|charts?\\s+for\\s+route\\s+missing"
    severity: "high"
    category: "maritime.navigation.ecdis"
  - id: "sopep_gap"
    pattern: "(?i)(?:shipboard\\s+oil\\s+pollution\\s+emergency\\s+plan|sopep)\\s+(?:missing|not\\s+(?:approved|maintained))|smpep\\s+missing"
    severity: "high"
    category: "maritime.marpol.sopep"
  - id: "stcw_certificate_expired"
    pattern: "(?i)(?:stcw\\s+certificate|certificate\\s+of\\s+competency|coc)\\s+(?:expired|invalid|not\\s+endorsed\\s+by\\s+flag)"
    severity: "critical"
    category: "maritime.crew.stcw_expired"
  - id: "work_rest_hours_violation"
    pattern: "(?i)(?:work[- ]?rest|mlc\\s+2006|hours\\s+of\\s+rest)\\s+(?:violation|noncompliance|fell\\s+short|below\\s+(?:10|77)\\s+hour)"
    severity: "high"
    category: "maritime.crew.work_rest"
  - id: "isps_security_breach"
    pattern: "(?i)(?:isps|international\\s+ship\\s+and\\s+port\\s+facility\\s+security)\\s+(?:breach|deficiency|access\\s+control\\s+failure|noncompliance|violation)|ssas\\s+(?:inoperative|test\\s+(?:failed|deficient))|gate\\s+(?:left\\s+open|propped)"
    severity: "high"
    category: "maritime.security.isps"
