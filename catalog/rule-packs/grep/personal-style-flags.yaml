id: "rule-pack/grep-personal-style-flags"
type: rule-pack
version: "0.1.0"
name: "Personal style flags (catches disallowed idioms)"
description: "GREP-family detectors that flag content the user has disallowed. Out-of-the-box catches: em dashes, marketing-speak verbs (delve, leverage), hedging adjectives (robust, seamless), trailing summaries, fabricated-citation patterns. Fork + customize the rules to your preferences."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry: ["cross_industry"]
capability: ["classification", "safety_gating"]
modality: ["text"]
lifecycle: "beta"
trust_boundary: "local"
freshness: "volatile"
tags: ["personal", "style", "preferences"]
created: "2026-05-22"
updated: "2026-05-22"

family: "grep"
rules:
  - id: "em_dash_present"
    pattern: "—"
    severity: "high"
    category: "style.em_dash"
  - id: "marketing_delve"
    pattern: "(?i)\\bdelve\\b"
    severity: "medium"
    category: "style.marketing.delve"
  - id: "marketing_leverage"
    pattern: "(?i)\\bleverag(?:e|ing|ed)\\b"
    severity: "medium"
    category: "style.marketing.leverage"
  - id: "marketing_robust"
    pattern: "(?i)\\brobust\\b"
    severity: "low"
    category: "style.marketing.robust"
  - id: "marketing_seamless"
    pattern: "(?i)\\bseamless(?:ly)?\\b"
    severity: "low"
    category: "style.marketing.seamless"
  - id: "marketing_cutting_edge"
    pattern: "(?i)\\bcutting[- ]edge\\b"
    severity: "low"
    category: "style.marketing.cutting_edge"
  - id: "marketing_in_realm_of"
    pattern: "(?i)\\bin the realm of\\b"
    severity: "medium"
    category: "style.marketing.realm"
  - id: "marketing_worth_noting"
    pattern: "(?i)\\bit'?s worth noting\\b"
    severity: "medium"
    category: "style.marketing.worth_noting"
  - id: "trailing_in_summary"
    pattern: "(?i)\\bin (summary|conclusion)\\b|\\boverall,\\s|\\bto sum up\\b"
    severity: "low"
    category: "style.trailing_summary"
  - id: "hedge_certainly"
    pattern: "(?i)\\bcertainly\\b|\\babsolutely\\b"
    severity: "low"
    category: "style.hedge"
  - id: "fabricated_citation_shape"
    pattern: "\\([A-Z][a-z]+(?:\\s+(?:et\\s+al\\.?|&\\s+[A-Z][a-z]+))?\\s*,?\\s+(?:19|20)[0-9]{2}\\)(?![\\s\\S]{0,400}references?:|\\s*\\[bibliography\\])"
    severity: "medium"
    category: "style.citation.likely_fabricated"
