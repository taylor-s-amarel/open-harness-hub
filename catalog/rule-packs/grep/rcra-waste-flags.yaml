id: "rule-pack/grep-rcra-waste-flags"
type: rule-pack
version: "0.1.0"
name: "RCRA hazardous waste + e-Manifest + DOT HMR flags"
description: "Detectors for 40 CFR 260-279 + e-Manifest + DOT 49 CFR 172 compliance gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["waste", "waste.rcra_tsdf", "waste.generator", "waste.universal"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["rcra", "waste", "hazmat"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "generator_status_miscategorized_lqg"
    pattern: "(?i)(?:self[- ]?identified|categorized)\\s+as\\s+(?:a\\s+)?(?:small\\s+quantity\\s+generator|sqg|vsqg)[\\s\\S]{0,300}?(?:generating\\s+(?:over\\s+1[0-9]{3}|>\\s*1000)\\s*kg|well\\s+into\\s+(?:lqg|large\\s+quantity)\\s+territory|placing\\s+it[\\s\\S]{0,160}?lqg)"
    severity: "critical"
    category: "waste.generator.miscategorized"
  - id: "accumulation_past_limit"
    pattern: "(?i)(?:drums?|containers?)[\\s\\S]{0,200}?(?:over\\s+1[0-9]{2}\\s+days?\\s+old|past\\s+(?:90|180|270)[- ]?day|exceeding\\s+(?:the\\s+)?(?:90|180|270)[- ]?day)"
    severity: "critical"
    category: "waste.accumulation.exceeded"
  - id: "container_marking_missing"
    pattern: "(?i)(?:no\\s+accumulation\\s+start\\s+date|drums?\\s+(?:with|observed)\\s+(?:with\\s+)?no\\s+(?:accumulation\\s+start\\s+date|hazardous\\s+waste\\s+marking|date\\s+(?:on|written))|hazardous\\s+waste\\s+marking\\s+(?:missing|absent))"
    severity: "high"
    category: "waste.container.marking_missing"
  - id: "secondary_containment_missing"
    pattern: "(?i)(?:tank[\\s\\S]{0,80}?(?:sat|located|positioned)[\\s\\S]{0,80}?(?:bare\\s+asphalt|bare\\s+(?:concrete|dirt|ground)|no\\s+(?:secondary\\s+)?containment)|secondary\\s+containment\\s+(?:missing|absent|inadequate))"
    severity: "critical"
    category: "waste.tank.no_secondary"
  - id: "incompatible_wastes_co_stored"
    pattern: "(?i)(?:acid[\\s\\S]{0,80}?(?:cyanide|plating\\s+sludge)|cyanide[\\s\\S]{0,80}?acid|oxidizer[\\s\\S]{0,80}?organic|organic[\\s\\S]{0,80}?oxidizer)[\\s\\S]{0,200}?(?:same\\s+pallet|co[- ]?stored|stored\\s+together)|incompatible[- ]?waste(?:s)?\\s+violation"
    severity: "critical"
    category: "waste.storage.incompatible"
  - id: "weekly_inspection_gap"
    pattern: "(?i)(?:weekly\\s+(?:container\\s+|tank\\s+)?inspection|inspection\\s+log)[\\s\\S]{0,80}?(?:(?<!zero\\s)(?<!no\\s)gap|six[- ]?week\\s+gap|missed|not\\s+(?:performed|conducted))"
    severity: "medium"
    category: "waste.inspection.gap"
  - id: "ldr_notification_missing"
    pattern: "(?i)(?:ldr|land\\s+disposal\\s+restriction)\\s+notification\\s+(?:missing|absent|not\\s+attached|without\\s+(?:the\\s+)?(?:required\\s+)?ldr)|without\\s+(?:the\\s+)?(?:required\\s+)?ldr\\s+notification"
    severity: "critical"
    category: "waste.ldr.missing"
  - id: "dot_hazmat_training_missing"
    pattern: "(?i)(?:signing\\s+employee|shipping\\s+signatory)\\s+(?:held\\s+)?(?:no\\s+(?:current\\s+)?(?:dot\\s+)?hazmat\\s+training|hazmat\\s+training\\s+(?:expired|absent|missing|not\\s+current))|49\\s+cfr\\s+172\\.704\\s+(?:training\\s+)?(?:missing|expired)"
    severity: "high"
    category: "waste.dot.no_training"
  - id: "contingency_plan_not_shared_lepc"
    pattern: "(?i)(?:contingency\\s+plan|emergency\\s+plan)[\\s\\S]{0,200}?(?:never\\s+(?:been\\s+)?shared|not\\s+(?:coordinated|shared))[\\s\\S]{0,120}?(?:lepc|local\\s+fire\\s+department|fire\\s+department)"
    severity: "medium"
    category: "waste.contingency.no_lepc"
  - id: "satellite_accumulation_exceed_55gal"
    pattern: "(?i)satellite\\s+accumulation[\\s\\S]{0,200}?(?:over\\s+55\\s+gal|exceed(?:ing|s|ed)?\\s+55\\s*gallon|past\\s+55\\s+gallon)|excess\\s+satellite"
    severity: "medium"
    category: "waste.satellite.exceeded"
  - id: "biennial_report_missing"
    pattern: "(?i)(?:biennial\\s+report|form\\s+8700[- ]?13)\\s+(?:missing|not\\s+(?:filed|submitted)|overdue|past\\s+march\\s+1)"
    severity: "medium"
    category: "waste.biennial.missing"
  - id: "permit_expired_or_interim_no_part_b"
    pattern: "(?i)(?:part\\s+b\\s+permit|tsdf\\s+permit)\\s+(?:expired|in\\s+interim\\s+status\\s+without\\s+part\\s+b|lapsed)|interim\\s+status\\s+without\\s+(?:a\\s+)?part\\s+b"
    severity: "critical"
    category: "waste.permit.expired"
