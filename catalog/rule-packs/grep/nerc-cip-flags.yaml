id: "rule-pack/grep-nerc-cip-flags"
type: rule-pack
version: "0.1.0"
name: "NERC CIP compliance red-flag detectors"
description: "Detectors for NERC CIP gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["energy", "energy.grid", "security", "compliance"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["energy", "nerc", "cip"]
created: "2026-05-20"
updated: "2026-05-20"

family: "grep"
rules:
  - id: "no_baseline_config"
    pattern: "(?i)(?:no|absent|missing)\\s+baseline\\s+configuration|baseline\\s+configuration\\s+(?:not\\s+(?:documented|maintained))"
    severity: "critical"
    category: "energy.cip.no_baseline"
  - id: "unauthorized_firmware"
    pattern: "(?i)unauthorized\\s+(?:firmware|software|patch)|firmware\\s+(?:installed|deployed)\\s+(?:without\\s+(?:approval|change\\s+control))"
    severity: "critical"
    category: "energy.cip.unauthorized_firmware"
  - id: "expired_authorization"
    pattern: "(?i)(?:user\\s+)?authorization\\s+(?:expired|lapsed|past\\s+due)|access\\s+(?:not\\s+revoked|left\\s+active)\\s+(?:after|post)\\s+(?:termination|transfer|reassignment)"
    severity: "high"
    category: "energy.cip.expired_authorization"
  - id: "esp_gap"
    pattern: "(?i)(?:electronic\\s+security\\s+perimeter|\\besp\\b)\\s+(?:gap|inactive|disabled|bypassed)|esp\\s+rule\\s+(?:overly\\s+permissive|any[- ]?any|0\\.0\\.0\\.0)"
    severity: "critical"
    category: "energy.cip.esp_gap"
  - id: "psp_gap"
    pattern: "(?i)(?:physical\\s+security\\s+perimeter|\\bpsp\\b)\\s+(?:breach|unauthorized\\s+access|door\\s+propped|badge\\s+sharing)"
    severity: "critical"
    category: "energy.cip.psp_gap"
  - id: "unpatched_vuln_35d"
    pattern: "(?i)(?:unpatched|outstanding)\\s+(?:vulnerability|cve)\\s+(?:over|exceed(?:ing|s)?)\\s+35\\s+days|patch\\s+(?:past\\s+due|deferred\\s+beyond)\\s+35\\s+days"
    severity: "high"
    category: "energy.cip.unpatched_35d"
  - id: "no_irp"
    pattern: "(?i)(?:no|absent|missing)\\s+(?:cyber\\s+)?incident\\s+response\\s+plan|cip[- ]?008\\s+plan\\s+(?:not\\s+(?:documented|tested))"
    severity: "high"
    category: "energy.cip.no_incident_plan"
  - id: "no_recovery_plan"
    pattern: "(?i)(?:no|absent|missing|untested)\\s+recovery\\s+plan|cip[- ]?009\\s+plan\\s+(?:not\\s+(?:tested|maintained))"
    severity: "high"
    category: "energy.cip.no_recovery_plan"
  - id: "supply_chain_risk_unassessed"
    pattern: "(?i)(?:vendor|supplier|supply[- ]?chain)\\s+(?:risk|cyber)\\s+(?:not\\s+(?:assessed|reviewed))|cip[- ]?013\\s+plan\\s+missing"
    severity: "medium"
    category: "energy.cip.supply_chain"
  - id: "bes_cyber_uncategorized"
    pattern: "(?i)bes\\s+cyber\\s+(?:asset|system)\\s+(?:not\\s+categorized|impact\\s+rating\\s+(?:missing|tbd))|cip[- ]?002\\s+categorization\\s+(?:incomplete|pending)"
    severity: "critical"
    category: "energy.cip.no_categorization"
  - id: "personnel_risk_assessment_lapsed"
    pattern: "(?i)(?:personnel\\s+)?risk\\s+assessment\\s+(?:lapsed|overdue|past\\s+due)|criminal[- ]?history\\s+check\\s+(?:past\\s+7\\s+years|expired)"
    severity: "high"
    category: "energy.cip.pra_lapsed"
  - id: "removable_media_uncontrolled"
    pattern: "(?i)(?<!no\\s)\\b(?:removable\\s+media|usb\\s+drives?|portable\\s+drives?)\\s+(?:uncontrolled|introduced\\s+without\\s+(?:scan|approval))"
    severity: "high"
    category: "energy.cip.removable_media"
