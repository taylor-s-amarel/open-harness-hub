id: "rule-pack/grep-water-utility-flags"
type: rule-pack
version: "0.1.0"
name: "Water utility SDWA / LCRR / AWIA red-flag detectors"
description: "GREP detectors for SDWA compliance gaps + acute risks."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["water_utility", "water_utility.lcr", "water_utility.sdwa"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["water-utility"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "e_coli_mcl_violation"
    pattern: "(?i)(?:e[\\.\\s]\\s*coli|escherichia\\s+coli|fecal\\s+coliform)\\s+(?:positive|detected|present|mcl\\s+violation|exceeded)"
    severity: "critical"
    category: "water.acute.e_coli"
  - id: "nitrate_above_mcl"
    pattern: "(?i)nitrate.{0,40}(?:\\d{1,2}(?:\\.\\d+)?)\\s*mg(?:/|\\s*per\\s*)?l(?!.{0,200}below)|nitrate\\s+mcl\\s+(?:exceeded|violation)"
    severity: "critical"
    category: "water.acute.nitrate"
  - id: "lead_above_al"
    pattern: "(?i)lead\\s+(?:90th[- ]?percentile|al|action\\s+level)\\s+(?:exceed|over|above|>)\\s*\\d{1,3}\\s*(?:µg|ug|microgram)"
    severity: "critical"
    category: "water.lead.action_level_exceeded"
  - id: "lcrr_inventory_missing"
    pattern: "(?i)(?:lead\\s+service\\s+line\\s+inventory|lsli|lsl\\s+inventory)\\s+(?:not\\s+(?:complete|published|submitted)|missing|past\\s+(?:due|deadline))"
    severity: "critical"
    category: "water.lcrr.no_inventory"
  - id: "pn_tier_1_missed"
    pattern: "(?i)tier\\s+1\\s+(?:public\\s+)?notification\\s+(?:missed|past\\s+24\\s+hours|not\\s+issued|delayed)"
    severity: "critical"
    category: "water.public_notification.tier_1_missed"
  - id: "awia_rra_overdue"
    pattern: "(?i)(?:awia\\s+)?(?:risk\\s+and\\s+resilience\\s+assessment|rra)\\s+(?:overdue|expired|past\\s+5[- ]?year)|emergency\\s+response\\s+plan\\s+(?:overdue|outdated)"
    severity: "high"
    category: "water.awia.rra_overdue"
  - id: "scada_default_credentials"
    pattern: "(?i)scada\\s+(?:system|hmi|plc)\\s+(?:default\\s+(?:password|credentials)|unchanged\\s+default)"
    severity: "critical"
    category: "water.scada.default_credentials"
  - id: "ccr_missing"
    pattern: "(?i)(?:consumer\\s+confidence\\s+report|ccr)\\s+(?:not\\s+(?:issued|published)|missing|past\\s+jul[- ]?1)"
    severity: "high"
    category: "water.ccr.missing"
  - id: "trihalomethane_mcl"
    pattern: "(?i)(?:tthm|trihalomethanes?|total\\s+thm)\\s+(?:above|exceed|violation)\\s+\\d{1,3}\\s*(?:ug|µg|microgram)"
    severity: "high"
    category: "water.dbpr.tthm_mcl"
  - id: "haa5_mcl"
    pattern: "(?i)(?:haa5|haloacetic\\s+acids?)\\s+(?:above|exceed|violation)\\s+\\d{1,3}\\s*(?:ug|µg|microgram)"
    severity: "high"
    category: "water.dbpr.haa5_mcl"
  - id: "tt_violation_filtration"
    pattern: "(?i)(?:filtration|treatment\\s+technique|tt)\\s+(?:violation|failure)|turbidity\\s+(?:over|above|exceed)\\s+(?:0\\.[35]|1)\\s*ntu"
    severity: "high"
    category: "water.tt.filtration"
  - id: "monitoring_skipped"
    pattern: "(?i)(?:monitoring|sampling)\\s+(?:not\\s+(?:performed|conducted)|skipped|missed)\\s+(?:for|in)\\s+(?:quarter|month|year)"
    severity: "medium"
    category: "water.monitoring.skipped"
