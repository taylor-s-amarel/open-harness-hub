id: "rule-pack/grep-biosecurity-flags"
type: rule-pack
version: "0.1.0"
name: "Biosecurity / select-agent / BSL-3 BSL-4 / DURC flags"
description: "Detectors for 42 CFR 73 / BMBL / WHO LBM4 / DURC compliance gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["biosecurity", "biosecurity.select_agent", "biosecurity.bsl", "biosecurity.durc"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["biosecurity", "select-agent", "bmbl"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "unescorted_access_no_sra"
    pattern: "(?i)(?:without\\s+(?:an\\s+)?active\\s+(?:fbi\\s+)?(?:security\\s+risk\\s+assessment|sra)|unescorted\\s+(?:visiting\\s+collaborator|individual|visitor))[\\s\\S]{0,200}?(?:select\\s+agent|tier\\s+1)|tier\\s+1[\\s\\S]{0,160}?unescorted"
    severity: "critical"
    category: "biosec.access.no_sra"
  - id: "inventory_variance_form4"
    pattern: "(?i)(?:(?<!no\\s)(?<!zero\\s)(?:select\\s+agent\\s+)?inventory\\s+(?:mismatch|variance|discrepancy)[\\s\\S]{0,200}?(?:cdc\\s+form\\s+4|form\\s+4))|form\\s+4[\\s\\S]{0,120}?(?:significant\\s+)?(?:variance|mismatch|discrepancy)(?!\\s+(?:over|across)\\s+the\\s+last)"
    severity: "critical"
    category: "biosec.inventory.variance"
  - id: "dual_key_breached"
    pattern: "(?i)(?:dual[- ]?key|two[- ]?person)\\s+(?:procedure|access|requirement)\\s+(?:waived|breached|skipped|broken|quietly\\s+waived)|single\\s+pi\\s+(?:with\\s+)?sole\\s+access"
    severity: "critical"
    category: "biosec.access.dual_key_breached"
  - id: "gain_of_function_no_durc_p3co"
    pattern: "(?i)(?:gain[- ]?of[- ]?function|aerosol(?:ization)?\\s+(?:protocol|experiment)|enhanced\\s+pathogen)[\\s\\S]{0,200}?(?:launched|initiated|started|conducted)[\\s\\S]{0,200}?(?:without\\s+(?:durc|p3co)\\s+review|no\\s+durc|no\\s+p3co)|gain[- ]?of[- ]?function\\s+(?:without|no)\\s+durc"
    severity: "critical"
    category: "biosec.durc.no_review"
  - id: "release_loss_unreported_7d"
    pattern: "(?i)(?:spill|release|loss|theft)[\\s\\S]{0,200}?(?:not\\s+reported\\s+to\\s+(?:cdc|dsat)|past\\s+7[- ]?day|within\\s+the\\s+7[- ]?day\\s+window|not\\s+reported\\s+(?:within|in))"
    severity: "critical"
    category: "biosec.release.unreported"
  - id: "transfer_form2_missing"
    pattern: "(?i)(?:shipped|transferred)[\\s\\S]{0,200}?(?:without\\s+(?:the\\s+)?(?:aphis\\s*[/]\\s*cdc\\s+)?form\\s+2|no\\s+form\\s+2|form\\s+2\\s+(?:transfer\\s+)?authorization\\s+(?:missing|absent|in\\s+place))"
    severity: "high"
    category: "biosec.transfer.no_form2"
  - id: "bsc_certification_overdue"
    pattern: "(?i)(?:bsc[- ]?ii|biosafety\\s+cabinet)\\s+(?:annual\\s+)?(?:recertification|certification)\\s+(?:eight\\s+months\\s+overdue|overdue|expired|past\\s+due)"
    severity: "high"
    category: "biosec.bsc.cert_overdue"
  - id: "hepa_leak_test_overdue"
    pattern: "(?i)hepa\\s+(?:push[- ]?through\\s+)?(?:filter\\s+)?(?:leak|integrity|pao|dop)\\s+(?:test|integrity\\s+test|last\\s+documented)[\\s\\S]{0,120}?(?:overdue|expired|in\\s+(?:202[0-4])|last\\s+(?:tested|documented)\\s+(?:in\\s+202[0-4]|over\\s+12\\s+months))"
    severity: "medium"
    category: "biosec.hepa.overdue"
  - id: "autoclave_unvalidated_cycle"
    pattern: "(?i)(?:autoclave|sterilization)\\s+(?:short\\s+cycle|unvalidated\\s+cycle|cycle\\s+(?:not\\s+validated|validation\\s+missing))|biological\\s+indicator\\s+(?:failure|missing|skipped)"
    severity: "high"
    category: "biosec.decon.unvalidated"
  - id: "ppe_doffing_violation"
    pattern: "(?i)ppe\\s+doffing\\s+(?:sequence\\s+)?violation|doffing\\s+(?:sequence\\s+)?(?:violation|skipped|incorrect)"
    severity: "medium"
    category: "biosec.ppe.doffing"
  - id: "visitor_log_incomplete"
    pattern: "(?i)visitor\\s+log\\s+(?:incomplete|gap|missing|not\\s+maintained)"
    severity: "low"
    category: "biosec.visitor.log_incomplete"
