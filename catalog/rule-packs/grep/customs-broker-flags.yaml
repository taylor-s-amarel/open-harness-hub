id: "rule-pack/grep-customs-broker-flags"
type: rule-pack
version: "0.1.0"
name: "Customs entry / FTA / forced-labor flags (US CBP)"
description: "Detectors for customs-entry compliance gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["customs", "customs.entry", "customs.tariff", "customs.fta", "trade"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["customs"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "isf_late_filing"
    pattern: "(?i)(?:isf|importer\\s+security\\s+filing|10\\+2)\\s+(?:late|past\\s+24\\s*h|filed\\s+after\\s+vessel\\s+loading)"
    severity: "critical"
    category: "customs.isf.late_filing"
  - id: "forced_labor_wro_match"
    pattern: "(?i)(?:wro|withhold\\s+release\\s+order|forced[- ]?labor\\s+section\\s+307|19\\s+usc\\s+1307)\\s+(?:match|hit|target)"
    severity: "critical"
    category: "customs.forced_labor.wro"
  - id: "uflpa_entity_match"
    pattern: "(?i)uflpa\\s+(?:entity\\s+list|presumption)\\s+(?:match|hit|target)|xinjiang\\s+production\\s+and\\s+construction\\s+corps"
    severity: "critical"
    category: "customs.uflpa.entity_match"
  - id: "add_cvd_evasion_risk"
    pattern: "(?i)(?:add\\b|antidumping)|cvd\\s+(?:evasion|circumvention|transshipment)\\s+(?:indicator|risk|alert)"
    severity: "critical"
    category: "customs.add_cvd.evasion"
  - id: "fta_no_origin_cert"
    pattern: "(?i)(?:usmca|korus|cptpp|nafta)\\s+(?:claim|preference)(?!.{0,300}(?:certification\\s+of\\s+origin|cert[ -]?of[- ]?origin|coo))"
    severity: "high"
    category: "customs.fta.no_origin_cert"
  - id: "hts_misclassification"
    pattern: "(?i)hts(?:us)?\\s+(?:classification\\s+)?(?:wrong|incorrect|protest|reconciliation|misclassif)"
    severity: "high"
    category: "customs.hts.misclassification"
  - id: "country_of_origin_marking_missing"
    pattern: "(?i)country[- ]?of[- ]?origin\\s+(?:marking)?\\s+(?:missing|absent|not\\s+conspicuous|removed)"
    severity: "medium"
    category: "customs.coo.marking_missing"
  - id: "valuation_undervalue"
    pattern: "(?i)(?:transaction\\s+value|valuation)\\s+(?:significantly\\s+below|under)\\s+(?:market|first[- ]?sale|comparable\\s+import)|undervalu(?:ation|ed)"
    severity: "high"
    category: "customs.valuation.undervalue"
  - id: "ip_rights_counterfeit"
    pattern: "(?i)(?:counterfeit|trademark\\s+infringement|piratical)\\s+(?:goods|merchandise|seizure)"
    severity: "critical"
    category: "customs.ip_rights.counterfeit"
  - id: "ctpat_decertification_risk"
    pattern: "(?i)c[- ]?tpat\\s+(?:decertif|suspension|tier\\s+(?:1|two)\\s+rated|noncompliance)"
    severity: "high"
    category: "customs.ctpat.decertification"
  - id: "reasonable_care_documentation_gap"
    pattern: "(?i)reasonable\\s+care\\s+(?:documentation\\s+)?(?:gap|missing|not\\s+(?:documented|maintained))"
    severity: "medium"
    category: "customs.reasonable_care.gap"
  - id: "binding_ruling_request_needed"
    pattern: "(?i)(?:binding\\s+ruling|ruling\\s+letter)\\s+(?:not\\s+(?:requested|obtained)|needed|recommended)"
    severity: "low"
    category: "customs.ruling.no_binding"
