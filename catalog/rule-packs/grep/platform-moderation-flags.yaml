id: "rule-pack/grep-platform-moderation-flags"
type: rule-pack
version: "0.1.0"
name: "Platform moderation flags (text-only triage)"
description: "GREP detectors for text-only moderation triage. Catches obvious-language signals that warrant policy review. CSAM-suspicion routing is keyword-free + relies on multimodal classifiers + hash matching (PhotoDNA / PDQ); this rule pack covers text adjacent signals only."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry: ["compliance", "media", "privacy"]
capability: ["classification", "safety_gating"]
modality: ["text"]
lifecycle: "beta"
trust_boundary: "local"
freshness: "volatile"
tags: ["moderation", "trust-and-safety", "platform"]
created: "2026-05-22"
updated: "2026-05-22"

family: "grep"
rules:
  - id: "minor_grooming_signals"
    pattern: "(?i)\\b(?:13|14|15|16|17)\\s*(?:yo|y/o|years\\s+old)\\b[\\s\\S]{0,200}?(?:send pics|secret|don'?t tell|our secret|meet up)"
    severity: "critical"
    category: "ts.minor.grooming"
  - id: "illicit_drug_sale"
    pattern: "(?i)(?:selling|for\\s+sale|dm\\s+to\\s+buy)\\s+(?:fent|fentanyl|adderall|xanax|oxy|percocet|cocaine|meth|heroin|mdma|lsd)"
    severity: "critical"
    category: "ts.illegal.drug_sale"
  - id: "weapon_sale_unlicensed"
    pattern: "(?i)(?:selling|for\\s+sale|dm\\s+to\\s+buy)\\s+(?:glock|ar-?15|ghost\\s+gun|untraceable\\s+(?:firearm|gun)|switch|auto[- ]sear|3d[- ]printed\\s+(?:firearm|gun))"
    severity: "critical"
    category: "ts.illegal.weapon_sale"
  - id: "terrorist_designated_org_glorification"
    pattern: "(?i)\\b(?:isis|daesh|al[- ]?qaeda|al[- ]?shabaab|hezbollah|tehrik[- ]?e[- ]?taliban|boko\\s+haram)\\b[\\s\\S]{0,160}?(?:long\\s+live|glory\\s+to|join\\s+(?:us|the\\s+cause)|martyr)"
    severity: "critical"
    category: "ts.terror.glorification"
  - id: "doxx_pattern"
    pattern: "(?i)(?:home\\s+address|where\\s+(?:he|she|they)\\s+live[s]?)\\s*[:=]\\s*\\d+\\s+[A-Z][a-z]+\\s+(?:st|street|ave|avenue|rd|road|blvd|boulevard)"
    severity: "high"
    category: "ts.doxx.address"
  - id: "ncii_non_consent_signal"
    pattern: "(?i)(?:without\\s+(?:her|his|their)\\s+consent|she\\s+doesn'?t\\s+know|leaked\\s+(?:nudes|images))[\\s\\S]{0,200}?(?:nudes|naked|topless|intimate)"
    severity: "critical"
    category: "ts.ncii.non_consent"
  - id: "self_harm_intent_present_tense"
    pattern: "(?i)\\b(?:i\\s+want\\s+to\\s+(?:die|kill\\s+myself)|tonight\\s+is\\s+the\\s+night|i\\s+(?:have|got)\\s+(?:the\\s+pills|the\\s+gun)|goodbye\\s+(?:everyone|world))\\b"
    severity: "critical"
    category: "ts.self_harm.intent"
  - id: "scam_advance_fee"
    pattern: "(?i)(?:nigerian\\s+prince|inheritance\\s+claim|million\\s+(?:dollars|usd)\\s+(?:transfer|share))|send\\s+(?:gift\\s+cards|bitcoin)\\s+to\\s+verify"
    severity: "high"
    category: "ts.scam.advance_fee"
  - id: "election_disinfo_polling_place"
    pattern: "(?i)(?:polls?\\s+closed|election\\s+(?:moved|cancel(?:l)?ed|postponed))[\\s\\S]{0,80}?(?:tomorrow|today|tuesday)|vote\\s+by\\s+(?:text|sms)\\s+to\\s+\\d{5,6}"
    severity: "high"
    category: "ts.election.polling_disinfo"
  - id: "csam_referral_route"
    pattern: "(?i)pthc|preteen\\s+(?:nude|naked)|child[\\s-]?(?:porn|pornography)|csam"
    severity: "critical"
    category: "ts.csam.referral"
