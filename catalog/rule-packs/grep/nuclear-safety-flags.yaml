id: "rule-pack/grep-nuclear-safety-flags"
type: rule-pack
version: "0.1.0"
name: "Nuclear safety / NRC / IAEA flags"
description: "Detectors for nuclear-safety findings."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["nuclear", "nuclear.nrc", "nuclear.iaea"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["nuclear"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "lco_exceedance"
    pattern: "(?i)(?:lco|limiting\\s+condition\\s+for\\s+operation)\\s+(?:exceeded|exceedance|violation)"
    severity: "critical"
    category: "nuclear.lco.exceedance"
  - id: "ler_unfilled"
    pattern: "(?i)(?:ler|licensee\\s+event\\s+report)\\s+(?:not\\s+(?:filed|submitted)|past\\s+60\\s+days)"
    severity: "critical"
    category: "nuclear.ler.unfilled"
  - id: "scram_unexplained"
    pattern: "(?i)(?:unplanned|unexpected|manual)\\s+(?:scram|trip|reactor\\s+shutdown)(?!.{0,400}(?:cause\\s+(?:identified|understood|known)|root[- ]?caus(?:e|ed)|investigation\\s+complete|corrective\\s+actions?\\s+complete|root\\s+cause\\s+analysis\\s+complete))"
    severity: "critical"
    category: "nuclear.scram.unexplained"
  - id: "tech_spec_surveillance_overdue"
    pattern: "(?i)(?:tech[- ]?spec|technical\\s+specification)\\s+surveillance\\s+(?:past\\s+due|overdue|missed)"
    severity: "high"
    category: "nuclear.tech_spec.surveillance_overdue"
  - id: "physical_security_breach"
    pattern: "(?i)(?:vital\\s+area|protected\\s+area)\\s+(?:breach|intrusion|unauthorized\\s+entry)|10\\s+cfr\\s+73\\s+(?:violation|noncompliance)"
    severity: "critical"
    category: "nuclear.physical_security.breach"
  - id: "snm_inventory_discrepancy"
    pattern: "(?i)(?:snm|special\\s+nuclear\\s+material)\\s+inventory\\s+(?:discrepancy|miscount|over\\s+ID[- ]?limit)"
    severity: "critical"
    category: "nuclear.snm.inventory_discrepancy"
  - id: "rop_yellow_red_finding"
    pattern: "(?i)(?:rop|reactor\\s+oversight)\\s+(?:finding\\s+)?(?:yellow|red)|significance\\s+(?:yellow|red)"
    severity: "high"
    category: "nuclear.rop.yellow_red"
  - id: "iaea_safeguards_irregularity"
    pattern: "(?i)iaea\\s+safeguards\\s+(?:irregularity|finding|noncompliance|access\\s+denied)"
    severity: "high"
    category: "nuclear.iaea.safeguards"
  - id: "fitness_for_duty_failure"
    pattern: "(?i)fitness[- ]?for[- ]?duty\\s+(?:test\\s+)?(?:fail|positive)|10\\s+cfr\\s+26\\s+violation"
    severity: "high"
    category: "nuclear.ffd.failure"
  - id: "operator_license_lapsed"
    pattern: "(?i)(?:operator|senior\\s+operator|sro)\\s+license\\s+(?:lapsed|expired|inactive)"
    severity: "high"
    category: "nuclear.operator.license_lapsed"
  - id: "training_recertification_overdue"
    pattern: "(?i)(?:training|recertification|requalification)\\s+(?:overdue|past\\s+due|expired)"
    severity: "medium"
    category: "nuclear.training.overdue"
  - id: "spent_fuel_pool_level"
    pattern: "(?i)spent\\s+fuel\\s+pool\\s+(?:level|temperature)\\s+(?:below|above|exceeds?)\\s+(?:tech[- ]?spec|action\\s+level)"
    severity: "critical"
    category: "nuclear.spent_fuel.parameter"
