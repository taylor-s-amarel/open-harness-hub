id: "rule-pack/grep-ma-dd-red-flags"
type: rule-pack
version: "0.1.0"
name: "M&A DD red-flag detectors (6 streams)"
description: "GREP detectors for financial/legal/IP/customer/HR/tax DD."
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["m_and_a", "m_and_a.due_diligence", "legal", "finance"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["m&a", "due-diligence"]
created: "2026-05-20"
updated: "2026-05-20"

family: "grep"
rules:
  - id: "change_of_control_acceleration"
    pattern: "(?i)change[- ]?of[- ]?control\\s+(?:acceleration|trigger|provision|clause)"
    severity: "critical"
    category: "ma.legal.cof_acceleration"
  - id: "customer_concentration"
    pattern: "(?i)customer\\s+concentration\\s*[:=]?\\s*[2-9][0-9]%|single\\s+customer\\s+(?:>|over|exceeds)\\s+(?:2[5-9]|3[0-9]|4[0-9]|5[0-9])%|top\\s+(?:5|3|1)\\s+customers?\\s+(?:account\\s+for|represent)\\s+(?:>|over)\\s+(?:50|60|70)%"
    severity: "high"
    category: "ma.customer.concentration"
  - id: "non_assignable_customer_contract"
    pattern: "(?i)(?:customer|key)\\s+contract\\s+(?:not\\s+assignable|non[- ]?assignable|requires\\s+(?:customer'?s?\\s+)?consent\\s+to\\s+(?:assign|transfer))"
    severity: "high"
    category: "ma.customer.non_assignable"
  - id: "open_ip_litigation"
    pattern: "(?i)open\\s+(?:ip|patent|trademark|copyright)\\s+(?:litigation|lawsuit|infringement\\s+claim)"
    severity: "critical"
    category: "ma.ip.open_litigation"
  - id: "open_source_gpl_in_proprietary"
    pattern: "(?i)(?:gpl|agpl|lgpl|copyleft)\\s+(?:license|code|library)\\s+(?:in|incorporated\\s+into)\\s+(?:proprietary|product\\s+code|commercial\\s+offering)"
    severity: "high"
    category: "ma.ip.copyleft_in_proprietary"
  - id: "undisclosed_tax_liability"
    pattern: "(?i)(?:undisclosed|unrecorded)\\s+(?:tax|sales\\s+tax|use\\s+tax|payroll\\s+tax)\\s+(?:liability|exposure)\\s+(?:\\$[\\d,.]+|exceed(?:s|ing)?\\s+\\$[\\d,.]+)"
    severity: "critical"
    category: "ma.tax.undisclosed_liability"
  - id: "nol_section_382_limit"
    pattern: "(?i)(?:nol|net\\s+operating\\s+loss)\\s+limited\\s+by\\s+(?:section|§|sec\\.?)\\s*382|(?<!study\\s)(?<!study\\s+completed\\s)§\\s*382\\s+limitation|382\\s+study\\s+(?:not\\s+(?:completed|done|performed)|missing|to\\s+be\\s+(?:performed|done)|outstanding)"
    severity: "medium"
    category: "ma.tax.nol_382"
  - id: "key_person_no_retention"
    pattern: "(?i)key\\s+(?:person|employee|founder|cto|ceo|cfo)(?:\\s+is)?\\s+(?:not\\s+(?:retained|signing|under\\s+(?:employment\\s+)?(?:agreement|contract))|leaving|departing)"
    severity: "high"
    category: "ma.hr.key_person_attrition"
  - id: "equity_overhang_high"
    pattern: "(?i)equity\\s+overhang\\s+(?:>|over)\\s+(?:1[5-9]|[2-9][0-9])%|unvested\\s+(?:options|equity)\\s+(?:>|over)\\s+(?:1[5-9]|[2-9][0-9])%"
    severity: "medium"
    category: "ma.hr.equity_overhang"
  - id: "accrued_pto_undisclosed"
    pattern: "(?i)accrued\\s+(?:pto|vacation|holiday)\\s+(?:liability\\s+)?(?:not\\s+(?:on\\s+balance\\s+sheet|disclosed|recorded)|undisclosed)"
    severity: "medium"
    category: "ma.hr.accrued_pto"
  - id: "warn_act_exposure"
    pattern: "(?i)\\bwarn\\s+act\\b\\s+(?:exposure|noncompliance|violation)|mass\\s+layoff\\s+without\\s+(?:60[- ]?day\\s+notice|warn\\s+notice)"
    severity: "high"
    category: "ma.hr.warn_exposure"
  - id: "regulatory_enforcement_action"
    pattern: "(?i)(?:open|pending|active)\\s+(?:sec|fda|ftc|cftc|finra|cma|cnpd|ico|dpa)\\s+(?:enforcement|investigation|consent\\s+decree)"
    severity: "critical"
    category: "ma.legal.regulatory_enforcement"
  - id: "going_concern_qualification"
    pattern: "(?i)going[- ]?concern\\s+(?:qualification|doubt|opinion)|auditor.{0,40}going[- ]?concern"
    severity: "critical"
    category: "ma.financial.going_concern"
  - id: "working_capital_off_target"
    pattern: "(?i)working\\s+capital\\s+(?:below|under|short\\s+of)\\s+(?:target|peg)\\s+by\\s+\\$[\\d,.]+"
    severity: "medium"
    category: "ma.financial.working_capital"
  - id: "ebitda_adjustment_aggressive"
    pattern: "(?i)(?:add[- ]?back|adjustment)\\s+(?:to|from)\\s+ebitda\\s+(?:>|over)\\s+(?:1[5-9]|[2-9][0-9])%|quality\\s+of\\s+earnings\\s+identified\\s+(?:>|over)\\s+\\$[\\d,.]+\\s+in\\s+(?:aggressive|questionable)\\s+adjustments"
    severity: "medium"
    category: "ma.financial.ebitda_adjustment"
