id: "rule-pack/grep-aviation-safety-flags"
type: rule-pack
version: "0.1.0"
name: "Aviation safety incident flags (NTSB / FAA / HFACS)"
description: "Detectors for aviation-incident-report red flags."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["aviation", "aviation.safety"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["aviation"]
created: "2026-05-20"
updated: "2026-05-20"

family: "grep"
rules:
  - id: "cfit_indicator"
    pattern: "(?i)(?:controlled\\s+flight\\s+into\\s+terrain|cfit\\b)|terrain\\s+impact"
    severity: "critical"
    category: "aviation.cfit"
  - id: "loci_indicator"
    pattern: "(?i)loss\\s+of\\s+control[- ]?(?:in[- ]?flight)?|\\bloc[- ]?i\\b|stall.{0,40}spin"
    severity: "critical"
    category: "aviation.loc_i"
  - id: "fuel_exhaustion"
    pattern: "(?i)fuel\\s+(?:exhaustion|starvation|mismanagement)"
    severity: "critical"
    category: "aviation.fuel"
  - id: "runway_incursion"
    pattern: "(?i)runway\\s+incursion|category\\s+[abc]\\s+incursion"
    severity: "high"
    category: "aviation.runway_incursion"
  - id: "no_sms_documentation"
    pattern: "(?i)(?:no|absent)\\s+sms\\s+documentation|sms\\s+(?:not\\s+implemented|noncompliant)|safety\\s+management\\s+system\\s+(?:not\\s+(?:established|implemented))"
    severity: "high"
    category: "aviation.sms_missing"
  - id: "ground_school_lapsed"
    pattern: "(?i)(?:recurrent\\s+training|ground\\s+school|line\\s+check)\\s+(?:lapsed|overdue|past\\s+due)"
    severity: "high"
    category: "aviation.training_lapsed"
  - id: "maint_log_gap"
    pattern: "(?i)maintenance\\s+log\\s+(?:gap|missing\\s+entries|incomplete)|airworthiness\\s+directive\\s+(?:overdue|not\\s+complied)"
    severity: "critical"
    category: "aviation.maintenance_gap"
  - id: "crew_fatigue"
    pattern: "(?i)(?:crew\\s+fatigue|inadequate\\s+(?:crew\\s+)?rest|duty\\s+time\\s+exceeded|117\\.[0-9]+\\s+violation|pic\\s+duty\\s+time\\s+exceeded|crew\\s+rest\\s+(?:violation|non[- ]?compliant|short|inadequate|insufficient))"
    severity: "high"
    category: "aviation.fatigue"
  - id: "weather_decision"
    pattern: "(?i)(?:weather|imc|ifr)\\s+(?:into|despite|exceeded)\\s+(?:minimums|limits)|vfr\\s+into\\s+imc"
    severity: "high"
    category: "aviation.weather_decision"
  - id: "tcas_ra_response"
    pattern: "(?i)tcas\\s+(?:ra|resolution\\s+advisory)\\s+(?:not\\s+complied|inverse|opposite)"
    severity: "critical"
    category: "aviation.tcas_ra_noncompliance"
  - id: "uncontained_engine_failure"
    pattern: "(?i)(?:uncontained|in[- ]?flight)\\s+engine\\s+(?:failure|shutdown\\s+with\\s+damage)|engine\\s+separation"
    severity: "critical"
    category: "aviation.uncontained_engine"
  - id: "missed_pirep"
    pattern: "(?i)(?:no|absent)\\s+pirep\\s+(?:filed|reported)|pilot\\s+report\\s+not\\s+submitted"
    severity: "low"
    category: "aviation.no_pirep"
