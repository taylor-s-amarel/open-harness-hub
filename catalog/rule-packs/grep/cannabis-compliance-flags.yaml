id: "rule-pack/grep-cannabis-compliance-flags"
type: rule-pack
version: "0.1.0"
name: "Cannabis compliance flags (METRC + §280E + FinCEN + COA)"
description: "Detectors for cannabis-industry compliance gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["cannabis", "cannabis.cultivation", "cannabis.retail", "cannabis.testing"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["cannabis", "metrc"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "interstate_transport_violation"
    pattern: "(?i)(?:driven|transported|shipped)[\\s\\S]{0,80}?(?:across|over)\\s+(?:state\\s+(?:line|border|borders)|the\\s+(?:nevada|oregon|arizona|new\\s+mexico|kansas|texas|florida)\\s+(?:state\\s+)?line)"
    severity: "critical"
    category: "cannabis.federal.interstate"
  - id: "section_280e_deduction"
    pattern: "(?i)(?:deducted|claimed)[\\s\\S]{0,120}?(?:ordinary\\s+(?:advertising|rent|payroll)|advertising|rent|payroll|marketing)[\\s\\S]{0,80}?(?:federal\\s+return|tax\\s+return|schedule\\s+c)|in\\s+violation\\s+of\\s+(?:§|section\\s+)?280e|280e\\s+(?:disallowed|violation)"
    severity: "critical"
    category: "cannabis.tax.280e"
  - id: "metrc_variance_unreported"
    pattern: "(?i)metrc\\s+(?:variance|discrepancy|inventory\\s+(?:gap|mismatch))[\\s\\S]{0,120}?(?:never\\s+reported|not\\s+reported|carried\\s+forward|overwritten)"
    severity: "critical"
    category: "cannabis.metrc.variance_unreported"
  - id: "transport_manifest_missing"
    pattern: "(?i)(?:left|departed)[\\s\\S]{0,120}?(?:premises|manufacturing)\\s+without\\s+(?:a\\s+)?(?:printed\\s+)?(?:transport\\s+)?manifest|no\\s+transport\\s+manifest"
    severity: "high"
    category: "cannabis.transport.no_manifest"
  - id: "coa_missing_or_expired"
    pattern: "(?i)(?:no\\s+current\\s+(?:pesticide|microbial|heavy\\s+metal|solvent)\\s+panel|coa[s]?\\s+(?:over|past)\\s+(?:a\\s+year|12\\s+months|365\\s+days)|coa\\s+(?:missing|absent|not\\s+on\\s+file))"
    severity: "critical"
    category: "cannabis.coa.missing"
  - id: "potency_label_variance_excess"
    pattern: "(?i)thc\\s+(?:potency\\s+)?(?:of\\s+)?[2-9][0-9]%\\s+on\\s+the\\s+label[\\s\\S]{0,120}?coa\\s+listed\\s+[12][0-9]\\.[0-9]%|thc[\\s\\S]{0,80}?(?:variance|discrepancy)[\\s\\S]{0,80}?(?:1[1-9]|[2-9][0-9])%"
    severity: "high"
    category: "cannabis.label.potency_variance"
  - id: "youth_appealing_packaging"
    pattern: "(?i)(?:cartoon\\s+(?:bear|character|animal|graphic)|candy\\s+resemblance|marketed\\s+toward\\s+minors|child[- ]?appealing)|gummies\\s+resembling\\s+(?:candy|brand)"
    severity: "critical"
    category: "cannabis.packaging.youth"
  - id: "non_child_resistant_packaging"
    pattern: "(?i)(?:lacked|missing|no)\\s+child[- ]?resistant\\s+(?:certification|packaging)|not\\s+(?:astm\\s+d3475|child[- ]?resistant)"
    severity: "critical"
    category: "cannabis.packaging.crp"
  - id: "cash_over_10k_no_sar_ctr"
    pattern: "(?i)(?:\\$1[0-9],[0-9]{3}|\\$[2-9][0-9],[0-9]{3}|\\$1[0-9]{4}|cash\\s+(?:deposit|transaction)\\s+(?:over|exceeding|of\\s+\\$1[0-9]))[\\s\\S]{0,200}?(?:no\\s+(?:fincen|currency\\s+transaction|sar|ctr)|generated\\s+no)"
    severity: "high"
    category: "cannabis.fincen.no_sar_ctr"
  - id: "buffer_zone_school_violation"
    pattern: "(?i)(?:under|below)\\s+(?:the\\s+)?(?:600|1000)\\s*(?:ft|feet)\\s+(?:state\\s+)?(?:minimum|buffer)|sited\\s+(?:only\\s+)?(?:[1-4][0-9]{2}|[1-9][0-9])\\s*(?:ft|feet)\\s+(?:from|to)[\\s\\S]{0,40}?school"
    severity: "high"
    category: "cannabis.zoning.school_buffer"
  - id: "agent_badge_expired"
    pattern: "(?i)(?:agent|employee)\\s+(?:badge|registration|card)\\s+(?:expired|lapsed|inactive)"
    severity: "medium"
    category: "cannabis.badge.expired"
