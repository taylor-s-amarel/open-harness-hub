id: "rule-pack/grep-esg-environmental-red-flags"
type: rule-pack
version: "0.1.0"
name: "ESG environmental red-flag detectors (the 'E' of ESG)"
description: |
  GREP detectors for the environmental dimension of supplier
  disclosures: deforestation, water pollution, hazardous-waste
  mismanagement, GHG underreporting, biodiversity harm, illegal
  resource extraction, single-use plastics. Aligned to:
   - EU CSDDD Art. 5(1)(b) (environmental adverse impacts)
   - EU CSRD ESRS E1-E5 disclosure standards
   - German LkSG §2(3) (environmental risks)
   - California SB 261 (climate financial risk)
   - TCFD recommendations
   - Equator Principles 4 (project finance)

  Pair with `pipeline/supplier-policy-grading` for full ESG grading
  (S + E + G together).
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["esg", "supply_chain", "compliance", "climate", "sustainability"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["esg", "environmental", "csddd", "csrd", "tcfd", "lksg", "deforestation"]
created: "2026-05-19"
updated: "2026-05-19"

family: "grep"
rules:
  - id: "deforestation_high_risk"
    pattern: "(?i)\\b(deforest|clear[- ]?cut|slash[- ]?and[- ]?burn|forest conversion|primary forest|old[- ]growth|amazon|congo basin|borneo|sumatra|cerrado|gran chaco)\\b"
    severity: "critical"
    category: "environmental.deforestation"

  - id: "illegal_logging_terms"
    pattern: "(?i)(illegal|unpermitted|unlicensed)\\s+(?:logg|harvest|extract|timber|wood)|FLEGT|CITES violation|protected species"
    severity: "critical"
    category: "environmental.illegal_extraction"

  - id: "hazardous_waste_mismanagement"
    pattern: "(?i)(hazardous|toxic|radioactive|persistent organic pollutant|pop)\\s+(?:waste|effluent|discharge|dump|spill|leak|disposal)|untreated\\s+(?:effluent|wastewater|sewage)|open[- ]?(?:dumping|pit)|incinerat.*without scrubber"
    severity: "critical"
    category: "environmental.hazardous_waste"

  - id: "water_pollution"
    pattern: "(?i)(discharge|effluent|runoff)\\s+(?:to|into|in)\\s+(?:river|stream|sea|aquifer|groundwater|waterway|lake)|untreated\\s+(?:water|effluent|sewage)|exceed.*pollutant limit|color.*discharge"
    severity: "high"
    category: "environmental.water_pollution"

  - id: "water_stress_sourcing"
    pattern: "(?i)water[- ]?stressed?\\s+(?:basin|region|area|catchment)|aqueduct\\s+(?:high|extremely high)|groundwater (?:depletion|overdraft|exhaust)|fossil aquifer"
    severity: "medium"
    category: "environmental.water_stress"

  - id: "ghg_underreporting_signal"
    pattern: "(?i)scope[ -]?3.*\\b(not (?:calculated|reported|measured)|excluded|out of scope|n[\\.\\/]a)\\b|category 1[- ]?15.*excluded|method:\\s*estimate only|no boundary defined"
    severity: "high"
    category: "environmental.ghg_underreporting"

  - id: "missing_climate_transition_plan"
    pattern: "(?i)(no|absent|not (?:applicable|available))\\s+(?:transition|net[- ]?zero|decarbon)\\s+plan|sbti.*(?:not (?:set|committed)|withdrew|removed)|paris[- ]?aligned.*\\bno\\b"
    severity: "high"
    category: "environmental.no_transition_plan"

  - id: "biodiversity_protected_area"
    pattern: "(?i)(operations|extraction|sourcing|facility)\\s+(?:in|near|adjacent to)\\s+(?:protected area|natural park|key biodiversity area|kba|world heritage|wetland|ramsar|natura 2000)"
    severity: "critical"
    category: "environmental.biodiversity"

  - id: "air_emissions_excessive"
    pattern: "(?i)(particulate|pm[ ]?2\\.5|pm[ ]?10|nox|sox|so2|voc|vocs)\\s+(?:exceed|over|above)\\s+(?:limit|standard|threshold|cap)|black smoke|visible plume.*hours"
    severity: "high"
    category: "environmental.air_emissions"

  - id: "child_pollution_exposure"
    pattern: "(?i)(school|clinic|hospital|residential|kindergarten)\\s+(?:within|next to|adjacent|across)\\s+(?:facility|plant|smelter|tannery|dyehouse|battery)|community health complain"
    severity: "high"
    category: "environmental.community_exposure"

  - id: "palm_oil_unsustainable"
    pattern: "(?i)palm oil.*(?:not|non)[- ]?(?:rspo|sustainable|certified)|conventional palm oil|grease[- ]?bond|undefined origin palm"
    severity: "high"
    category: "environmental.palm_oil"

  - id: "cobalt_drc_artisanal_unaudited"
    pattern: "(?i)cobalt.*(?:drc|democratic republic|katanga|kolwezi|likasi).*(?:artisanal|asm|small[- ]?scale).*(?:not audited|unverified|no chain of custody)"
    severity: "critical"
    category: "environmental.conflict_minerals"

  - id: "single_use_plastic"
    pattern: "(?i)single[- ]?use plastic|non[- ]?recyclable.*packaging|plastic.*not collected|ocean[- ]?bound plastic"
    severity: "low"
    category: "environmental.packaging"

  - id: "ozone_depleting_substance"
    pattern: "(?i)(cfc|hcfc|hfc|hydrochlorofluorocarbon|methyl bromide|halon)\\s+(?:use|emission|stockpile|legacy)|montreal protocol.*non[- ]?complian"
    severity: "high"
    category: "environmental.ozone_depleting"
