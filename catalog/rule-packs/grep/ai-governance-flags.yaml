id: "rule-pack/grep-ai-governance-flags"
type: rule-pack
version: "0.1.0"
name: "AI governance audit flags (EU AI Act + NIST AI RMF + ISO 42001 + GDPR Art 22)"
description: "Detectors for AI governance + conformity assessment gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["ai_governance", "ai_governance.eu_act", "ai_governance.nist_rmf", "ai_governance.iso_42001", "privacy"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["ai-governance", "eu-ai-act"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "annex_iii_no_ce_marking"
    pattern: "(?i)(?:annex\\s+iii|high[- ]?risk)[\\s\\S]{0,200}?(?:no\\s+(?:notified[- ]?body|ce\\s+marking|conformity\\s+assessment)|without\\s+(?:notified|ce|conformity))|deployed\\s+(?:into\\s+)?(?:the\\s+)?(?:eu\\s+)?market[\\s\\S]{0,200}?no\\s+ce"
    severity: "critical"
    category: "ai_gov.eu_act.no_ce"
  - id: "annex_iv_doc_missing"
    pattern: "(?i)annex\\s+iv\\s+technical\\s+(?:file|documentation)\\s+(?:consists\\s+of\\s+a\\s+(?:four|two|three|one|few)[- ]?page|four[- ]?page\\s+readme|missing|incomplete|empty)"
    severity: "high"
    category: "ai_gov.eu_act.annex_iv_missing"
  - id: "data_governance_art10_missing"
    pattern: "(?i)(?:no\\s+art(?:icle)?\\s*10\\s+data\\s+governance|art(?:icle)?\\s*10\\s+(?:bias|representativeness)\\s+statement\\s+(?:missing|absent|not\\s+produced)|could\\s+not\\s+state\\s+whether\\s+the\\s+training\\s+data\\s+was\\s+representative)"
    severity: "high"
    category: "ai_gov.eu_act.art10_missing"
  - id: "no_human_oversight_art14"
    pattern: "(?i)(?:art(?:icle)?\\s*14|human\\s+oversight)\\s+(?:not\\s+(?:implemented|specified|present)|missing|absent)|(?:adverse|automated)\\s+(?:credit\\s+)?decisions?\\s+(?:are\\s+)?issued\\s+automatically[\\s\\S]{0,160}?no\\s+human\\s+review"
    severity: "critical"
    category: "ai_gov.eu_act.art14_missing"
  - id: "logs_under_6_months_art12"
    pattern: "(?i)(?:logs?|system\\s+logs?)\\s+(?:retained|rotated|kept)\\s+(?:every\\s+)?(?:[123][0-9]|[1-9])\\s+(?:day|days)|art(?:icle)?\\s*12\\s+(?:six|6)[- ]?month\\s+(?:retention\\s+)?(?:floor|requirement)\\s+(?:violated|below)|below\\s+the\\s+art(?:icle)?\\s*12"
    severity: "high"
    category: "ai_gov.eu_act.art12_logs"
  - id: "art22_no_human_review_path"
    pattern: "(?i)(?:automated\\s+decision|art(?:icle)?\\s*22)[\\s\\S]{0,200}?(?:no\\s+human\\s+review|no\\s+(?:art(?:icle)?\\s*22\\s+)?meaningful\\s+information|no\\s+(?:art(?:icle)?\\s*22\\s+)?human\\s+review\\s+path)"
    severity: "critical"
    category: "ai_gov.gdpr.art22_violation"
  - id: "gpai_no_art53_transparency"
    pattern: "(?i)(?:gpai|general[- ]?purpose\\s+ai|foundation\\s+model)[\\s\\S]{0,200}?(?:no\\s+art(?:icle)?\\s*53|no\\s+transparency\\s+summary|art(?:icle)?\\s*53\\s+(?:transparency\\s+)?summary\\s+(?:missing|absent|not\\s+published))"
    severity: "critical"
    category: "ai_gov.gpai.no_art53"
  - id: "serious_incident_not_reported_15d"
    pattern: "(?i)(?:serious\\s+incident|wave\\s+of\\s+discriminatory|adverse\\s+outcome)[\\s\\S]{0,200}?(?:not\\s+(?:escalated|reported)|past\\s+15[- ]?day|outside\\s+(?:the\\s+)?15[- ]?day|not\\s+escalated\\s+to\\s+market\\s+surveillance)"
    severity: "critical"
    category: "ai_gov.incident.unreported"
  - id: "aims_iso42001_unsigned"
    pattern: "(?i)(?:iso\\s*(?:[/]?iec)?\\s*42001|aims)\\s+(?:ai\\s+)?policy\\s+(?:remains\\s+an\\s+)?(?:unsigned|draft|not\\s+signed|never\\s+signed)"
    severity: "medium"
    category: "ai_gov.iso42001.unsigned"
  - id: "prohibited_practice"
    pattern: "(?i)(?:social\\s+scoring|untargeted\\s+(?:scraping|facial\\s+recognition\\s+(?:database|db))|real[- ]?time\\s+remote\\s+biometric\\s+identification\\s+in\\s+publicly\\s+accessible|emotion\\s+recognition\\s+in\\s+the\\s+workplace)"
    severity: "critical"
    category: "ai_gov.prohibited"
  - id: "no_model_card"
    pattern: "(?i)(?:no\\s+model\\s+card|model\\s+card\\s+(?:missing|absent|not\\s+published|not\\s+disclosed)|no\\s+system\\s+card)"
    severity: "medium"
    category: "ai_gov.model_card.missing"
  - id: "fria_missing_public_sector"
    pattern: "(?i)(?:fria|fundamental\\s+rights\\s+impact\\s+assessment)\\s+(?:missing|not\\s+(?:published|conducted)|absent|skipped)|public[- ]?sector[\\s\\S]{0,200}?no\\s+fria"
    severity: "high"
    category: "ai_gov.fria.missing"
