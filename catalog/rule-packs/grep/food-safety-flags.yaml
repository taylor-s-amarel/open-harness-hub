id: "rule-pack/grep-food-safety-flags"
type: rule-pack
version: "0.1.0"
name: "Food safety / FSMA / HACCP red-flag detectors"
description: "Detectors for FSMA + HACCP non-compliance."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["food_safety", "food_safety.fsma", "food_safety.haccp", "compliance"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["food-safety"]
created: "2026-05-20"
updated: "2026-05-20"

family: "grep"
rules:
  - id: "ccp_deviation_not_documented"
    pattern: "(?i)ccp\\s+deviation(?!\\s+(?:documented|corrective\\s+action|recorded))"
    severity: "critical"
    category: "food_safety.haccp.ccp_deviation"
  - id: "haccp_plan_missing"
    pattern: "(?i)(?:no|absent|missing)\\s+haccp\\s+plan|haccp\\s+plan\\s+(?:not\\s+(?:documented|implemented)|to\\s+be\\s+written)"
    severity: "critical"
    category: "food_safety.haccp.no_plan"
  - id: "fsvp_missing"
    pattern: "(?i)(?:no|absent)\\s+fsvp(?!\\s+(?:exemption|not\\s+required))|foreign\\s+supplier\\s+verification\\s+program\\s+(?:not\\s+(?:established|documented))"
    severity: "critical"
    category: "food_safety.fsma.fsvp_missing"
  - id: "preventive_controls_missing"
    pattern: "(?i)(?:no|absent)\\s+preventive\\s+controls|preventive\\s+controls\\s+(?:not\\s+(?:implemented|documented))"
    severity: "high"
    category: "food_safety.fsma.pchf_missing"
  - id: "recall_class_i"
    pattern: "(?i)class\\s+i\\s+recall|life[- ]?threatening\\s+(?:adulteration|misbranding)|undeclared\\s+(?:peanut|tree\\s+nut|milk|egg|wheat|soy|fish|shellfish|sesame)"
    severity: "critical"
    category: "food_safety.recall.class_i"
  - id: "pathogen_positive"
    pattern: "(?i)(?:listeria\\s+monocytogenes|salmonella|e[\\.\\s]\\s*coli\\s+o157|stec|cyclospora|hepatitis\\s+a|norovirus)\\s+(?:positive|detected|confirmed)"
    severity: "critical"
    category: "food_safety.pathogen"
  - id: "monitoring_gap"
    pattern: "(?i)(?:no|missing|gap\\s+in)\\s+(?:ccp|cooler|temperature|cleanability)\\s+monitoring\\s+(?:records|log)"
    severity: "high"
    category: "food_safety.haccp.monitoring_gap"
  - id: "ftl_no_traceability"
    pattern: "(?i)(?:no|absent|incomplete)\\s+traceability\\s+(?:for|on)\\s+(?:ftl|food\\s+traceability\\s+list)\\s+(?:item|food)|fsma[- ]?204\\s+(?:noncompliance|not\\s+ready)"
    severity: "high"
    category: "food_safety.fsma.no_traceability"
  - id: "sanitation_failure"
    pattern: "(?i)(?:sanitation|cleaning|sso)\\s+(?:failure|noncompliance|verification\\s+failed)|atp\\s+(?:swab|test)\\s+(?:fail|exceed)"
    severity: "high"
    category: "food_safety.sanitation"
  - id: "allergen_cross_contact"
    pattern: "(?i)allergen\\s+cross[- ]?contact(?:\\s+(?:incident|risk|controls\\s+missing))?"
    severity: "high"
    category: "food_safety.allergen"
  - id: "training_lapsed"
    pattern: "(?i)(?:food[- ]?safety|qualified\\s+individual|pcqi)\\s+training\\s+(?:lapsed|overdue|past\\s+due|not\\s+completed)"
    severity: "medium"
    category: "food_safety.training_lapsed"
  - id: "supplier_audit_missing"
    pattern: "(?i)(?:no|absent)\\s+supplier\\s+audit\\s+(?:in\\s+past\\s+12\\s+months|completed)|supplier\\s+verification\\s+activity\\s+(?:past\\s+due|overdue)"
    severity: "medium"
    category: "food_safety.fsvp.supplier_audit_missing"
