id: "rule-pack/grep-cloud-secrets"
type: rule-pack
version: "0.1.0"
name: "Cloud provider secret detectors"
description: |
  Detection patterns for cloud-provider access keys and service-account
  credentials — AWS, GCP, Azure, DigitalOcean, OCI. Converged from
  gitleaks (`config/gitleaks.toml`), trufflehog (`pkg/detectors/`), and
  GitHub's native secret-scanning partner program.

  Critical-severity by default — any match is a hard block on input or
  output. Verify against a Luhn / mod-N / live-call validator before
  alerting to reduce false positives in production.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["security", "cross_industry", "ai"]
capability: ["anonymization", "safety_gating"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["secrets", "cloud", "gitleaks-aligned"]
created: "2026-05-19"
updated: "2026-05-19"

family: "grep"
rules:
  - id: "aws_access_key"
    pattern: "\\b(AKIA|ASIA)[0-9A-Z]{16}\\b"
    severity: "critical"
    category: "secret.aws"
    notes: "AWS access key (AKIA permanent, ASIA temporary STS)."

  - id: "aws_secret_key"
    pattern: "(?i)aws(.{0,20})?(secret|access)?[_\\-]?key([_\\-]?id)?[\"'\\s:=]{0,5}[A-Za-z0-9/+=]{40}"
    severity: "critical"
    category: "secret.aws"
    notes: "AWS secret access key (40-char base64). Requires context."

  - id: "gcp_service_account_json"
    pattern: "\"type\": \"service_account\""
    severity: "critical"
    category: "secret.gcp"
    notes: "GCP service-account JSON marker."

  - id: "gcp_api_key"
    pattern: "\\bAIza[0-9A-Za-z\\-_]{35}\\b"
    severity: "high"
    category: "secret.gcp"
    notes: "Google API key."

  - id: "azure_storage_connection"
    pattern: "DefaultEndpointsProtocol=https;AccountName=[A-Za-z0-9]+;AccountKey=[A-Za-z0-9+/=]+"
    severity: "critical"
    category: "secret.azure"

  - id: "azure_sas_token"
    pattern: "sig=[A-Za-z0-9%]{40,}&sv=\\d{4}-\\d{2}-\\d{2}"
    severity: "high"
    category: "secret.azure"
    notes: "Azure shared access signature."

  - id: "digitalocean_pat"
    pattern: "\\bdop_v1_[a-f0-9]{64}\\b"
    severity: "critical"
    category: "secret.digitalocean"

  - id: "oci_credentials_marker"
    pattern: "(?i)\\b(ocid1\\.tenancy|ocid1\\.user)\\.oc1\\.\\.[a-z0-9]{60,}\\b"
    severity: "high"
    category: "secret.oci"
    notes: "OCI tenancy / user OCID — paired with API key file for full credentials."

  - id: "cloudflare_api_token"
    pattern: "\\bcf-[A-Za-z0-9_-]{40}\\b|\\bCFPAT-[A-Za-z0-9_-]{40,}\\b"
    severity: "high"
    category: "secret.cloudflare"

  - id: "heroku_api_key"
    pattern: "(?i)heroku(.{0,20})?[A-Fa-f0-9]{8}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{12}"
    severity: "high"
    category: "secret.heroku"
