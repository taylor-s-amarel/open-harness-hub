id: "rule-pack/privacy-pii-text-en"
type: rule-pack
version: "0.1.0"
name: "Privacy PII (English text)"
description: |
  Baseline GREP rule pack for detecting common PII in English text.
  Emails, phone numbers, US SSN, passport numbers, IBANs, IPv4. Designed
  to feed `harness/redact-pii-text` and any downstream pipeline that
  needs a hard PII gate before model or external calls.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["cross_industry"]
capability: ["anonymization", "safety_gating"]
modality:   ["text"]
lifecycle:  "stable"
trust_boundary: "local"
freshness:  "stable"
tags: ["pii", "privacy", "grep"]
created: "2026-05-19"
updated: "2026-05-19"

family: "grep"
language: "en"
rules:
  - id: "email"
    pattern: "(?i)[a-z0-9._%+-]+@[a-z0-9.-]+\\.[a-z]{2,}"
    severity: "high"
    category: "pii.contact"
    notes: "Standard email address pattern."
  - id: "phone_e164"
    pattern: "\\+?[1-9]\\d{1,14}"
    severity: "medium"
    category: "pii.contact"
    notes: "E.164 international phone. False-positive prone — combine with context."
  - id: "us_ssn"
    pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    severity: "critical"
    category: "pii.id"
  - id: "passport_generic"
    pattern: "(?i)passport (?:no\\.?|number)?\\s*:?\\s*[A-Z0-9]{6,9}"
    severity: "critical"
    category: "pii.id"
  - id: "iban"
    pattern: "[A-Z]{2}\\d{2}[A-Z0-9]{4,30}"
    severity: "high"
    category: "pii.financial"
  - id: "ipv4"
    pattern: "\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b"
    severity: "low"
    category: "pii.network"
