id: "rule-pack/grep-agriculture-compliance-flags"
type: rule-pack
version: "0.1.0"
name: "Agriculture compliance flags (USDA / GAP / NOP organic)"
description: "Detectors for ag-supply-chain compliance gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["agriculture_compliance", "agriculture_compliance.usda", "agriculture_compliance.organic", "agriculture_compliance.gap"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["agriculture"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "pesticide_rei_violation"
    pattern: "(?i)(?:rei|restricted[- ]?entry[- ]?interval)\\s+(?:violation|breach|exceeded)|worker\\s+entered\\s+(?:before|prior to)\\s+rei"
    severity: "critical"
    category: "agriculture.wps.rei_violation"
  - id: "pesticide_phi_violation"
    pattern: "(?i)(?:phi|pre[- ]?harvest[- ]?interval)\\s+(?:violation|breach|short|exceeded)|harvested\\s+(?:within|before)\\s+phi"
    severity: "critical"
    category: "agriculture.pesticide.phi_violation"
  - id: "mrl_exceedance"
    pattern: "(?i)(?:mrl|maximum\\s+residue\\s+limit)\\s+(?:exceed|over|violation|above)|residue\\s+(?:test|sample)\\s+(?:exceed|fail)"
    severity: "critical"
    category: "agriculture.pesticide.mrl"
  - id: "organic_split_op_unsegregated"
    pattern: "(?i)(?:split[- ]?operation|parallel\\s+production)\\s+(?:same\\s+crop|unsegregated)|organic\\s++\\s+conventional\\s+(?:mixed|comingled)"
    severity: "critical"
    category: "agriculture.organic.split_op"
  - id: "prohibited_substance_organic"
    pattern: "(?i)(?:synthetic\\s+pesticide|prohibited\\s+(?:substance|input))\\s+(?:on|used\\s+on)\\s+organic|gmo\\s+seed\\s+(?:in|on)\\s+organic"
    severity: "critical"
    category: "agriculture.organic.prohibited"
  - id: "water_quality_e_coli_exceed"
    pattern: "(?i)(?:e[\\.\\s]\\s*coli|geometric\\s+mean)\\s+(?:exceed|>|above)\\s+(?:126|410)\\s+cfu|ag\\s+water\\s+(?:fail|exceed)"
    severity: "critical"
    category: "agriculture.water.e_coli"
  - id: "untrained_worker"
    pattern: "(?i)worker\\s+(?:trained|certification)\\s+(?:not\\s+(?:completed|documented)|expired|missing)|pesticide\\s+handler\\s+training\\s+gap"
    severity: "high"
    category: "agriculture.training.untrained"
  - id: "no_traceability_lot"
    pattern: "(?i)(?:lot|traceability|batch)\\s+(?:tracking|number)\\s+(?:missing|incomplete|not\\s+(?:recorded|maintained))"
    severity: "high"
    category: "agriculture.traceability.no_lot"
  - id: "no_recall_plan"
    pattern: "(?i)(?:recall|withdrawal)\\s+(?:plan|procedure)\\s+(?:not\\s+(?:documented|tested)|missing)"
    severity: "medium"
    category: "agriculture.recall.no_plan"
  - id: "label_misbranding"
    pattern: "(?i)label(?:ing)?\\s+(?:misbrand|noncompliant|misleading)|country[- ]?of[- ]?origin\\s+(?:missing|incorrect)"
    severity: "medium"
    category: "agriculture.labeling.misbranding"
  - id: "child_labor_indicator"
    pattern: "(?i)(?:child|minor|under[- ]?age)\\s+(?:labor|worker|harvester)|harkin[- ]?engel"
    severity: "critical"
    category: "agriculture.labor.child"
