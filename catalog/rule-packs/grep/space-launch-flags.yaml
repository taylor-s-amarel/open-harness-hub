id: "rule-pack/grep-space-launch-flags"
type: rule-pack
version: "0.1.0"
name: "Space launch + range safety + ITAR/EAR flags"
description: "Detectors for FAA Part 450 / range-safety / ITAR compliance gaps."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["space", "space.launch", "space.export_control", "space.orbital"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["space", "faa-part-450", "itar"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "expected_casualty_threshold_exceed"
    pattern: "(?i)expected\\s+casualty\\s+(?:figure|estimate|ec)?[\\s\\S]{0,80}?(?:exceed|above|over|2\\.[0-9]e[- ]?0?4|3\\.[0-9]e[- ]?0?4|[5-9]\\.[0-9]e[- ]?0?4|[1-9]e[- ]?0?[1-3])"
    severity: "critical"
    category: "space.ec.exceeded"
  - id: "fsa_not_submitted"
    pattern: "(?i)(?:flight\\s+safety\\s+analysis|fsa)\\s+(?:not\\s+(?:submitted|approved|complete)|still\\s+(?:being\\s+)?draft|in\\s+draft|incomplete)"
    severity: "critical"
    category: "space.fsa.missing"
  - id: "itar_foreign_disclosure_no_taa"
    pattern: "(?i)(?:itar|usml|technical\\s+data)\\s+(?:shared|emailed|transmitted|disclosed)[\\s\\S]{0,200}?foreign(?!.{0,200}(?:taa|technical\\s+assistance\\s+agreement|export\\s+authorization))"
    severity: "critical"
    category: "space.itar.foreign_disclosure"
  - id: "fts_not_qualified"
    pattern: "(?i)(?:flight\\s+termination\\s+system|fts|autonomous\\s+termination)\\s+(?:not\\s+(?:qualified|certified)|single[- ]?string|qualification\\s+(?:incomplete|pending|deferred))"
    severity: "critical"
    category: "space.fts.unqualified"
  - id: "hazard_area_not_cleared"
    pattern: "(?i)(?:launch\\s+)?hazard\\s+area\\s+(?:not\\s+(?:cleared|verified)|relied\\s+on\\s+(?:verbal|informal)|no\\s+notmar|no\\s+notam)"
    severity: "high"
    category: "space.hazard_area.uncleared"
  - id: "post_mission_disposal_25yr_violation"
    pattern: "(?i)(?:post[- ]?mission\\s+disposal|deorbit|orbital\\s+lifetime)[\\s\\S]{0,200}?(?:exceed|over|past)\\s+25[- ]?year|left\\s+(?:in|at)[\\s\\S]{0,80}?(?:1[12][0-9]{2}|1[3-9][0-9]{2}|[2-9][0-9]{3})\\s*km\\s+orbit"
    severity: "high"
    category: "space.disposal.25yr_exceeded"
  - id: "two_person_propellant_violation"
    pattern: "(?i)(?:propellant\\s+(?:offload|loading)|fuel\\s+loading)\\s+(?:performed|conducted|done)\\s+by\\s+(?:a\\s+)?single\\s+(?:technician|operator|person)|two[- ]?person\\s+(?:rule|verification)\\s+(?:missing|waived|skipped|omitted)"
    severity: "critical"
    category: "space.ground_safety.two_person"
  - id: "range_safety_waiver_undocumented"
    pattern: "(?i)range\\s+safety\\s+waiver\\s+(?:undocumented|no\\s+(?:formal|written)|verbal|informal|not\\s+approved)"
    severity: "high"
    category: "space.range_safety.undocumented_waiver"
  - id: "ccats_export_classification_missing"
    pattern: "(?i)(?:ccats|export\\s+classification|eccn\\s+9a515)\\s+(?:absent|missing|not\\s+(?:filed|on\\s+file|obtained))|no\\s+ccats"
    severity: "high"
    category: "space.export.ccats_missing"
  - id: "mpl_insurance_missing"
    pattern: "(?i)(?:maximum\\s+probable\\s+loss|mpl|financial\\s+responsibility)\\s+(?:insurance\\s+)?(?:not\\s+(?:bound|filed|on\\s+file)|missing|absent|inadequate)"
    severity: "high"
    category: "space.mpl.missing"
  - id: "collision_on_launch_uncomputed"
    pattern: "(?i)collision[- ]?on[- ]?launch\\s+(?:probability\\s+)?(?:not\\s+(?:computed|evaluated|screened)|missing|18\\s+sds\\s+(?:not\\s+queried|skipped))"
    severity: "medium"
    category: "space.col.uncomputed"
