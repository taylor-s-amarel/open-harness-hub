id: "rule-pack/grep-defense-dfars-flags"
type: rule-pack
version: "0.1.0"
name: "Defense DFARS + CMMC + counterfeit-parts red-flag detectors"
description: "GREP detectors for DFARS / CMMC / SAE AS5553 / Section 889 / SAM exclusion."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["defense", "defense.dfars", "defense.counterfeit_parts", "defense.cmmc"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["defense", "dfars"]
created: "2026-05-21"
updated: "2026-05-21"

family: "grep"
rules:
  - id: "no_cmmc_level_assigned"
    pattern: "(?i)cmmc\\s+(?:level\\s+)?(?:not\\s+(?:assigned|determined|specified)|tbd|n[\\.\\/]?a)|cmmc\\s+assessment\\s+(?:pending|missing)"
    severity: "critical"
    category: "defense.cmmc.no_level"
  - id: "dfars_7012_breach_unreported"
    pattern: "(?i)(?:cyber\\s+(?:incident|breach))\\s+(?:not\\s+reported|past\\s+72\\s+hours)|dibnet\\s+(?:report\\s+)?(?:missing|delayed)|dfars\\s+252\\.204[- ]?7012\\s+noncompliance"
    severity: "critical"
    category: "defense.cyber.dfars_7012_breach"
  - id: "section_889_telecom"
    pattern: "(?i)(?:huawei|zte|hytera|hikvision|dahua)\\s+(?:equipment|gear|hardware|component)|section\\s+889\\s+(?:covered\\s+telecom|prohibited)"
    severity: "critical"
    category: "defense.sec_889.covered_telecom"
  - id: "counterfeit_part_indicator"
    pattern: "(?i)(?:counterfeit|suspect[- ]?counterfeit|unmarked|unauthorized\\s+distributor|wrong[- ]?vendor|gray[- ]?market)\\s+(?:part|component|chip|electronic)"
    severity: "critical"
    category: "defense.counterfeit_parts.indicator"
  - id: "sam_exclusion_hit"
    pattern: "(?i)sam(?:\\.gov)?\\s+(?:exclusion|debarred|suspended)\\s+(?:list|hit)|excluded\\s+party\\s+list\\s+system"
    severity: "critical"
    category: "defense.sam.exclusion"
  - id: "itar_unlicensed_transfer"
    pattern: "(?i)itar\\s+(?:controlled\\s+)?(?:technical\\s+data|defense\\s+article)\\s+(?:transferred|disclosed|released)(?!.{0,200}(?:tata|license|exemption|authorized))"
    severity: "critical"
    category: "defense.itar.unlicensed"
  - id: "buy_american_noncompliance"
    pattern: "(?i)buy\\s+american\\s+(?:noncompliance|violation|exception\\s+not\\s+claimed)|foreign\\s+(?:end\\s+)?product\\s+(?:above|over)\\s+(?:component\\s+test|threshold)"
    severity: "high"
    category: "defense.buy_american"
  - id: "nist_800_171_gap"
    pattern: "(?i)nist\\s+800[- ]?171\\s+(?:control|requirement)\\s+(?:gap|missing|not\\s+implemented)|\\b3\\.\\d{1,2}\\.\\d{1,2}\\s+(?:not\\s+implemented|gap)"
    severity: "high"
    category: "defense.nist_800_171.gap"
  - id: "supply_chain_no_traceability"
    pattern: "(?i)supply[- ]?chain\\s+(?:traceability|provenance)\\s+(?:not\\s+(?:established|verified)|gap)|component\\s+(?:provenance|chain)\\s+unknown"
    severity: "high"
    category: "defense.supply_chain.no_traceability"
  - id: "cui_marking_missing"
    pattern: "(?i)controlled\\s+unclassified\\s+information|\\bcui\\b(?!.{0,200}(?:properly\\s+marked|banner\\s+marking|portion\\s+marking))"
    severity: "medium"
    category: "defense.cui.marking_missing"
  - id: "as5553_no_inspection"
    pattern: "(?i)(?:as5553|as6081|sae\\s+aerospace\\s+standard)\\s+(?:not\\s+followed|gap)|electronic\\s+component\\s+(?:no\\s+inspection|untested\\s+for\\s+counterfeit)"
    severity: "high"
    category: "defense.counterfeit_parts.no_as5553"
