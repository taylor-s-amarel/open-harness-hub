id: "rule-pack/grep-construction-safety-flags"
type: rule-pack
version: "0.1.0"
name: "Construction safety red-flag detectors (OSHA 1926)"
description: "Detectors for OSHA Focus Four + scaffolding + excavation + PPE."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["construction", "construction.safety"]
capability: ["safety_gating", "classification"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "volatile"
tags: ["construction", "osha"]
created: "2026-05-20"
updated: "2026-05-20"

family: "grep"
rules:
  - id: "no_fall_protection_above_6ft"
    pattern: "(?i)(?:work|working)\\s+(?:at|above)\\s+(?:height|elevat\\w+)(?:\\s+(?:of\\s+)?(?:above|over|exceed(?:ing|s)?)?\\s*6\\s*(?:ft|feet|'))?(?!.{0,120}(?:fall\\s+protection|harness|guardrail|psn|safety\\s+net|pfas))"
    severity: "critical"
    category: "construction.fall_protection.missing"
  - id: "unsafe_scaffold"
    pattern: "(?i)scaffold(?:ing)?\\s+(?:missing\\s+(?:guardrail|toeboard|midrail)|not\\s+inspected|tag\\s+(?:expired|red)|loose\\s+plank|overloaded)"
    severity: "high"
    category: "construction.scaffold.deficiency"
  - id: "excavation_no_protective_system"
    pattern: "(?i)excavation\\s+(?:over|deeper\\s+than|>\\s*)\\s*5\\s*(?:ft|feet|')(?!.{0,200}(?:slope|bench|shore|shield|trench\\s+box|protective\\s+system))"
    severity: "critical"
    category: "construction.excavation.no_protective_system"
  - id: "no_competent_person"
    pattern: "(?i)(?:no|absent|undesignated)\\s+competent\\s+person(?:\\s+for\\s+(?:excavation|scaffold|fall|rigging))?"
    severity: "high"
    category: "construction.competent_person.missing"
  - id: "energized_work_no_eep"
    pattern: "(?i)energized\\s+(?:electrical\\s+)?work(?!.{0,200}(?:electrical\\s+energy\\s+plan|eep|lockout[- ]?tagout|loto|de[- ]?energized|qualified\\s+electrical\\s+worker))"
    severity: "critical"
    category: "construction.electrical.energized_no_plan"
  - id: "missing_loto"
    pattern: "(?i)(?:no|absent|missing|skipped)\\s+(?:lockout[- ]?tagout|loto)\\s+(?:procedure|on\\s+work|before\\s+(?:service|maintenance))"
    severity: "critical"
    category: "construction.electrical.no_loto"
  - id: "ppe_not_required"
    pattern: "(?i)(?:hard[- ]?hat|safety[- ]?glasses|hi[- ]?vis|fall[- ]?harness|gloves)\\s+(?:not\\s+required|optional|case[- ]?by[- ]?case)"
    severity: "high"
    category: "construction.ppe.not_required"
  - id: "crane_no_signal_person"
    pattern: "(?i)crane\\s+(?:lift|operation)(?!.{0,200}(?:signal\\s+person|qualified\\s+signal|spotter))"
    severity: "high"
    category: "construction.crane.no_signal_person"
  - id: "near_miss_not_reported"
    pattern: "(?i)near[- ]?miss(?:es)?\\s+(?:not\\s+reported|not\\s+logged|verbal\\s+only)"
    severity: "medium"
    category: "construction.reporting.near_miss"
  - id: "toolbox_talk_skipped"
    pattern: "(?i)(?:toolbox\\s+talk|pre[- ]?task\\s+plan|jha)\\s+(?:skipped|missed|not\\s+(?:conducted|documented))"
    severity: "low"
    category: "construction.training.toolbox_skipped"
  - id: "silica_no_exposure_plan"
    pattern: "(?i)silica\\s+(?:exposure|cutting|grinding|drilling)(?!.{0,200}(?:exposure\\s+control\\s+plan|table\\s+1|wet\\s+cut|hepa|vacuum))"
    severity: "high"
    category: "construction.silica.no_control"
  - id: "confined_space_no_permit"
    pattern: "(?i)confined\\s+space(?!.{0,200}(?:permit|attendant|rescue|atmospheric\\s+(?:test|monitoring)))"
    severity: "critical"
    category: "construction.confined_space.no_permit"
