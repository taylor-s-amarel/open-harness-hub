id: "dataset/academic-essay-samples"
type: dataset
version: "0.1.0"
name: "Synthetic academic essay samples (integrity-review test set)"
description: |
  Two synthetic student-essay submissions:
   - sample-essay-clean.json — proper Aristotle / Kant / Mill /
     Hursthouse citations, no AI artefacts, AI-disclosure present.
   - sample-essay-flagged.json — opens with "As an AI language
     model", uses "my knowledge cutoff", filler phrases throughout,
     fabricated DOI. Expected many AI-misuse hits.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["education", "education.higher", "compliance"]
capability: ["evaluation"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
freshness:  "stable"
tags: ["education", "synthetic", "ai-detection", "plagiarism"]
created: "2026-05-20"
updated: "2026-05-20"

splits:
  test:
    rows: 2
    path: "data/academic-samples/"
record_schema: "schemas/student-submission.schema.json"
provenance:
  origin:            "Fully synthetic — no real student data"
  collected_by:      "Open Harness Hub contributors"
  collected_through: "2026-05-20"
  license:           "MIT"
  anonymization:     "fully synthetic"
