id: "knowledge-pack/csddd-and-forced-labor-indicators"
type: knowledge-pack
version: "0.1.0"
name: "CSDDD + ILO forced-labor indicators + Modern Slavery Act"
description: |
  Reference pack of (composite, educational) extracts from:
   - EU Corporate Sustainability Due Diligence Directive (CSDDD) —
     focus on Arts. 5 (risk-based due diligence), 7 (integration into
     policy), 10 (remediation), 11 (grievance), 26 (board oversight).
   - ILO 11 forced-labor indicators (abuse of vulnerability, deception,
     restriction of movement, isolation, physical/sexual violence,
     intimidation/threats, retention of identity documents, withholding
     of wages, debt bondage, abusive working/living conditions,
     excessive overtime).
   - UK Modern Slavery Act §54 transparency-in-supply-chains.
   - German LkSG (Lieferkettensorgfaltspflichtengesetz).
   - California Transparency in Supply Chains Act SB 657.

  Designed as a citation backbone for `pipeline/supplier-policy-grading`
  and downstream ESG audit pipelines.
