id: "tool/presidio-pii-detect"
type: tool
version: "0.1.0"
name: "Microsoft Presidio PII detection proxy"
description: |
  Proxy to Microsoft Presidio Analyzer for PII detection.
  Substantially more thorough than `processor/redact-pii-text`
  regex baseline — supports 30+ entity types across multiple
  languages, ML-backed NER for PERSON names + LOCATION, custom
  recognizers, denylist anchors, AnalyzerEngine + RecognizerRegistry.

  Pair with `processor/redact-pii-text` for fast first-pass +
  Presidio for thorough second-pass on high-stakes outputs.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["cross_industry", "healthcare", "finance", "insurance", "government"]
capability: ["anonymization", "verification"]
modality:   ["text"]
lifecycle:  "stable"
trust_boundary: "local"
tags: ["pii", "presidio", "ner", "hipaa", "gdpr"]
created: "2026-05-20"
updated: "2026-05-20"

parameters:
  type: object
  properties:
    text:                 { type: "string" }
    entities:             { type: "array", items: { type: "string" }, description: "Subset of PERSON / EMAIL_ADDRESS / PHONE_NUMBER / IBAN_CODE / US_SSN / CREDIT_CARD / DATE_TIME / LOCATION / MEDICAL_LICENSE / US_DRIVER_LICENSE / IP_ADDRESS / NRP / UK_NHS / etc." }
    language:             { type: "string", default: "en" }
    score_threshold:      { type: "number", default: 0.5 }
    return_decision_process: { type: "boolean", default: false }
  required: ["text"]
returns:
  type: object
  properties:
    detected_entities:
      type: array
      items:
        type: object
        properties:
          entity_type:  { type: "string" }
          start:        { type: "integer" }
          end:          { type: "integer" }
          score:        { type: "number" }
          recognizer:   { type: "string" }
          text:         { type: "string" }
    entity_count_by_type: { type: "object" }
side_effects: "read"
examples:
  - input:  { text: "Patient John Smith DOB 1985-04-22 MRN 4892-3318", entities: ["PERSON", "DATE_TIME"] }
    output:
      detected_entities:
        - { entity_type: "PERSON",    start: 8,  end: 18, score: 0.85, recognizer: "SpacyRecognizer", text: "John Smith" }
        - { entity_type: "DATE_TIME", start: 23, end: 33, score: 0.90, recognizer: "DateRecognizer",  text: "1985-04-22" }
      entity_count_by_type: { PERSON: 1, DATE_TIME: 1 }
implementations:
  - kind: "callable"
    path: "tools.presidio_pii_detect.run"
