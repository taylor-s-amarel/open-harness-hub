id: "tool/cbp-wro-lookup"
type: tool
version: "0.1.0"
name: "US CBP Withhold Release Order + UFLPA Entity List lookup"
description: |
  Check a supplier name + geography against:
   - US CBP Withhold Release Orders (active)
   - US CBP Findings list (escalated WROs that became confirmed
     forced-labor determinations)
   - US UFLPA Entity List (Xinjiang-region production and high-
     priority sector entities; goods presumed inadmissible under
     19 USC §1307)

  Returns matches with the order ID, date, target commodity, target
  geography, and current status. A hit on any list HALTS the routine
  grading flow per the lead company's US-customs counsel protocol
  (see `persona/esg-auditor` hard rule).

  Implementation pulls from the offline snapshot in
  `knowledge-pack/high-risk-corridors-and-sectors` (data/cbp-wro-
  active-snapshot.jsonl + data/uflpa-entity-list-snapshot.jsonl).
  For live checks, the implementation can scrape cbp.gov directly
  (rate-limited) or use a paid data vendor; both kept out of the
  default callable to avoid surprise egress.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["esg", "supply_chain", "compliance"]
capability: ["verification", "safety_gating"]
modality:   ["text", "structured"]
lifecycle:  "experimental"
trust_boundary: "local"
tags: ["cbp", "wro", "uflpa", "19-usc-1307", "section-307"]
created: "2026-05-19"
updated: "2026-05-19"

parameters:
  type: object
  properties:
    supplier_name:    { type: "string" }
    supplier_country: { type: "string", description: "ISO 3166-1 alpha-2." }
    commodity_codes:  { type: "array", items: { type: "string" }, description: "Optional HS code(s) of products in scope." }
    threshold:        { type: "number", default: 0.90, description: "Jaro-Winkler fuzz threshold." }
    lists:
      type: array
      items: { type: "string", enum: ["wro_active", "wro_findings", "uflpa_entity_list"] }
  required: ["supplier_name", "lists"]
returns:
  type: object
  properties:
    matches:
      type: array
      items:
        type: object
        properties:
          order_id:    { type: "string" }
          source_list: { type: "string" }
          target_entity: { type: "string" }
          target_geography: { type: "string" }
          target_commodity: { type: "string" }
          issued_on:   { type: "string", format: "date" }
          status:      { type: "string", enum: ["active", "modified", "revoked", "finding"] }
          score:       { type: "number" }
    snapshot_date: { type: "string", format: "date" }
    halt_recommended: { type: "boolean" }
side_effects: "read"
examples:
  - input:  { supplier_name: "Placeholder XPCC subsidiary", supplier_country: "CN", lists: ["uflpa_entity_list"] }
    output:
      matches: [{ order_id: "UFLPA-XPCC-001", source_list: "uflpa_entity_list", target_entity: "Placeholder XPCC subsidiary", target_geography: "Xinjiang", target_commodity: "cotton/textiles", issued_on: "2024-08-12", status: "active", score: 0.97 }]
      snapshot_date: "2026-04-30"
      halt_recommended: true
implementations:
  - kind: "callable"
    path: "tools.cbp_wro_lookup.run"
