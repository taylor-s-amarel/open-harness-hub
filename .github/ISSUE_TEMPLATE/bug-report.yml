name: "Bug report"
description: "Report a bug in the catalog tooling, an emitter, the validator, or the static site."
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
    validations: { required: true }

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      placeholder: |
        1. python scripts/...
        2. ...

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "macOS 14, python 3.11.4, pyyaml 6.0.1"
