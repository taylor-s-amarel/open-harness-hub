name: Emit standards artifacts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  emit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate manifests
        run: python scripts/validate.py

      - name: Build catalog index
        run: python scripts/build_catalog_index.py

      - name: Run all emitters
        run: python scripts/emit/all.py

      - name: Upload dist/ as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

      - name: Publish dist/ to dist-published branch
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save dist/ before checkout
          mv dist /tmp/dist-snapshot

          # Switch to (or create) the published branch
          git fetch origin dist-published || true
          git checkout -B dist-published origin/dist-published || git checkout --orphan dist-published

          # Replace branch contents with the snapshot
          git rm -rf . >/dev/null 2>&1 || true
          cp -r /tmp/dist-snapshot/* . 2>/dev/null || true
          cp -r /tmp/dist-snapshot/.claude-plugin . 2>/dev/null || true

          # Marker so consumers know where the branch came from
          echo "${{ github.sha }}" > .source-commit
          echo "Generated by .github/workflows/emit.yml from ${{ github.repository }}@main." > README.md

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "ci: rebuild dist/ from ${{ github.sha }}"
            git push -f origin dist-published
          else
            echo "no changes to publish"
          fi
