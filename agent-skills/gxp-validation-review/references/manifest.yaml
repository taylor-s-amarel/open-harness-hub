id: "pipeline/gxp-validation-review"
type: pipeline
version: "0.1.0"
name: "GxP validation review (21-CFR-11 + Annex 11 + ALCOA+)"
description: |
  Review a GxP-validated electronic-records system against the
  rubric. Same 6-step chain as ESG / radiology / legal / AppSec —
  fifth vertical proving the architecture's industry-agnosticism.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["pharma", "pharma.gxp", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["pharma", "gxp", "21-cfr-11", "alcoa", "validation"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://www.fda.gov/regulatory-information/search-fda-guidance-documents/part-11-electronic-records-electronic-signatures-scope-and-application"
  source_kind: "other"
  author:      "FDA 21 CFR Part 11 + EU GMP Annex 11 + ICH (composite)"
  license:     "CC-BY-4.0"

task: |
  Given a GxP system validation packet (system description + IQ/OQ/PQ
  outputs + audit-trail samples + user-access reviews + change-
  control history), grade against the rubric + cite the relevant
  regulation section for each finding.
pipeline_kind: "grading"

inputs:
  - name: "validation_packet"
    type: "string|object"
  - name: "system_class"
    type: "string"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "capa_recommendations"
    type: "object[]"

defaults:
  persona: "persona/gxp-auditor"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/phi-hipaa-en"
    - "rule-pack/grep-gxp-data-integrity-red-flags"
  knowledge_packs:
    - "knowledge-pack/gxp-21-cfr-11-guidelines"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.validation_packet"

  - id: "redact_phi"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"

  - id: "grep_phi"
    kind: "rule_pack"
    ref: "rule-pack/phi-hipaa-en"
    inputs:
      text: "$.steps.redact_phi.output.text"

  - id: "grep_gxp_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-gxp-data-integrity-red-flags"
    inputs:
      text: "$.steps.redact_phi.output.text"

  - id: "rag_against_cfr_11"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_gxp_red_flags.output.fired"
      corpus: "knowledge-pack/gxp-21-cfr-11-guidelines"
      top_k: 6

  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_phi.output.text"
      rubric_ref: "rubric/gxp-validation-quality-v1"

  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "gxp-validation-review"
      applied_layers: ["persona", "phi_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/gxp-validation-quality-v1"
    threshold: 0.7
  - kind: deterministic
    label: "no critical-tier GxP findings"
    target: "$.steps.grep_gxp_red_flags.output.hit_count"
    op: "<="
    value: 5
    severity: critical
