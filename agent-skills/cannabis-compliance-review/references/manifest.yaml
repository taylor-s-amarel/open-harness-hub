id: "pipeline/cannabis-compliance-review"
type: pipeline
version: "0.1.0"
name: "Cannabis compliance review (state + §280E + METRC + FinCEN)"
description: "Vertical 31 — licensed cannabis operator compliance."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["cannabis", "cannabis.cultivation", "cannabis.retail", "cannabis.testing", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["cannabis", "metrc"]
created: "2026-05-21"
updated: "2026-05-21"
attribution:
  source_url: "https://www.cdtfa.ca.gov/industry/cannabis.htm"
  source_kind: "other"
  author: "State cannabis authority + IRS §280E + METRC + FinCEN (composite)"
  license: "CC-BY-4.0"
task: "Review cannabis operator compliance packet."
pipeline_kind: "review"
inputs:
  - name: "cannabis_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "critical_findings_count"
    type: "integer"
defaults:
  persona: "persona/cannabis-compliance-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs: ["rule-pack/grep-cannabis-compliance-flags"]
  knowledge_packs: ["knowledge-pack/cannabis-frameworks"]
steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.cannabis_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-cannabis-compliance-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_state"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/cannabis-frameworks", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/cannabis-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "cannabis-compliance-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]
success_criteria:
  - rubric: "rubric/cannabis-quality-v1"
    threshold: 0.6
