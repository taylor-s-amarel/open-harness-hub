id: "pipeline/msha-preshift-exam"
type: pipeline
version: "0.1.0"
name: "MSHA pre-shift exam GO/NO-GO gate"
description: "Apply 30 CFR 75.360 pre-shift exam as a deterministic GO/NO-GO gate — methane / O2 / ventilation / roof-rib-face hazards block miner entry."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["mining", "compliance"]
capability: ["safety_gating", "evaluation"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["msha", "preshift", "go-nogo"]
created: "2026-05-21"
updated: "2026-05-21"

attribution:
  source_url: "https://www.msha.gov/regulations/30-cfr/75-360"
  source_kind: "other"
  author: "MSHA 30 CFR 75.360-75.364 (composite)"
  license: "CC-BY-4.0"

task: "Apply MSHA pre-shift / on-shift exam GO/NO-GO gate."
pipeline_kind: "review"

inputs:
  - name: "preshift_packet"
    type: "string|object"
outputs:
  - name: "verdict"
    type: "string"
  - name: "items"
    type: "object[]"
  - name: "nogo_triggers"
    type: "string[]"

defaults:
  knowledge_packs:
    - "knowledge-pack/technician-checklists"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.preshift_packet" }
  - id: "checklist_gate"
    kind: "processor"
    ref: "processor/checklist-evaluator"
    inputs:
      candidate: "$.steps.structured_to_prose.output.prose"
      checklist_id: "msha-preshift"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "msha-preshift-exam"
      applied_layers: ["structured_to_prose", "checklist_evaluator"]

success_criteria:
  - kind: deterministic
    target: "$.steps.checklist_gate.output.verdict"
    op: "=="
    value: "go"
    severity: "critical"
    label: "MSHA pre-shift exam gate must return GO"
