id: "pipeline/ai-governance-audit"
type: pipeline
version: "0.1.0"
name: "AI governance audit (EU AI Act + NIST AI RMF + ISO 42001 + GDPR Art 22)"
description: "Vertical 33 — AI conformity assessment for Annex III high-risk + GPAI + ISO 42001 AIMS."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["ai_governance", "ai_governance.eu_act", "ai_governance.nist_rmf", "ai_governance.iso_42001", "privacy", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["eu-ai-act", "nist-ai-rmf", "iso-42001"]
created: "2026-05-21"
updated: "2026-05-21"
attribution:
  source_url: "https://artificialintelligenceact.eu/"
  source_kind: "other"
  author: "EU AI Act + NIST AI RMF + ISO/IEC 42001 (composite)"
  license: "CC-BY-4.0"
task: "Audit AI system for EU AI Act + NIST + ISO 42001 conformity."
pipeline_kind: "review"
inputs:
  - name: "ai_system_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "critical_findings_count"
    type: "integer"
defaults:
  persona: "persona/ai-governance-auditor"
  model_adapter: "adapter/ollama-default"
  rule_packs: ["rule-pack/grep-ai-governance-flags"]
  knowledge_packs: ["knowledge-pack/ai-governance-frameworks"]
steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.ai_system_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-ai-governance-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_act"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/ai-governance-frameworks", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/ai-governance-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "ai-governance-audit"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]
success_criteria:
  - rubric: "rubric/ai-governance-quality-v1"
    threshold: 0.6
