id: "pipeline/real-estate-dd-review"
type: pipeline
version: "0.1.0"
name: "Real estate due-diligence review"
description: "Fourteenth vertical."
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["real_estate", "real_estate.due_diligence"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["real-estate", "due-diligence"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url: "https://www.alta.org/"
  source_kind: "other"
  author: "ALTA + ASTM + IBC (composite)"
  license: "CC-BY-4.0"

task: "Review property DD packet."
pipeline_kind: "review"

inputs:
  - name: "dd_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "disposition"
    type: "string"

defaults:
  persona: "persona/real-estate-dd-analyst"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-real-estate-dd-red-flags"
  knowledge_packs:
    - "knowledge-pack/real-estate-dd-standards"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.dd_packet"
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-real-estate-dd-red-flags"
    inputs:
      text: "$.steps.redact_pii.output.text"
  - id: "rag_against_standards"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_red_flags.output.fired"
      corpus: "knowledge-pack/real-estate-dd-standards"
      top_k: 6
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/real-estate-dd-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "real-estate-dd-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/real-estate-dd-quality-v1"
    threshold: 0.6
