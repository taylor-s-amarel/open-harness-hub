id: "harness/radiology-report-review"
type: harness
version: "0.1.0"
name: "Radiology Report Review harness"
description: |
  RADS-aware + Fleischner-aware harness for grading radiology reports
  with HIPAA-safe PHI redaction. Wraps `pipeline/radiology-report-
  grading` with reusable layers.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["healthcare", "healthcare.radiology"]
capability: ["evaluation", "verification", "retrieval", "reasoning"]
modality:   ["text"]
lifecycle:  "beta"
trust_boundary: "local"
freshness:  "stable"
tags: ["radiology", "rads", "fleischner", "hipaa", "harness"]
created: "2026-05-20"
updated: "2026-05-20"

kind: "model_harness"
tier: "primary"
applied_layers: [persona, privacy, grep, rag, tools]
consumes: [grep_rule, rag_doc, persona_block, response_policy]
emits: [reasoning_step, context_snippet]
logic_paths:
  - id: "grade_radiology_report"
    label: "structured report → PHI-redact → RADS+Fleischner heuristics → grade"
    entrypoints: ["/api/radiology/grade"]
    steps:
      - "structured-to-prose"
      - "rule-pack/phi-hipaa-en redaction"
      - "radiology-report-red-flags GREP"
      - "RAG against ACR Appropriateness Criteria + Fleischner 2017 + RADS"
      - "judge against radiology-report-quality rubric"
      - "audit trace"
    consumes: [grep_rule, rag_doc, persona_block, response_policy]
    emits: [reasoning_step, context_snippet]
    model_call: "required"
    verification:
      - "report structure present (history/technique/comparison/findings/impression/recommendation)"
      - "zero PHI in graded output"
      - "RADS score on every applicable finding"
      - "Fleischner-compliant follow-up on incidental pulm nodules"
knowledge_packs:
  - id: "radiology"
    label: "ACR AC + Fleischner + RADS knowledge pack"
    kind: knowledge_pack
    types: [rag_doc, citation_edge]
    required: true
    trust_boundary: "local"
    freshness: "dated"
logic_packs:
  - id: "persona_default"
    label: "Radiologist cite-first persona"
    kind: logic_pack
    types: [persona_block]
    required: true
  - id: "response_policy"
    label: "Hedged-where-warranted response policy"
    kind: logic_pack
    types: [response_policy]
    required: true
model_io:
  input:  "{report: string|object, modality: string, body_part: string, patient_risk_class: string}"
  output: "{grade: number, findings: object[], missing_rads: object[], missing_followups: object[]}"
model_targets:
  - id: "local_ollama"
    label: "Local Ollama"
    transport: "ollama"
    role: "Default local grading."
    capabilities: [text_generation, chat]
    required: false
    default: true
    trust_boundary: "local"
  - id: "anthropic_judge"
    label: "Anthropic Claude (frontier judge)"
    transport: "anthropic"
    role: "Optional frontier judge for second-read."
    capabilities: [text_generation, chat, long_context]
    required: false
    default: false
    trust_boundary: "external"
input_verification:
  - "PHI redacted before model call (HIPAA Safe Harbor 18 categories)"
  - "report not larger than 64 KB"
output_verification:
  - "no PHI in output"
  - "report structure complete"
  - "follow-up timeline cited from Fleischner / Lung-RADS"
privacy_boundaries:
  raw_input:      "stays local; PHI redacted"
  derived_output: "may sync to hub only after anonymization gate"
  external_calls: "only if model_target.trust_boundary == external AND user opted in"
data_protection:
  hipaa_safe_harbor_categories: ["hsh:01","hsh:02","hsh:03","hsh:04","hsh:05","hsh:06","hsh:07","hsh:08","hsh:09","hsh:10","hsh:11","hsh:12","hsh:13","hsh:14","hsh:15","hsh:16","hsh:17","hsh:18"]
contributes_to:
  - "pipeline/radiology-report-grading"
