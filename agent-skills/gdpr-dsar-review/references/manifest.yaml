id: "pipeline/gdpr-dsar-review"
type: pipeline
version: "0.1.0"
name: "GDPR DSAR fulfillment review (CCPA-compatible)"
description: "Eleventh vertical."
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["privacy", "privacy.gdpr", "privacy.dsar", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["privacy", "gdpr", "dsar", "ccpa"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://gdpr.eu/"
  source_kind: "other"
  author:      "EU GDPR + CCPA/CPRA (composite)"
  license:     "CC-BY-4.0"

task: "Review a DSAR fulfillment for completeness + GDPR/CCPA compliance."
pipeline_kind: "review"

inputs:
  - name: "dsar_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "indicators"
    type: "object[]"
  - name: "compliance_status"
    type: "string"

defaults:
  persona: "persona/privacy-officer-gdpr"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-gdpr-dsar-red-flags"
  knowledge_packs:
    - "knowledge-pack/gdpr-articles-and-ccpa"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.dsar_packet"
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-gdpr-dsar-red-flags"
    inputs:
      text: "$.steps.redact_pii.output.text"
  - id: "rag_against_gdpr"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_red_flags.output.fired"
      corpus: "knowledge-pack/gdpr-articles-and-ccpa"
      top_k: 6
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/gdpr-dsar-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "gdpr-dsar-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/gdpr-dsar-quality-v1"
    threshold: 0.7
