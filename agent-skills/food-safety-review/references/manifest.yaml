id: "pipeline/food-safety-review"
type: pipeline
version: "0.1.0"
name: "Food safety review (FDA FSMA + HACCP + GFSI)"
description: "Seventeenth vertical."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["food_safety", "food_safety.fsma", "food_safety.haccp"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["food-safety"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url: "https://www.fda.gov/food/food-safety-modernization-act-fsma"
  source_kind: "other"
  author: "FDA FSMA + Codex HACCP + GFSI (composite)"
  license: "CC-BY-4.0"

task: "Review a food-safety facility's HACCP plan + supplier verification + traceability."
pipeline_kind: "review"

inputs:
  - name: "facility_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "recall_class"
    type: "string"

defaults:
  persona: "persona/food-safety-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-food-safety-flags"
  knowledge_packs:
    - "knowledge-pack/food-safety-fsma-haccp"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.facility_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-food-safety-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_frameworks"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/food-safety-fsma-haccp", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/food-safety-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "food-safety-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/food-safety-quality-v1"
    threshold: 0.6
