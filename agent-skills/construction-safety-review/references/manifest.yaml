id: "pipeline/construction-safety-review"
type: pipeline
version: "0.1.0"
name: "Construction safety review (OSHA 1926 / Focus Four)"
description: "Vertical 18."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["construction", "construction.safety"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["construction", "osha"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url: "https://www.osha.gov/construction"
  source_kind: "other"
  author: "OSHA 1926 + Focus Four + ANSI Z10 (composite)"
  license: "CC-BY-4.0"

task: "Review a construction-site safety packet (JHA + toolbox talks + inspection notes + near-misses)."
pipeline_kind: "review"

inputs:
  - name: "site_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "stop_work_recommended"
    type: "boolean"

defaults:
  persona: "persona/construction-safety-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-construction-safety-flags"
  knowledge_packs:
    - "knowledge-pack/osha-construction-1926"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.site_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-construction-safety-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_osha"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/osha-construction-1926", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/construction-safety-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "construction-safety-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/construction-safety-quality-v1"
    threshold: 0.6
