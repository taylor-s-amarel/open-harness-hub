id: "pipeline/threat-intel-ioc-review"
type: pipeline
version: "0.1.0"
name: "Threat-intel IOC + TTP review (MITRE ATT&CK aligned)"
description: |
  Ingest a CTI report or incident write-up, extract IOCs + TTPs,
  validate against MITRE ATT&CK, rate confidence, surface
  attribution risk. Seventh vertical proving industry-agnosticism.
authors:
  - name: "Open Harness Hub contributors"
license: "MIT"
industry:   ["security", "threat_intelligence"]
capability: ["extraction", "verification", "evaluation"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["security", "cti", "ioc", "mitre-attack", "stix"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url:  "https://attack.mitre.org/"
  source_kind: "other"
  author:      "MITRE ATT&CK + STIX/TAXII (composite)"
  license:     "CC-BY-4.0"

task: |
  Given a CTI report (text + sandbox output), extract IOCs by type,
  map TTPs to ATT&CK techniques, rate confidence, flag attribution
  concerns.
pipeline_kind: "review"

inputs:
  - name: "report_text"
    type: "string|object"
  - name: "incident_class"
    type: "string"
outputs:
  - name: "grade"
    type: "number"
  - name: "iocs_by_type"
    type: "object"
  - name: "ttps_mapped"
    type: "object[]"
  - name: "confidence_summary"
    type: "object"

defaults:
  persona: "persona/threat-intel-analyst"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-ioc-extraction"
  knowledge_packs:
    - "knowledge-pack/mitre-attack-sample"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs:
      data: "$.inputs.report_text"

  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs:
      text: "$.steps.structured_to_prose.output.prose"

  - id: "grep_iocs"
    kind: "rule_pack"
    ref: "rule-pack/grep-ioc-extraction"
    inputs:
      text: "$.steps.redact_pii.output.text"

  - id: "rag_against_attack"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs:
      query: "$.steps.grep_iocs.output.fired"
      corpus: "knowledge-pack/mitre-attack-sample"
      top_k: 8

  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/threat-intel-quality-v1"

  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "threat-intel-ioc-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric:    "rubric/threat-intel-quality-v1"
    threshold: 0.6
