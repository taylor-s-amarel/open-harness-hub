id: "pipeline/water-utility-compliance-review"
type: pipeline
version: "0.1.0"
name: "Water utility compliance review (SDWA / NPDWR / LCRR / AWIA)"
description: "Vertical 24 — drinking-water utility compliance + cyber."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["water_utility", "water_utility.sdwa", "water_utility.lcr", "water_utility.scada", "compliance"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["water-utility", "sdwa", "lcrr", "awia"]
created: "2026-05-21"
updated: "2026-05-21"

attribution:
  source_url: "https://www.epa.gov/dwreginfo"
  source_kind: "other"
  author: "EPA SDWA + NPDWR + LCRR + DBPR + AWIA + WaterISAC (composite)"
  license: "CC-BY-4.0"

task: "Review Public Water System compliance packet (operations + monitoring + LSL inventory + RRA/ERP + SCADA cyber)."
pipeline_kind: "review"

inputs:
  - name: "pws_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "tier_1_violations_count"
    type: "integer"

defaults:
  persona: "persona/water-utility-compliance-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-water-utility-flags"
  knowledge_packs:
    - "knowledge-pack/water-sdwa-lcrr-awia"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.pws_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-water-utility-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_sdwa"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/water-sdwa-lcrr-awia", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/water-utility-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "water-utility-compliance-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/water-utility-quality-v1"
    threshold: 0.6
