id: "pipeline/maritime-safety-review"
type: pipeline
version: "0.1.0"
name: "Maritime safety review (IMO SOLAS / MARPOL / ISM / STCW)"
description: "Vertical 20."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["maritime", "maritime.safety"]
capability: ["evaluation", "extraction", "verification"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["maritime", "imo"]
created: "2026-05-20"
updated: "2026-05-20"

attribution:
  source_url: "https://www.imo.org/"
  source_kind: "other"
  author: "IMO conventions (composite)"
  license: "CC-BY-4.0"

task: "Review vessel inspection / PSC / ISM audit packet."
pipeline_kind: "review"

inputs:
  - name: "vessel_packet"
    type: "string|object"
outputs:
  - name: "grade"
    type: "number"
  - name: "findings"
    type: "object[]"
  - name: "detainable_count"
    type: "integer"

defaults:
  persona: "persona/maritime-safety-officer"
  model_adapter: "adapter/ollama-default"
  rule_packs:
    - "rule-pack/grep-maritime-safety-flags"
  knowledge_packs:
    - "knowledge-pack/imo-conventions"

steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.vessel_packet" }
  - id: "redact_pii"
    kind: "processor"
    ref: "processor/redact-pii-text"
    inputs: { text: "$.steps.structured_to_prose.output.prose" }
  - id: "grep_red_flags"
    kind: "rule_pack"
    ref: "rule-pack/grep-maritime-safety-flags"
    inputs: { text: "$.steps.redact_pii.output.text" }
  - id: "rag_against_imo"
    kind: "rule_pack"
    ref: "rule-pack/hybrid-retrieval-policy"
    inputs: { query: "$.steps.grep_red_flags.output.fired", corpus: "knowledge-pack/imo-conventions", top_k: 6 }
  - id: "grade"
    kind: "processor"
    ref: "processor/llm-judge"
    inputs:
      candidate: "$.steps.redact_pii.output.text"
      rubric_ref: "rubric/maritime-safety-quality-v1"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "maritime-safety-review"
      applied_layers: ["persona", "pii_redact", "grep", "rag", "judge"]

success_criteria:
  - rubric: "rubric/maritime-safety-quality-v1"
    threshold: 0.6
