id: "pipeline/trid-loan-gate"
type: pipeline
version: "0.1.0"
name: "TRID Loan Estimate + Closing Disclosure gate"
description: "Apply Reg Z TRID timing + tolerance gate before mortgage consummation — CD timing miss = NO-GO + re-issue."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["finance", "compliance"]
capability: ["safety_gating", "evaluation"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["trid", "reg-z", "tila", "go-nogo"]
created: "2026-05-21"
updated: "2026-05-21"
attribution:
  source_url: "https://www.consumerfinance.gov/compliance/compliance-resources/mortgage-resources/tila-respa-disclosure-rule/"
  source_kind: "other"
  author: "12 CFR 1026 Reg Z + CFPB TRID (composite)"
  license: "CC-BY-4.0"
task: "Apply TRID gate before mortgage consummation."
pipeline_kind: "review"
inputs:
  - name: "loan_packet"
    type: "string|object"
outputs:
  - name: "verdict"
    type: "string"
  - name: "items"
    type: "object[]"
  - name: "nogo_triggers"
    type: "string[]"
defaults:
  knowledge_packs: ["knowledge-pack/technician-checklists"]
steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.loan_packet" }
  - id: "checklist_gate"
    kind: "processor"
    ref: "processor/checklist-evaluator"
    inputs:
      candidate: "$.steps.structured_to_prose.output.prose"
      checklist_id: "trid-loan"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "trid-loan-gate"
      applied_layers: ["structured_to_prose", "checklist_evaluator"]
success_criteria:
  - kind: deterministic
    target: "$.steps.checklist_gate.output.verdict"
    op: "=="
    value: "go"
    severity: "critical"
    label: "TRID gate must return GO before consummation"
