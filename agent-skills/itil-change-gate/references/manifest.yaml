id: "pipeline/itil-change-gate"
type: pipeline
version: "0.1.0"
name: "ITIL Change Enablement gate"
description: "Apply ITIL 4 change-enablement runbook as deterministic gate — CAB approval + backout plan + validation criteria are GO requirements."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry:   ["it", "compliance"]
capability: ["safety_gating", "evaluation"]
modality:   ["text"]
lifecycle:  "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["itil", "change-management", "go-nogo"]
created: "2026-05-21"
updated: "2026-05-21"
attribution:
  source_url: "https://www.axelos.com/best-practice-solutions/itil"
  source_kind: "other"
  author: "ITIL 4 Practice Guide + ISO/IEC 20000-1 (composite)"
  license: "CC-BY-4.0"
task: "Apply ITIL change-enablement gate before production change."
pipeline_kind: "review"
inputs:
  - name: "change_packet"
    type: "string|object"
outputs:
  - name: "verdict"
    type: "string"
  - name: "items"
    type: "object[]"
  - name: "nogo_triggers"
    type: "string[]"
defaults:
  knowledge_packs: ["knowledge-pack/technician-checklists"]
steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.change_packet" }
  - id: "checklist_gate"
    kind: "processor"
    ref: "processor/checklist-evaluator"
    inputs:
      candidate: "$.steps.structured_to_prose.output.prose"
      checklist_id: "itil-change"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "itil-change-gate"
      applied_layers: ["structured_to_prose", "checklist_evaluator"]
success_criteria:
  - kind: deterministic
    target: "$.steps.checklist_gate.output.verdict"
    op: "=="
    value: "go"
    severity: "critical"
    label: "ITIL change-enablement gate must return GO before change window"
