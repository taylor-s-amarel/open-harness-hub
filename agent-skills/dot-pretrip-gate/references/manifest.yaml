id: "pipeline/dot-pretrip-gate"
type: pipeline
version: "0.1.0"
name: "DOT pre-trip inspection gate (DVIR / 49 CFR 396)"
description: "Apply driver vehicle inspection report gate — out-of-service criteria block dispatch."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry: ["transportation", "compliance"]
capability: ["safety_gating", "evaluation"]
modality: ["text"]
lifecycle: "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["dot", "fmcsa", "cvsa", "go-nogo"]
created: "2026-05-21"
updated: "2026-05-21"
attribution:
  source_url: "https://www.fmcsa.dot.gov/regulations/title49/section/396.13"
  source_kind: "other"
  author: "49 CFR 396 + FMCSA + CVSA OOS Criteria (composite)"
  license: "CC-BY-4.0"
task: "Apply DVIR gate before truck dispatch."
pipeline_kind: "review"
inputs:
  - name: "dvir_packet"
    type: "string|object"
outputs:
  - name: "verdict"
    type: "string"
  - name: "items"
    type: "object[]"
  - name: "nogo_triggers"
    type: "string[]"
defaults:
  knowledge_packs: ["knowledge-pack/technician-checklists"]
steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.dvir_packet" }
  - id: "checklist_gate"
    kind: "processor"
    ref: "processor/checklist-evaluator"
    inputs:
      candidate: "$.steps.structured_to_prose.output.prose"
      checklist_id: "dot-pretrip"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "dot-pretrip-gate"
      applied_layers: ["structured_to_prose", "checklist_evaluator"]
success_criteria:
  - kind: deterministic
    target: "$.steps.checklist_gate.output.verdict"
    op: "=="
    value: "go"
    severity: "critical"
    label: "DOT DVIR gate must return GO before dispatch"
