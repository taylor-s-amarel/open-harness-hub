id: "pipeline/nist-800-61-ir-gate"
type: pipeline
version: "0.1.0"
name: "NIST 800-61 Incident Response gate"
description: "Apply NIST SP 800-61 IR playbook — confirmed data exfil escalates to IC + legal."
authors: [{ name: "Open Harness Hub contributors" }]
license: "MIT"
industry: ["cyber", "compliance"]
capability: ["safety_gating", "evaluation"]
modality: ["text"]
lifecycle: "experimental"
trust_boundary: "local"
lifecycle_position: "api.review"
tags: ["nist-800-61", "ir", "soc", "go-nogo"]
created: "2026-05-21"
updated: "2026-05-21"
attribution:
  source_url: "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"
  source_kind: "other"
  author: "NIST SP 800-61 Rev 2 + SP 800-184 + SANS PICERL (composite)"
  license: "CC-BY-4.0"
task: "Apply IR playbook gate at incident declaration."
pipeline_kind: "review"
inputs:
  - name: "incident_packet"
    type: "string|object"
outputs:
  - name: "verdict"
    type: "string"
  - name: "items"
    type: "object[]"
  - name: "nogo_triggers"
    type: "string[]"
defaults:
  knowledge_packs: ["knowledge-pack/technician-checklists"]
steps:
  - id: "structured_to_prose"
    kind: "processor"
    ref: "processor/structured-to-prose"
    inputs: { data: "$.inputs.incident_packet" }
  - id: "checklist_gate"
    kind: "processor"
    ref: "processor/checklist-evaluator"
    inputs:
      candidate: "$.steps.structured_to_prose.output.prose"
      checklist_id: "nist-800-61"
  - id: "audit"
    kind: "processor"
    ref: "processor/audit-trace-emitter"
    inputs:
      step_id: "nist-800-61-ir-gate"
      applied_layers: ["structured_to_prose", "checklist_evaluator"]
success_criteria:
  - kind: deterministic
    target: "$.steps.checklist_gate.output.verdict"
    op: "=="
    value: "go"
    severity: "critical"
    label: "NIST 800-61 IR gate must return GO before close-out"
